mia 92 mg/dL, lactato arterial: 2,3 mmol/L, Osmolaridade sérica medida: 350 mOsmyL, Gasometria arterial: pH: 7,18, pCO2: 28 mmHg, HCO-3 : 9 mEqg/L, BE: -12, Sat Oz: 99%. A partir desse caso clínico, assinale a alternativa correta.","o":["A paciente apresenta acidose metabólica com ânion gap aumentado, e a principal hipótese, para a história clínica apresentada, é intoxicação por metanol.","Há acidose metabólica com ânion gap normal como segundo distúrbio associado, podendo ser por perda de bicarbonato, em casos de diarreia, por exemplo.","A compensação respiratória está apropriada ao caso descrito e, diante dos exames laboratoriais e da evolução clínica, há indicação de reposição endovenosa de bicarbonato.","Como há acidose metabólica e hipocalemia, a principal hipótese diagnóstica é de acidose tubular renal, mas deve-se proceder a investigação adequada.",""]},{"a":2022,"n":14,"e":"Clínica Médica","t":"Sepse / Antibioticoterapia","g":"B","x":false,"q":"A gestação é um evento biológico normal, contudo, durante este período, o corpo da mulher sofre alterações que podem interferir com o seu atendimento no ambiente de terapia intensiva. Assinale a alternativa que apresenta, corretamente, as principais alterações hemodinâmicas durante a gestação.","o":["Aumento da volemia, aumento da resistência vascular periférica, aumento da frequência cardíaca e aumento do débito cardíaco.","Aumento da volemia, redução da resistência vascular periférica, aumento da, frequência cardíaca e aumento do débito cardíaco.","Aumento da volemia, redução da resistência vascular periférica, redução da frequência cardíaca e redução do débito cardíaco.","Redução da volemia, aumento da resistência vascular periférica, aumento da frequência cardíaca e aumento do débito cardíaco.",""]},{"a":2022,"n":15,"e":"Clínica Médica","t":"Insuficiência cardíaca / BNP e ecocardiograma","g":"E","x":false,"q":"Homem, 65 anos de idade, comparece para consulta com queixa de dispneia e tosse crônica, há mais de 3 anos, com piora nos últimos meses. Quando caminha, precisa parar diversas vezes, mesmo no plano, e refere piora dos sintomas no fim do dia e ao acordar. Tabagista desde os 20 anos de idade, cerca de 1 maço ao dia. Já teve pneumonias no passado, sem outras doenças conhecidas. Há cerca de 60 dias, foi ao pronto-socorro por piora dos sintomas, foi medicado e liberado, mas não sabe os nomes das medicações. Ao exame físico, ausculta pulmonar reduzida globalmente, mas sem ruídos adventícios. Sem outras alterações. Traz o exame a seguir. | 1 E S min pt A Our | q Eltppec | NS ++ Pb la 1 4) 8 po RO De “as 1 ] 4 Ss 6. 2h diem 1 PREÉ BD PÓS BD Medido | % Predito Med | Mudança Mudança CvFL 2,93 72 3,26 | 0,34 11 VEFIL 180 |57 213 [033 18 ; VEFI/CVF | 61,6 65,3 % 1 1 1 Sobre o caso descrito, assinale a alternativa correta.","o":["A presença de um distúrbio restritivo descarta a presença de DPOC e asma, sendo necessário continuar a investigação com uma tomografia de alta resolução.","De acordo com a espirometria, a presença de hiper-reatividade brônquica caracteriza asma não remodelada, cujo tratamento é corticoide inalatório para os sintomas.","O caso é de DPOC, e o paciente deve iniciar uso de corticoide sistêmico e inalatório para melhora dos sintomas.","Trata-se de doença pulmonar obstrutiva crônica exacerbada, cuja conduta recomendada é o uso de corticoide sistêmico, bem como uso de broncodilatadores inalatórios.",""]},{"a":2022,"n":18,"e":"Pediatria","t":"Sepse neonatal / Streptococcus Grupo B","g":"B","x":false,"q":"Em relação à doença de Kawasaki, considere as afirmativas a seguir. 1. Associados à febre, são critérios diagnósticos: alterações de lábios e cavidade oral, hiperemia conjuntival, alteração de extremidades, exantema polimorfo e linfadenopatia cervical. Il. No período febril, há indicação de ácido acetilsalicílico (AAS), em baixas doses, para inibir agregação plaquetária. $ ll. A indicação de imunoglobulina humana endovenosa se restringe aos casos em que houver comprometimento cardíaco. IV. Os exames séricos da fase aguda demonstram leucocitose com neutrofilia e aumento das provas inflamatória. Assinale a alternativa correta.","o":["Somente as afirmativas le Il são corretas.","Somente as afirmativas | e IV são corretas. €C) Somente as afirmativas Ill e IV são corretas.","","Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2022,"n":19,"e":"Pediatria","t":"Pneumonia neonatal / Surfactante","g":"C","x":false,"q":"Paciente, 3 anos de idade, com história de constipação intestinal há 6 meses, caracterizada por cruzar as pernas ou andar na ponta dos pés quando tinha desejo evacuatório. Evacua de 1 a 2 vezes na semana, fezes de grosso calibre, porém, diariamente, apresenta perda involuntária de conteúdo fecal amolecido em roupa íntima. Mãe refere que utiliza esporadicamente supositório de glicerina para alívio do quadro. Há 2 meses, buscou atendimento nutricional que adequou ingesta de fibras, mas sem melhora clínica. Não faz uso de qualquer medicação de uso contínuo. Ao exame físico, peso e estatura próximo ao Z score 0. Presença de fezes palpáveis em fossa ilíaca esquerda. Anus sem lesões à inspeção. Sobre o caso descrito, considere as afirmativas a seguir. 1. Inicialmente, deve-se realizar desimpactação com óleo mineral 1 mL/kg/dia por 3 dias consecutivos. Il. Probióticos como o Saccharomyces boulardii devem ser utilizados antes do tratamento com laxantes, pois reduzem o tempo de uso dessas medicações. HI. Os laxantes osmóticos são as medicações de escolha para o tratamento de manutenção. IV. Como o paciente já consome quantidades adequadas de fibra alimentar, não há necessidade de suplementação desse nutriente. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2022,"n":20,"e":"Pediatria","t":"DRGE lactente / Regurgitação fisiológica","g":"D","x":false,"q":"Lactente, 3 meses de vida, vem à consulta devido a regurgitações frequentes. O acompanhante refere que apresenta golfadas em pequenas quantidades desde as primeiras semanas de vida, porém, há 4 semanas, houve um aumento do volume e da frequência das regurgitações. Associou a piora clínica ao desmame e início de fórmula infantil, devido à internação materna. Há 15 dias, em uso de fórmula antirregurgitação (AR), mantendo padrão de mais de 10 episódios ao dia. No último mês, lactente teve ganho de peso de 230 g. Nega febre no período, nega uso de medicações (exceto vitamina","o":["Solicitar endoscopia digestiva alta para o correto diagnóstico de doença do refluxo gastroesofágico.","Iniciar uso de domperidona 20 minutos antes das mamadas.","Orientar fórmula antirregurgitação e isenta de lactose.","Teste terapêutico com fórmula extensamente hidrolisada por 15 dias.","Coletar anticorpo antitransglutaminase e IgA total para investigar doença celíaca."]},{"a":2022,"n":21,"e":"Pediatria","t":"Obesidade infantil / Regulação do apetite","g":"E","x":false,"q":"Há fatores genéticos envolvidos na gênese da obesidade infantil. No hipotálamo, há vias de sinalização orexígenas e anorexígenas. Em relação à regulação central do apetite, assinale a alternativa correta.","o":["Insulina, leptina e peptídeo YY induzem aumento do apetite no hipotálamo.","O CRH diminui após a ingestão alimentar, contribuindo para a sensação de saciedade.","O hormônio estimulador de melanócito alfa (alfa-MSH) atua sobre os neurônios, que expressam o receptor 4 da melanocortina (MC4R), promovendo aumento do apetite.","O neuropeptídeo Y promove lipólise e tem ação anorexígena.",""]},{"a":2022,"n":22,"e":"Pediatria","t":"Baixa estatura / Hormônio do crescimento","g":"D","x":false,"q":"A mãe de um menino, 8 anos de idade, refere que, desde os 2 anos, a criança é menor do que as outras da mesma idade. RNT, AIG, parto normal, IG: 39 semanas, peso ao nascimento: 3200 g e comprimento de 49 cm. Aleitamento materno até 1 ano de vida, sempre foi hígido, sem internações prévias, sem atopias. Estatura do pai: 1,78 me da mãe: 1,65 m. Pais não consanguíneos, sem casos semelhantes na família. Ao exame, peso: 18 kg e estatura: 1,15 m ambos abaixo do percentil 3. Tireoide normal, impúbere e sem dismorfias. Em relação à melhor conduta para esse caso, assinale a alternativa correta.","o":["Cariótipo, idade óssea, IGF-2 e GH basal.","Cortisol e IGF-2. Se ambos estiverem baixos, fazer teste de geração de IGF-1 com a coleta de IGF após a administração de GH por 4 dias.","IGF-1, TSH, prolactina e testosterona.","IGF-1 e idade óssea. Se IGF-1 baixo, realizar teste para avaliar secreção de GH.","T4 livre, GH basal, cortisol e IGF-2."]},{"a":2022,"n":23,"e":"Pediatria","t":"Hipotireoidismo congênito / Triagem neonatal","g":"A","x":false,"q":"Recém-nascido a termo, filho de mãe diabética, pélvico, líquido amniótico meconial, nasceu de cesárea, apgar 9-10, peso = 3900 9, iniciou com taquipneia (FR = 70) desde o nascimento, sem necessidade de oxigenioterapia, mantendo saturação 95%. Hemoglucoteste = 47 mg/dL na primeira hora de vida. Raios X de tórax normais. Em relação ao diagnóstico mais provável, assinale a alternativa correta.","o":["Adaptação respiratória.","Síndrome de aspiração de mecônio devido à presença de líquido amniótico meconial.","Síndrome do desconforto respiratório neonatal (membrana hialina) devido à deficiência de surfactante em filhos de mãe diabética.","Taquipneia pode ser devido à hipoglicemia.","Pneumonia devido ao líquido amniótico meconial."]},{"a":2022,"n":24,"e":"Pediatria","t":"Sibilância no lactente / DD asma","g":"B","x":false,"q":"Uma puérpera, 30 anos de idade, está ansiosa por não conseguir amamentar plenamente seu primeiro filho, atualmente, com 3 dias de vida. Relata que ele chora muito, larga o peito frequentemente e que não sente a mama esvaziar após a mamada. Ela deseja ter alta, mas sente-se insegura com a perda ponderal de seu filho, de 12% desde o nascimento. Na observação da mamada, o médico repara que as mamas estão cheias, com aréola tensa, que as bochechas do bebê ficam encovadas e a mãe sente muita dor. Assinale a alternativa que apresenta, corretamente, a orientação mais indicada para essa nutriz.","o":["Assegurar que ela ainda terá a apojadura e, com maior produção de leite, o recém- nascido ficará satisfeito.","Ensinar a ordenha manual à mãe para corrigir a pega e tornar o aleitamento mais efetivo, reduzindo a perda ponderal.","Orientar sobre o tempo mínimo da mamada em cada mama, de 15 minutos, a fim de estimular a produção em ambas as mamas.","Orientar pausa no aleitamento devido à dor materna e oferecer fórmula láctea até a recuperação de peso do bebê.",""]},{"a":2022,"n":26,"e":"Pediatria","t":"ITU pediátrica / Refluxo vesicoureteral","g":"C","x":false,"q":"Paciente do sexo masculino, 3 anos de idade, dá entrada em pronto-socorro com história de palidez e icterícia. Mãe refere que criança apresentou quadro febril, tendo dado paracetamol para controle de temperatura. Refere que algum tempo após, começou a ficar mais pálido, com olhos amarelados e urina escurecida. Criança com história prévia de ter apresentando os mesmos sintomas de quando apresentou uma infecção de garganta, que necessitou de uso de sulfametoxazol + trimetropim para tratamento. Ao exame físico, apresenta-se ictérico, com fígado palpável a 3 cm rebordo costal direito e baço a 4 cm rebordo costal esquerdo. Exames complementares com presença de anemia, bilirrubinas aumentadas à custa de bilirrubina indireta, reticulocitose, coombs direto negativo e presença de “bite cell”. Quanto ao diagnóstico mais provável, para esse caso, assinale a alternativa correta.","o":["Anemia hemolítica por autoanticorpo.","Anemia falciforme.","Deficiência de G6PD.","Esferocitose hereditária.","Talassemia minor."]},{"a":2022,"n":27,"e":"Pediatria","t":"Vacinação PNI / HPV adolescentes","g":"C","x":false,"q":"Um lactente do sexo masculino, 3 meses de vida, comparece para consulta de rotina, sem queixas. Na anamnese, tem-se a informação de que foi um recém-nascido a termo com peso de nascimento de 2,4 kg, está em aleitamento materno exclusivo e em uso de 400 UI de vitamina D. No exame físico, seu estado nutricional é de eutrofia e o desenvolvimento está adequado. Considerando a situação apresentada e a conduta do médico para o caso, assinale a alternativa correta.","o":["Complementar com fórmula de partida e aumentar a dose de vitamina D para 600 UI.","Complementar com fórmula de seguimento e prescrever sulfato ferroso 1 mg/kg de peso.","Manter o aleitamento materno exclusivo e prescrever sulfato ferroso 2 mg/kg de peso.","Manter o aleitamento materno e prescrever uma papa de fruta bem amassada.","Manter o aleitamento materno e iniciar oferta de sucos diluídos sem acréscimo de açúcares."]},{"a":2022,"n":28,"e":"Pediatria","t":"Convulsão febril / Manejo","g":"E","x":false,"q":"Nos primeiros dias, o leite materno, chamado de colostro, possui características próprias e adequadas ao recém-nascido a termo. Assinale a alternativa que apresenta, corretamente, suas características.","o":["Contém menos água e mais carboidrato do que o leite maduro.","Contém mais lactose digerível e mais sódio do que o leite maduro. :","Contém mais gordura e mais sais minerais do que o leite maduro.","Contém mais ferro e mais gordura do que o leite maduro.","Contém mais proteína e menos gordura do que o leite maduro."]},{"a":2022,"n":29,"e":"Pediatria","t":"Anemia hemolítica pediátrica / Esferocitose","g":"A","x":false,"q":"Paciente sexo feminino, 10 meses de vida, busca atendimento em pronto-socorro devido à dificuldade respiratória notada pela mãe através do “afundamento das costelas”. Apresenta tosse úmida, rinorreia hialina, há 5 dias, e, há 1 dia, evoluiu com febre de 39,1 ºC, dificuldade respiratória e diminuição da ingesta hídrica. Criança previamente hígida. Ao exame físico, apresenta-se em bom estado geral, com frequência cardíaca de 134 bpm, frequência respiratória de 40 irpm e saturação em ar ambiente de 95%, tiragem subcostal e ausculta respiratória sem particularidades. Foram realizados Raios X do tórax, conforme imagem a seguir. | d Á Em relação à conduta indicada nesse caso, assinale a alternativa correta.","o":["Coleta de hemocultura e internação.","Fisioterapia respiratória e novos Raios X de tórax.","Realização de ultrassonografia de tórax para excluir derrame pleural.","Alta com amoxicilina 50 mg/kg/dia e retorno em 48 horas para reavaliação.","Alta com azitromicina 10 mg/kg/dia por 5 dias."]},{"a":2022,"n":30,"e":"Pediatria","t":"TEA / Autismo / Diagnóstico","g":"D","x":false,"q":"Sobre a terapêutica antimicrobiana em crianças com sepse, considere as afirmativas a seguir. I. Evidências científicas atuais indicam que o tratamento antimicrobiano deve ser iniciado nas primeiras três horas de reconhecimento da sepse, para aquelas que apresentam associação com disfunção orgânica, e o mais precoce possível, preferencialmente, na primeira hora de atendimento, para aquelas que apresentam choque séptico. Il. Como terapêutica inicial, recomendam-se antibióticos de amplo espectro. O descalonamento será realizado conforme resultados de culturas, exames de atividade a terapêuticas caracterizadas como inapropriadas. HI. A determinação do tempo de tratamento com antimicrobianos deve levar em consideração o local da infecção, a etiologia e a resposta ao tratamento. Na maior parte dos casos, tempos entre sete e dez dias são suficientes, com exceção de infecções por S. aureus e P. aeruginosa, em que regimes de tratamentos maiores são mais eficazes. IV. Independentemente da competência do estado imunológico da criança, não são recomendadas terapêuticas antimicrobianas com múltiplos fármacos, considerando elevado risco de desenvolvimento de resistência bacteriana em pacientes com perspectiva de internações prolongadas. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2022,"n":33,"e":"Ginecologia/Obstetrícia","t":"Câncer ovário / Síndrome de Lynch","g":"C","x":false,"q":"Assinale a alternativa que apresenta, corretamente, o subtipo histopatológico de ovário que está mais comumente associado ao câncer de ovário na Síndrome de Lynch.","o":["Células claras.","Disgerminoma.","Endometroide.","Mucinoso.","Seroso."]},{"a":2022,"n":34,"e":"Ginecologia/Obstetrícia","t":"Tumor células granulosa / Puberdade precoce","g":"D","x":false,"q":"Uma menina, 6 anos de idade, apresenta aumento das mamas e crescimento de pelos pubianos associados a uma massa sólida pélvica em topografia de ovários à É ultrassonografia transabdominal. Assinale a alternativa que apresenta, corretamente, a hipótese diagnóstica mais provável.","o":["Disgerminoma.","Teratoma cístico maduro.","Teratoma imaturo.","Tumor de células da granulosa.","Tumor embrionário."]},{"a":2022,"n":35,"e":"Ginecologia/Obstetrícia","t":"FIV / Complicações obstétricas","g":"E","x":false,"q":"Uma mulher, 46 anos de idade, usuária de metformina, procura aconselhamento pré- concepcional. Ela planeja sua primeira gravidez com seu parceiro, 51 anos de idade, e entende que terá que se submeter à fertilização in vitro (FIV), e utilizar óvulo de doadora jovem. Quanto aos fatores de risco para desenvolvimento de complicações obstétricas, considere os itens a seguir. |. Uso de metformina. Il. FIV e doação de oócitos. E III. Idade paterna avançada. ; IV. Primigesta idosa. Assinale a alternativa correta.","o":["Somente os itens le Il são corretos.","Somente os itens | e IV são corretos.","Somente os itens Ill e IV são corretos.","Somente os itens |, Ile Ill são corretos.","Somente os itens Il, Ille IV são corretos."]},{"a":2022,"n":36,"e":"Ginecologia/Obstetrícia","t":"Gestação e doenças autoimunes","g":"E","x":false,"q":"Questão 36 : Durante o tratamento hormonal, as lesões intestinais endometrióticas devem ser examinadas periodicamente com técnicas de imagem. ; Sobre essa afirmação, assinale a alternativa correta.","o":["A cirurgia é recomendada se o volume do nódulo não diminuir.","As terapias médicas não precisam ser continuadas se os nódulos endometrióticos regredirem completamente.","O risco de transformação maligna é alto.","O risco de obstrução intestinal aguda é alto.","O volume dos nódulos endometrióticos aumenta em 5% a 10% das mulheres."]},{"a":2022,"n":40,"e":"Ginecologia/Obstetrícia","t":"Parto pré-termo / Tocólise / MgSO4","g":"E","x":false,"q":"Quanto aos fatores de risco para doenças graves e morte nas gestantes com Covid-19, considere os itens a seguir. I. Asma. Il. Diabetes gestacional. Ill. Hipertensão crônica. IV. Idade materna maior que 35 anos. Assinale a alternativa correta.","o":["Somente os itens le Il são corretos. E","Somente os itens | e IV são corretos.","Somente os itens Ill e IV são corretos.","Somente os itens |, Ile Ill são corretos.","Somente os itens Il, Ille IV são corretos."]},{"a":2022,"n":43,"e":"Ginecologia/Obstetrícia","t":"Contracepção de emergência","g":"D","x":false,"q":"Uma primigesta, 21 anos de idade, abandonou seu seguimento pós-gravidez molar e, após 10 meses, retorna ao serviço especializado em boas condições clínicas, exceto por um sangramento uterino anormal. Está ansiosa para engravidar novamente. A ultrassonografia pélvica transvaginal mostra uma lesão invasiva no fundo uterino de 6 cm. O nível de HCG pré-tratamento era de 150.000 UI/L e sem evidência de metástases. Após a avaliação inicial, a doença trofoblástica gestacional (DTG) foi classificada e estadiada como estágio |, escore 9 pela FIGO. Em relação ao tratamento de escolha para essa paciente, assinale a alternativa correta.","o":["Não há indicação de quimioterapia, apenas seguimento periódico com dosagens de HCG.","Histerectomia total.","Radioterapia pélvica.","Quimioterapia com regime EMA-CO.","Quimioterapia com regime de metotrexato com fator de resgate (MTX + ácido folínico)."]},{"a":2022,"n":45,"e":"Ginecologia/Obstetrícia","t":"Modificações fisiológicas na gestação","g":"D","x":false,"q":"Em relação às modificações do organismo materno na gestação, considere as afirmativas a seguir. j 1. A elevação da taxa de filtração glomerular leva à diminuição da creatinina plasmática. Il. A relaxina é responsável pela frouxidão dos ligamentos, especialmente da sínfise púbica. HI. As pressões arteriais sistólicas e diastólicas estão diminuídas no segundo trimestre da gestação. IV. Há uma diminuição da resistência à insulina, ao final do segundo trimestre. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2022,"n":46,"e":"Medicina Preventiva","t":"Sistemas de informação em saúde / SIM SIA SIH","g":"B","x":false,"q":"Leia o texto a seguir. Sistemas de Informação em Saúde são um conjunto de mecanismos organizados de coleta, processamento, análise e transmissão da informação com a finalidade de contribuir para o planejamento, a organização e a avaliação de serviços de saúde, assim como subsidiar a formulação e implementação de ações e planos de saúde. (Adaptado de: BRAGA, ). U.; WERNECK, G. L. Vigilância Epidemiológica. In: MEDRONHO, R.","o":["A oportunidade é um importante critério para a classificação das doenças, como de notificação obrigatória, e trata-se de até que ponto a notificação é capaz de desencadear ações de controle efetivas de maneira oportuna.","O Sistema de Informações Ambulatoriais do SUS (SIA/SUS) não permite delinear os perfis de morbidade da população, mas pode contribuir como complemento das análises epidemiológicas, como número de consultas médicas e de exames.","O Sistema de Informações Hospitalares (SIH/SUS) disponibiliza indicadores sociais referentes a áreas de abrangência bem delimitadas, cobertas pelo Programa Saúde da Família.","O Sistema de Informações sobre Mortalidade (SIM) é alimentado pela notificação e investigação de casos de doenças e agravos constantes da lista nacional de doenças de notificação compulsória.",""]},{"a":2022,"n":47,"e":"Medicina Preventiva","t":"Epidemiologia / Razão de Prevalência","g":"E","x":false,"q":"Sobre as medidas de risco epidemiológico, considere as afirmativas a seguir. 1. Risco atribuível é a relação da incidência no grupo de expostos e informa a proporção de doença entre os expostos que poderia ter sido prevenida se a exposição fosse eliminada. Il. O risco relativo indica quantas vezes maior é o risco das pessoas expostas quando comparado ao risco das pessoas não expostas. III. Incidência é a medida do número de casos novos de uma doença, originados de uma população em risco de sofrê-la, durante um período de tempo determinado. IV. Prevalência é a medida do número total de casos existentes de uma doença em um ponto ou período de tempo e em uma população determinada, sem distinguir se são casos novos ou não. Assinale a alternativa correta.","o":["Somente as afirmativas le Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2022,"n":48,"e":"Medicina Preventiva","t":"Epidemiologia / Prevalência depressão","g":"B","x":false,"q":"Os indicadores de saúde são medidas sintéticas que contêm informações relevantes sobre determinados atributos e dimensões do estado de saúde, bem como o desempenho do sistema de saúde. Dessa forma, relacione os indicadores de saúde, na coluna da esquerda, com a sua descrição, na coluna da direita. (I) Mortalidade Materna. (Il) Mortalidade Geral. (III) Mortalidade Proporcional. (IV) Mortalidade Infantil. (V) Indicador de Swaroop e Uemura. (A) Valores altos desse indicador se relacionam às regiões mais desenvolvidas e requerem, para seu cálculo, apenas a informação sobre os óbitos registrados, classificados em uma de duas grandes faixas etárias. (B) Permite avaliar iniquidades entre áreas ou regiões com diferentes níveis de desenvolvimento, considerada um excelente indicador de saúde. (C) É considerada um dos indicadores mais sensíveis a sua situação de saúde e condição social, pois se refere a um grupo populacional bastante vulnerável às condições de vida. y (D) Capacidade de relacionar o nível de saúde de diferentes áreas no tempo, através de dados mais fidedignos do que compõem os coeficientes mais específicos, mais difíceis de serem obtidos. (E) Indica a importância de uma causa ou grupo de causas de morte em uma determinada população, e pode ser utilizada no delineamento de prioridades na área da saúde. Assinale a alternativa que contém a associação correta.","o":["I-A, II-E, HI-D, IV-C, V-B. ,","I-B, II-D, III-E, IV-C, V-A.","I-B, II-E, III-D, IV-A, V-C.","I-E, II-A, III-B, IV-D, V-C.","I-E, II-C, III-B, IV-D, V-A."]},{"a":2022,"n":50,"e":"Medicina Preventiva","t":"Bioestatística / IC95% e Valor de p","g":"C","x":false,"q":"Leia o resumo a seguir. Resumo Objetivo: Analisar os fatores associados aos sintomas articulares crônicos (SAC) em adultos. Método: Trata-se de um estudo de base populacional, com 1.217 adultos, na faixa etária de 20 a 59 anos, na cidade de Viçosa, MG, 2014. A amostragem foi realizada por conglomerados em duplo estágio, sendo as unidades de primeiro estágio os setores censitários e, em seguida, os domicílios. Foram sorteados 30 setores dentre os 99 de Viçosa, por meio de amostragem casual simples, sem reposição. A coleta de dados foi composta por aplicação de questionário contendo questões relativas a variáveis de SAC, sociodemográficas, comportamentais e de saúde. Para verificar as associações, apresentaram-se proporções, razões de prevalência e seus respectivos intervalos de confiança de 95%. A análise múltipla foi realizada por meio da regressão de Poisson, utilizando o conjunto de comandos svy do software Stata, o qual considera o efeito da expansão da amostra na análise dos dados. Resultados: A prevalência estimada de SAC foi de 31,27%, maior nas mulheres (18,45%). Estiveram associadas ao SAC as mulheres (RP 1,49; IC95% 1,23-1,81); as idades de 40 e 49 (RP 1,50; IC95% 1,16-1,92) e 50 e 59 anos (RP 1,55; IC95% 1,07-2,25); o sobrepeso (RP 1,60; IC95% 1,28-2,00); a obesidade (RP 1,60; IC95% 1,11-2,29); e aqueles que autorreferiram realização de trabalho pesado (RP 1,27; IC95% 1,09-1,48). Conclusão: O sexo feminino, na faixa etária de 40 a 59 anos, o sobrepeso, a obesidade e a realização de trabalho pesado foram fatores de risco para SAC em adultos de Viçosa, MG. (Adaptado de: MORAIS; LONGO. Sintomas articulares crônicos em adultos: um estudo de base populacional. Revista da Associação Médica Brasileira. 2017.) A partir dessas informações, considerando as tipologias de estudos epidemiológicos, pode- se afirmar que o estudo em questão apresenta unidade de análise","o":["agregada, posição do pesquisador de intervenção e eixo temporal transversal.","agregada, posição do pesquisador de observação e eixo temporal transversal.","individuada, posição do pesquisador de observação e eixo temporal transversal.","individuada, posição do pesquisador de observação e eixo temporal longitudinal.","individuada, posição do pesquisador de intervenção e eixo temporal longitudinal."]},{"a":2022,"n":51,"e":"Medicina Preventiva","t":"Bioética / Principios","g":"E","x":false,"q":"A tabela, a seguir, apresenta dados de nascidos vivos e óbitos infantis do Brasil, Paraná e Londrina, de 2019, segundo o Departamento de Informática do Sistema Unico de Saúde (DATASUS). Nascidos vivos e óbitos infantis em Brasil, Paraná e Londrina (2019). rasil Paraná Londrina Nascidos vivos | 2.849.146 153.469 6.907 bitos infantis 0a dias 18.402 B39 44 7a 27 dias 6.102 286 13 28 a 364 dias 10.789 45” 20 (Disponível em: DATASUS, 2021.) A partir desses dados, assinale a alternativa correta.","o":["A Mortalidade Neonatal Precoce apresentou o maior impacto sobre a Mortalidade Infantil do Brasil, diferentemente do estado do Paraná, para o qual o maior impacto foi a Mortalidade Pós-Neonatal.","Em Londrina, em 2019, a Mortalidade Neonatal Tardia apresentou o maior impacto sobre a Mortalidade Infantil.","O Coeficiente de Mortalidade Neonatal do Brasil, em 2019, foi menor que o Coeficiente de Mortalidade Pós-Neonatal.","O Coeficiente de Mortalidade Perinatal no estado do Paraná, em 2019, foi de 5,47, inferior ao Brasil e ao município de Londrina.",""]},{"a":2022,"n":52,"e":"Medicina Preventiva","t":"Morte encefálica / Doação de órgãos","g":"B","x":false,"q":"Questão 52 ; A tabela a seguir é um recorte dos resultados do estudo denominado “Prevalência de depressão e fatores associados em mulheres atendidas pela Estratégia de Saúde da Família”, o qual teve por objetivo avaliar a prevalência de depressão e os fatores associados em mulheres de 20 a 59 anos de idade, de áreas cobertas pela Estratégia de Saúde da Família do município da Zona da Mata Mineira. Razão de prevalência (bruta e ajustada) de depressão, segundo variáveis selecionadas, em mulheres, de 20 a 59 anos de idade, assistidas pela ESF do município de Juiz de Fora (MG). teses Lil Em ' Lo Li) r (GONÇALVES, A.M.C. et al. Prevalência de depressão e fatores associados em mulheres é atendidas pela Estratégia de Saúde da Família. ). bras. Psiquiatr., v. 67, n. 2, p. 101-109, abr./jun. 2018.) Na tabela, é possível observar a relação entre algumas variáveis e a presença de depressão, com apresentação da RPbr (Razão de Prevalência Bruta) e RPaj (Razão da Prevalência Ajustada), com seus respectivos intervalos de confiança e valor de p. Com base nessa tabela e nessas informações, assinale a alternativa correta.","o":["A prática de atividade física não apresentou relação estatisticamente significativa com a prevalência de depressão, tanto na análise bruta quanto na ajustada.","Mulheres que trabalham atualmente apresentaram maiores prevalências de depressão em relação às que não trabalham, ou-nunca trabalharam, tanto na análise bruta quanto na ajustada, resultado estatisticamente significativo.","Na análise ajustada, pode-se afirmar que as mulheres com escolaridade até q elementar incompleto apresentaram prevalência de depressão 23% maior que mulheres com escolaridade elementar completa/EM, resultado estatisticamente significativo.","Por meio dos resultados apresentados na tabela, é possível afirmar que as mulheres solteiras e de outras situações conjugais apresentam proteção para o desenvolvimento de depressão.",""]},{"a":2022,"n":53,"e":"Medicina Preventiva","t":"Cuidados paliativos / Papel APS","g":"A","x":false,"q":"Sobre o papel e as potencialidades dos profissionais de saúde na Atenção Primária à Saúde (APS), no que diz respeito aos cuidados paliativos, assinale a alternativa correta.","o":["A importância do vínculo, longitudinalidade, acesso e coordenação do cuidado.","A importância do suporte avançado de vida no caso de urgências e emergências.","A importância de reuniões da equipe para discussão dos casos.","A importância da disponibilidade de opioides na Unidade Básica de Saúde (UBS).",""]},{"a":2022,"n":54,"e":"Medicina Preventiva","t":"Redução de danos / Álcool e drogas / CAPS","g":"C","x":false,"q":"Assinale a alternativa que apresenta, corretamente, o principal modelo de atenção dos serviços de saúde no cuidado aos usuários de álcool e outras drogas psicoativas, em implantação no Brasil.","o":["Assistência e suporte à vulnerabilidade social.","Atenção hospitalar com suporte social.","Centro de atenção psicossocial.","Política de redução de danos.","Promoção de internação."]},{"a":2022,"n":55,"e":"Medicina Preventiva","t":"Atenção básica / Conceito SUS","g":"A","x":false,"q":"Sobre a atenção básica no contexto do SUS, é correto afirma que constitui um conjunto de ações","o":["de caráter individual ou coletivo, voltadas para a promoção da saúde, prevenção de agravos, tratamento e reabilitação.","de vigilância epidemiológica e sanitária importantes para o planejamento das ações de saúde, no nível central do Ministério da Saúde.","importantes do sistema de saúde sem a necessidade de contato com outros níveis de assistência.","que utilizam tecnologias de baixa complexidade e alta densidade tecnológica.","voltadas a resolver os problemas de saúde de menor frequência e relevância das populações."]},{"a":2022,"n":57,"e":"Medicina Preventiva","t":"SUS / Regulamentação e leis","g":"D","x":false,"q":"Assinale a alternativa que apresenta, corretamente, os princípios doutrinários do Sistema Único de Saúde (SUS).","o":["Acolhimento, Descentralização e Humanização.","Acolhimento, Referência e Contrarreferência.","Acolhimento, Resolutividade e Integralidade.","Universalização, Equidade e Integralidade.","Universalização, Hierarquização e Humanização."]},{"a":2022,"n":58,"e":"Medicina Preventiva","t":"Vigilância epidemiológica / SINAN","g":"E","x":false,"q":"As doenças do trabalho constituem a um conjunto de danos ou agravos que incidem sobre a saúde dos trabalhadores, causados, desencadeados ou agravados por fatores de risco presentes nos locais de trabalho. Essas doenças se manifestam de forma lenta, insidiosa, podendo levar vários anos para aparecerem. Isso, na prática, tem sido um fator que dificulta o estabelecimento da relação entre uma doença sob investigação e o trabalho. Também são consideradas doenças do trabalho aquelas provenientes de contaminação acidental no exercício do trabalho e as doenças endêmicas quando contraídas por exposição ou contato direto, determinado pela natureza do trabalho realizado. Sobre a classificação dos riscos presentes nos locais de trabalho, considere as afirmativas a seguir. I. Organização do trabalho: comunicação de acidente de trabalho. Il. Agentes físicos: ruído, vibração, calor, frio, luminosidade, ventilação, umidade, pressões anormais e radiação. Ill. Agentes químicos: substâncias químicas tóxicas presentes nos ambientes de trabalho nas formas de gases, fumo, névoa, neblina e/ou poeira. IV. Agentes biológicos: fungos, parasitas, bactérias e vírus. Assinale a alternativa correta.","o":["Somente as afirmativas le Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2022,"n":59,"e":"Medicina Preventiva","t":"Covid-19 / Vigilância e controle","g":"D","x":false,"q":"Com relação às repercussões da pandemia da Covid-19 na relação trabalho e saúde, sob a perspectiva de risco e vulnerabilidade dos trabalhadores, considere as afirmativas a seguir. 1. A pandemia tem se configurado como uma crise humanitária, uma vez que tanto a doença quanto suas medidas de contenção geram efeitos socioeconômicos persistentes. Il. A categoria trabalho assume um papel relevante, seja pela viabilidade de manutenção do distanciamento social e das condições de vida, permitidas pelo vínculo de trabalho, seja pela impossibilidade de adoção das estratégias de proteção devido à precarização do trabalho. II. Profissionais de saúde são mais acometidos, mas, embora tenham maior acesso ao diagnóstico, persistem lacunas sobre as demais categorias profissionais, bem como sobre os determinantes sociais que implicam uma maior vulnerabilidade relacionada ao trabalho. IV. Com a evolução da pandemia ainda esteja em curso, prevê-se que as desigualdades sociais se intensificarão com a profunda retração da economia, não sendo os trabalhadores alvo prioritário da atenção no controle e disseminação da doença, nem o eixo articulador das políticas públicas de proteção à saúde. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2022,"n":60,"e":"Medicina Preventiva","t":"Indicadores de saúde / Morbidade","g":"D","x":false,"q":"João da Silva, 38 anos de idade, trabalha no Hospital Universitário, como Auxiliar de Enfermagem, há 20 anos. Desde o início da pandemia pela Covid-19, ele tem trabalhado em turnos de 12 por 36 horas, na Unidade de Terapia Intensiva (UTI). O volume de trabalho aumentou consideravelmente, e ele tem se sensibilizado enormemente com a elevada taxa de mortalidade de pacientes jovens. Dessa forma, não consegue dormir, mesmo nos dias de folga, e sua mulher se queixa de que ele anda muito irritado e desatento. Em função dessa situação, João aumentou o consumo de álcool para se desligar da tensão. No último plantão noturno, precisamente às 2h45min da madrugada, foi realizar a coleta de exames por venopunção periférica de um paciente de 25 anos de idade, internado por Covid-19, em estado grave, com insuficiência renal aguda e sorologia para hepatite B em análise. Ao introduzir a agulha, lacerou o seu dedo. Ficou extremamente preocupado e irritado consigo mesmo. Lembrou-se de que, devido à correria da vida, havia tomado somente a primeira dose da vacina contra a hepatite Be não cuidou mais disso. João, angustiado, procurou a enfermeira chefe da UTI, que imediatamente o encaminhou para o Ambulatório do Trabalhador do Hospital. Em relação ao manejo do acidente ocupacional do auxiliar de enfermagem, visando à redução de seus possíveis danos, considere as afirmativas a seguir. 1. O trabalhador apresenta, como fatores de risco para acidente de trabalho, no âmbito individual, a saúde mental comprometida, acarretando insônia, irritação, desatenção, consumo de álcool e falta de autocuidado. Il. O trabalhador apresenta, como fatores de risco, no cenário de trabalho, provável Síndrome de Burnout, caracterizada pelo estado de tensão emocional e estresse provocados por condições de trabalho desgastantes. : Ill. Para reduzir a vulnerabilidade, à qual os profissionais de saúde da UTI estão expostos, devem-se acolher os membros da equipe em suas necessidades de saúde, considerando a singularidade de cada um, segundo os protocolos de biossegurança. IV. No que se refere ao risco de contaminação por hepatite B, deve ser avaliado o status vacinal e sorológico do profissional exposto, além da profilaxia realizada, preferencialmente, com o antirretroviral Oseltamivir, por 28 dias. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2022,"n":61,"e":"Cirurgia Geral","t":"Empiema pleural / Tratamento","g":"D","x":false,"q":"Assinale a alternativa que apresenta, corretamente, o local mais frequente de arteriosclerose obliterante periférica por consequência de trombose.","o":["Bifurcação aórtica.","Bifurcação carotídea.","Bifurcação femoral.","Femoral (canal dos adutores).","Poplítea distal."]},{"a":2022,"n":62,"e":"Cirurgia Geral","t":"Empiema pleural / Estadiamento e conduta","g":"D","x":false,"q":"O empiema pleural é sabidamente uma situação clínica gravíssima e potencialmente letal, se não tratado adequadamente e em tempo hábil. O seu tratamento deve ter sempre um componente clínico, com manejo adequado da sepse, comum na maioria deles, e um componente cirúrgico/invasivo. Como é sabido, o tratamento tanto clínico como cirúrgico varia de acordo com as três fases em que o empiema pleural pode ser classificado: fase exsudativa, fase fibrinopurulenta e fase de organização. Assinale a alternativa que apresenta a sequência correta de tratamento cirúrgico, em linhas gerais, para suas três fases evolutivas.","o":["Decorticação pulmonar em qualquer fase, pois o empiema pleural necessita de limpeza vigorosa do espaço pleural, para a sua rápida resolução.","Drenagem pleural para todas as fases, pois o mais importante é prover uma via de saída para o pus e, que, somada a medidas clínicas corretas, trará evolução satisfatória.","Drenagem pleural, drenagem aberta e decorticação pulmonar.","Drenagem pleural, decorticação pulmonar e drenagem aberta.","Drenagem aberta, decorticação pulmonar e drenagem pleural."]},{"a":2022,"n":64,"e":"Urologia","t":"Cálculo urinário ácido úrico / pH urina","g":"A","x":false,"q":"Assinale a alternativa que apresenta, corretamente, o teste laboratorial inicial que promove a pista diagnóstica mais importante em pacientes com cálculo urinário de ácido úrico.","o":["pH da urina.","Cálcio na urina.","Sódio na urina.","Níveis séricos de ácido úrico.","Níveis urinários de ácido úrico. a"]},{"a":2022,"n":65,"e":"Cirurgia do Trauma","t":"Trauma abdominal / FAST / Conduta","g":"C","x":false,"q":"Paciente vítima de trauma abdominal fechado encontra-se estável hemodinamicamente. É realizado o Focused Assessment Sonography for Trauma (FAST), conforme demonstrado na figura a seguir. q Mem sê o- | E 4 e * - a am 5 — ad E mm EG e - “a mau] - as A NE” a, : E- S E z h a oia hr À em EA = ti - Na - = na 16= Assinale a alternativa que apresenta, corretamente, o diagnóstico e a conduta para esse caso.","o":["FAST positivo, laparotomia exploradora.","FAST positivo, exame físico seriado.","FAST positivo, tomografia de abdome.","FAST negativo, tomografia de abdome.","FAST negativo, exame físico seriado."]},{"a":2022,"n":66,"e":"Cirurgia do Trauma","t":"Trauma esplênico / Manejo não operatório","g":"A","x":false,"q":"Questão 66 : Paciente, 22 anos de idade, vítima de ferimento por arma branca, após briga familiar, é admitido no pronto-socorro. Apresenta-se com vias aéreas pérvias, estável ; hemodinamicamente, consciente e orientado. Apresenta abolição do murmúrio no hemitórax esquerdo e ferimento de 3,0 cm inframamilar no 7º EIC esquerdo, sem sangramento pelo orifício. O FAST encontra-se normal. Em relação à propedêutica subsequente para esse caso, assinale a alternativa correta.","o":["Drenagem torácica seguida de laparoscopia.","Exame físico seriado e observação clínica por 24 horas.","Exploração digital e laparotomia exploradora.","Exploração local da lesão e tomografia de abdome.","Toracotomia anterolateral esquerda."]},{"a":2022,"n":67,"e":"Cirurgia do Trauma","t":"Trauma hepático / Controle de danos","g":"B","x":false,"q":"Paciente em pós-operatório imediato de esplenectomia, por trauma abdominal fechado, é admitido no CTI. Após 12 horas, evolui instável hemodinamicamente com pressão arterial de 80/60 mmHg e frequência cardíaca de 130 bpm. Apresenta nível de hemoglobina de 12,8 g/dL e não há sinais de sangramento no dreno abdominal. Acerca da ressuscitação hemodinâmica, assinale a alternativa correta.","o":["A estabilidade hemodinâmica deverá ser atingida através do uso de vasopressores, preferencialmente a noradrenalina.","A ultrassonografia da veia cava pode auxiliar a reposição volêmica caso apresente colabamento acima de 50% durante a respiração.","Deverá ser realizada expansão volêmica com base apenas na pressão venosa central.","O paciente certamente apresenta coagulopatia secundária a sangramento, que deverá ser corrigida com transfusão na proporção de 1:1:1.",""]},{"a":2022,"n":68,"e":"Cirurgia Geral","t":"Câncer retal / Tratamento neoadjuvante","g":"C","x":false,"q":"Mulher, 45 anos de idade, é admitida, em UTI, consciente e orientada, em ar ambiente, e estável hemodinamicamente em pós-operatório imediato de cirurgia plástica. Segundo a equipe, o procedimento transcorreu sem intercorrências e consistiu em mamoplastia redutora com prótese e abdominoplastia com dermolipectomia. Após 4 horas da admissão, a paciente evoluiu com insuficiência respiratória, necessidade de ventilação mecânica e instabilidade hemodinâmica, necessitando de doses crescentes de droga vasoativa. Acompanhava oligúria, aumento da pCOz e diminuição da pOz arteriais. Considerando a principal hipótese etiológica para essa complicação, assinale a alternativa que apresenta, corretamente, a(s) conduta(s) diagnóstica(s) para o caso, nesse momento.","o":["Angiotomografia de tórax e ecocardiograma. y","Hemocultura e radiografia de tórax.","Medida da pressão intravesical.","Troponina e eletrocardiograma.","Tomografia de abdome com contraste."]},{"a":2022,"n":70,"e":"Cirurgia Geral","t":"Hérnias parede abdominal","g":"B","x":false,"q":"Paciente, 32 anos de idade, chega ao pronto-socorro com história de ter notado que suas escleras e pele tornaram-se amareladas, há 1 semana, e, há 1 dia, percebe febre de 38,2ºC e dor de andar superior de abdome. Ao exame físico, apenas icterícia de ++/4 e dor à palpação de andar superior de abdome sem sinais de peritonite. O restante do exame físico era normal. Os exames laboratoriais mostravam: bilirrubina total de 7,2 mg/dL (normal até 1,2 mg/dL), a custas de direta, gamaglutamil transferase 198 U/L (normal 50 U/L), fosfatase alcalina 480 U/L (normal 129 U/L), hemograma com 18.000 leucócitos com distribuição normal, proteína C reática - PCR 23 mg/dL (normal 0,3 mg/dL), aspartato aminotransferase - AST 86 U/L (normal 40 U/L), alanina aminotransferase - ALT 102 U/L (normal 56 U/L), amilase normal, glicemia normal. Solicitado ultrassom de abdome total que evidenciou colecistopatia litiásica (vários cálculos menores que 1 cm), dilatação de vias biliares intra e extra-hepática (colédoco com 1,2 cm). Com base no texto, assinale a alternativa que apresenta, corretamente, a melhor conduta terapêutica a ser indicada para esse paciente no momento do diagnóstico.","o":["Antibioticoterapia endovenosa e colecistectomia videolaparoscópica.","Antibioticoterapia endovenosa e colangiopancreatografia retrógada endoscópica (CPRE).","Antibioticoterapia endovenosa e colecistectomia videolaparoscópica com colangiografia intraoperatória.","Colecistectomia videolaparoscópica e colédocotomia com exploração das vias biliares.","Colangiopancreatografia retrógada endoscópica (CPRE)."]},{"a":2022,"n":71,"e":"Pediatria","t":"Atresia de esôfago / Diagnóstico","g":"A","x":false,"q":"Paciénte, 32 anos de idade, chega ao pronto-socorro com história de ter notado que suas escleras e pele tornaram-se amareladas, há 1 semana, e, há 1 dia, percebe febre de 38,2ºC e dor de andar superior de abdome. Ao exame físico, apenas icterícia de ++/4 e dor à palpação de andar superior de abdome sem sinais de peritonite. O restante do exame físico era normal. Os exames laboratoriais mostravam: bilirrubina total de 7,2 mg/dL (normal até 1,2 mg/dL), a custas de direta, gamaglutamil transferase 198 U/L (normal 50 U/L), fosfatase alcalina 480 U/L (normal 129 U/L), hemograma com 18.000 leucócitos com distribuição normal, proteína C reática - PCR 23 mg/dL (normal 0,3 mg/dL), aspartato aminotransferase - AST 86 U/L (normal 40 U/L), alanina aminotransferase - ALT 102 U/L (normal 56 U/L), amilase normal, glicemia normal. Solicitado ultrassom de abdome total que evidenciou colecistopatia litiásica (vários cálculos menores que 1 cm), dilatação de vias biliares intra e extra-hepática (colédoco com 1,2 cm). Com base no texto, assinale a alternativa que apresenta, corretamente, a principal hipótese diagnóstica.","o":["Colangite.","Colecistite aguda.","Neoplasia de cabeça de pâncreas.","Pancreatite.","Síndrome de Mirizi."]},{"a":2022,"n":72,"e":"Pediatria","t":"Imperforação anal / Diagnóstico e tratamento","g":"E","x":false,"q":"Assinale a alternativa que apresenta, corretamente, o fio de sutura que é monofilamentar e possui tempo de absorção entre 90 e 180 dias.","o":["Categute simples.","Categute cromado.","Poliglactina.","Polipropileno.","Polidioxanona."]},{"a":2022,"n":73,"e":"Pediatria","t":"Intussuscepção intestinal / Manejo","g":"C","x":false,"q":"Assinale a alternativa que apresenta, corretamente, o procedimento cirúrgico que pode ser indicado para o tratamento da dor, refratária ao tratamento clínico, nos pacientes com pancreatite crônica.","o":["Cirurgia de Whippel.","Cirurgia de Warren.","Cirurgia de Puestow.","Cirurgia de Sugiura.","Cirurgia de Traverso."]},{"a":2022,"n":74,"e":"Urologia","t":"Duplicidade pielo-ureteral / Patologia associada","g":"D","x":false,"q":"Na duplicidade pielo-ureteral completa, mais comum nas crianças, a patologia mais associada é","o":["a válvula da uretra posterior.","aestenose da junção ureteropiélica.","a estenose da junção vesicoureteral.","o refluxo vesicoureteral.","o ureter retrocava. 5"]},{"a":2022,"n":75,"e":"Pediatria","t":"Atresia de esôfago com fístula traqueoesofágica","g":"E","x":false,"q":"Questão 75 ' Recém-nascido a termo, parto via vaginal, apgar 9/9, apresentando salivação excessiva após o nascimento. Durante a amamentação, evoluiu com regurgitação, cianose e insuficiência respiratória. Não foi realizada passagem de sonda nas narinas, ou pela boca, na sala de parto. USG pré-natal evidenciava poli-idramnia. Raios X simples com 8 horas de vida: visualização do coto esofágico proximal contrastado pelo ar e presença de ar no intestino delgado. Assinale a alternativa que apresenta, corretamente, a hipótese diagnóstica mais provável e o exame para confirmá-la.","o":["Anomalia anorretal - realizar o invertograma, após 24 horas de vida.","Pâncreas anular - repetir a radiografia simples de abdome, após 24 horas de vida.","Atresia duodenal - repetir a radiografia simples de abdome, após 24 horas de vida.","Atresia de esôfago sem fístula traqueoesofágica - repetir a radiografia simples de abdome, após 24 horas de vida.",""]},{"a":2023,"n":6,"e":"Medicina Preventiva","t":"Terceirização / Precarização do trabalho","g":"B","x":false,"q":"A prática da avaliação é fundamental para identificar se a assistência à saúde ofertada a uma determinada população está sendo compatível com as suas necessidades. Sobre os diferentes enfoques da avaliação, considere as afirmativas a seguir. 1. A avaliação de acessibilidade mede o grau de recursos de poder dos usuários e os obstáculos colocados pelos serviços de saúde na busca pela obtenção da atenção. Il. A avaliação de cobertura mede o número médio de atendimentos que cada pessoa recebeu frente ao preconizado. HI. A avaliação de eficiência mede o quanto as intervenções estão priorizando os grupos sociais com maior necessidade. IV. A avaliação de utilização mede o uso efetivo que se faz de um recurso que se encontra disponível. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2023,"n":7,"e":"Medicina Preventiva","t":"Epidemiologia / Bioestatística","g":"D","x":false,"q":"A Atenção Primária a Saúde (APS) constitui um dos níveis de atenção à saúde mais estratégicos do Sistema Unico de Saúde (SUS). Entre as razões que a tornam tão fundamental para o sistema de saúde, considere as afirmativas a seguir. 1. É o nível de atenção com maior possibilidade de produção de vínculo com as pessoas. Il. É o nível de atenção com grande amplitude e complexidade de ações, desde preventivas a curativas. HI. É o nível de atenção mais acessado pela população brasileira. IV. É o nível de atenção mais preparado para atender condições agudas urgentes e emergentes. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.",""]},{"a":2023,"n":10,"e":"Medicina Preventiva","t":"APS / Atributos","g":"A","x":false,"q":"Considerando a complexidade do SUS, é fundamental que a gestão desse sistema seja organizado e pautado em instrumentos que ofereçam subsídios para a atuação dos gestores de saúde. Em relação aos instrumentos de planejamento do SUS, considere os itens a seguir. I. Relatório de gestão. Il. Programação anual de saúde. III. Lei Orçamentária Anual. IV. Lei de Diretrizes Orçamentária. É Assinale a alternativa correta.","o":["Somente os itens le Il são corretos.","Somente os itens | e IV são corretos.","Somente os itens Ill e IV são corretos.","Somente os itens |, Ile Ill são corretos.","Somente os itens Il, Ille IV são corretos."]},{"a":2023,"n":11,"e":"Medicina Preventiva","t":"Vigilância epidemiológica","g":"C","x":false,"q":"O Sistema Único de Saúde tornou-se constitucional a partir de 1988. A implementação de um sistema universal em um país de abrangência continental exige que este seja regulamentado por meio de atos normativos que apresentem suas diretrizes e formas de organização. : Assinale a alternativa que apresenta, corretamente, as duas leis que foram consideradas as Leis Orgânicas do SUS.","o":["Leis nº 196 e nº 198, de 1988.","Leis nº 80 e nº 90, de 1989.","Leis nº 8.080 e nº 8.142, de 1990.","Leis nº 13.502 e nº 13.507, de 1991.","Leis nº 141 e nº 142, de 2011."]},{"a":2023,"n":12,"e":"Medicina Preventiva","t":"Epidemiologia / Medidas de frequência","g":"E","x":false,"q":"O Sistema Único de Saúde (SUS), criado na 82 Conferência Nacional de Saúde, é pautado em três grandes princípios. Analise a situação descrita a seguir. S. M. B. estava de férias em uma cidade no litoral do Brasil. Durante a realização de uma trilha, acidentou-se e teve fratura em uma das mãos. Procurou o serviço do município, que era referência para casos de trauma. Depois de algumas horas, foi atendido e teve seu problema de saúde resolvido. Assinale a alternativa que apresenta, corretamente, o princípio do SUS retratado nessa situação.","o":["Controle Social.","Equidade.","Hierarquização.","Regionalização.","Universalidade."]},{"a":2023,"n":13,"e":"Medicina Preventiva","t":"Epidemiologia / Estudos / Odds Ratio","g":"E","x":false,"q":"A partir da Constituição Federal de 1988, a saúde passou a ser um “direito de todos e dever do Estado”. Dessa forma é papel do Estado promover o financiamento desse sistema. Em 2000, a Emenda Constitucional 29 previa o quanto cada ente federativo deveria investir em saúde. Mais tarde, em 2012, essa emenda foi regulamentada. Assinale a alternativa que apresenta, corretamente, a porcentagem, mínima, que o município deve investir em saúde.","o":["3%","5%","7%","12%","15%"]},{"a":2023,"n":14,"e":"Medicina Preventiva","t":"Epidemiologia / OR HAS não diagnosticada","g":"A","x":false,"q":"Foi realizado um estudo com o objetivo de identificar fatores associados à hipertensão arterial sistêmica (HAS) não diagnosticada entre adultos mais velhos no Brasil. Foram avaliados 5.416 participantes hipertensos do Estudo Longitudinal da Saúde dos Idosos Brasileiros. HAS não diagnosticada foi definida como a presença de pressão arterial (PA) 140/90 mmHg sem diagnóstico prévio. Os resultados foram os seguintes: * Ter uma doença crônica (OR: 0,54, IC 95% 0,44-0,66). : * Cor preta (OR: 0,67, IC 95% 0,49-0,91). e Ter entre 60 e 69 anos de idade (OR: 0,68, IC 95% 0,55-0,85). * Sexo masculino (OR: 1,27, IC 95% 1,05-1,54). * Consumo de álcool (OR: 1,36, IC 95% 1,09-1,68). Com base nesses resultados, considere as afirmativas a seguir. I. Ter de 60 a 69 anos de idade é considerado fator de proteção (menor chance) para a HAS não diagnosticada. Il. O sexo masculino possui uma associação de risco (maior chance) para a HAS não diagnosticada. Ill. O consumo de álcool não apresenta associação para maior ou menor chance de HAS não diagnosticada. IV. A cor preta não apresenta associação para maior ou menor chance de HAS não diagnosticada. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2023,"n":15,"e":"Medicina Preventiva","t":"Diagrama de controle endemia/epidemia","g":"D","x":false,"q":"O diagrama de controle é uma técnica estatística comumente utilizada para identificar processos endêmicos e epidêmicos. A partir dessa informação, analise o diagrama a seguir. e 10 A nA \"ma : = A E: o Pd je É, Com base nesse diagrama, assinale a alternativa correta.","o":["A doença permaneceu endêmica durante todo o ano.","A doença apresentou um caráter endêmico durante os meses de abril a setembro.","A doença apresentou um caráter epidêmico durante os meses de janeiro a março.","A doença apresentou um caráter epidêmico durante os meses de abril a setembro.","A doença apresentou um caráter epidêmico durante os meses de outubro a dezembro."]},{"a":2023,"n":16,"e":"Medicina Preventiva","t":"Rastreamento e prevenção","g":"B","x":false,"q":"Realizou-se um estudo em determinado município com o objetivo de avaliar os fatores associados a retinopatia em pacientes com diabetes mellitus. Para tanto, os pesquisadores realizaram os seguintes procedimentos metodológicos: foram identificadas 56 pessoas com diabetes mellitus e retinopatia, que foram comparados com um grupo controle de 74 pessoas com diabetes mellitus, mas sem retinopatia. Com base nessas informações, assinale a alternativa que apresenta, corretamente, o tipo desse estudo.","o":["É um ensaio clínico, que tem como vantagem a aferição de eventos prevalentes.","É um estudo caso-controle, que tem como umas das principais limitações a constituição de um grupo controle.","É um estudo de coorte, que tem como vantagem ser de curta duração.","É um estudo ecológico, que tem como vantagem o uso de dados primários.",""]},{"a":2023,"n":17,"e":"Medicina Preventiva","t":"Financiamento SUS","g":"B","x":false,"q":"O Coeficiente de Mortalidade Geral (CMG) representa o risco de óbito em uma população. É calculado por meio da relação entre o total de óbitos e o número de habitantes em determinado período de tempo. Apesar de ser um indicador muito conhecido apresenta limites. Assinale a alternativa que descreve, corretamente, o limite desse indicador.","o":["Apresenta distorções quando calculado em populações muito pequenas.","Desconsidera a estrutura etária das populações.","Não permite comparações em diferentes localidades. ;","Não pode ser usado em conjunto com outros indicadores.","Não pode ser utilizado em populações predominantemente idosas."]},{"a":2023,"n":18,"e":"Medicina Preventiva","t":"ESF / Equipes de saúde da família","g":"C","x":false,"q":"O Coeficiente de Mortalidade Infantil (CMI) representa um dos principais indicadores para medir a vulnerabilidade social de uma determinada região. Sobre esse indicador, é correto afirmar que ele é calculado considerando o número de","o":["nascidos vivos no numerador.","óbitos de menores de 28 dias de vida no numerador.","óbitos de menores de 1 ano de idade no numerador.","óbitos de menores de 1 ano de idade no denominador.","óbitos totais no denominador. ;"]},{"a":2023,"n":19,"e":"Medicina Preventiva","t":"NASF / Apoio matricial","g":"D","x":false,"q":"Os conceitos de prevalência e incidência são fundamentais para compreender como certos agravos afetam uma determinada população. Considere que, em determinado município, no ano de 2020, foram diagnosticados 15 casos de tuberculose. Desses, cinco obtiveram cura no mesmo ano. Em 2021, mais três casos foram diagnosticados. Diante dessas informações, assinale a alternativa correta.","o":["No ano de 2020, a incidência de casos de tuberculose foi de 10.","No ano de 2020, a prevalência de casos de tuberculose foi de 10.","No ano de 2021, a prevalência de casos de tuberculose foi de 3.","No ano de 2021, a prevalência de casos de tuberculose foi de 13.","No ano de 2021, a incidência de casos de tuberculose foi de 13."]},{"a":2023,"n":20,"e":"Medicina Preventiva","t":"Lei 8.142 / Controle social SUS","g":"D","x":false,"q":"A epidemiologia descritiva constitui uma ciência fundamental para compreender o comportamento de determinada doença, eventos ou agravos à saúde. Assinale a alternativa que apresenta, corretamente, as três características primordiais para descrever os agravos à saúde.","o":["Classe social, estilo de vida e escolaridade.","Epidemia, endemia e pandemia.","Idade, raça e etnia.","Pessoa, tempo e local.","Prevalência, incidência e letalidade."]},{"a":2023,"n":21,"e":"Cirurgia Geral","t":"Hérnias / Anatomia da parede abdominal","g":"B","x":false,"q":"É conhecido, na prática clínica diária em cirurgia torácica, que várias situações de patologias pulmonares evoluem de forma insidiosa, levando a importante destruição da arquitetura do parênquima pulmonar, como, por exemplo, a tuberculose pulmonar, o abcesso pulmonar, os traumatismos penetrantes de alto impacto, produzindo sequelas pulmonares conhecidas como fibroatelectasias e cavernas pulmonares. Comumente essas sequelas têm indicação de serem tratadas com ressecção pulmonar do local destruído. Quanto às condições clínicas que levam, classicamente, a essa indicação cirúrgica, ; assinale a alternativa correta.","o":["Presença de hemoptise, tosse crônica, rouquidão persistente.","Presença de hemoptise, presença de caverna pulmonar com bola fúngica, infecções (pneumonias) de repetição.","Presença de escarro purulento permanente, presença de cavernas pulmonares, presença de insuficiência respiratória secundária a sequela pulmonar.","Presença de dor torácica, tosse crônica, halitose.",""]},{"a":2023,"n":22,"e":"Cirurgia Geral","t":"Trauma abdominal / Cirurgia","g":"E","x":false,"q":"Questão 22 : Sobre cirurgias ambulatoriais pediátricas, considere as afirmativas a seguir. 1. Pacientes com testículo localizado no canal inguinal não redutível à bolsa testicular devem ser submetidos à orquidopexia, preferencialmente, após os 18 meses de idade, para minimizar riscos anestésicos e cirúrgicos. Il. Balanopostites de repetição e parafimose são indicações formais de postectomia. III. Cisto do ducto tireoglosso, geralmente, apresenta-se clinicamente como um nódulo cervical palpável na linha média que se move cranialmente durante a protrusão da língua. IV. A persistência da patência do conduto peritôneo-vaginal pode originar hérnia inguinal e hidrocele comunicante. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas Il e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2023,"n":23,"e":"Cirurgia Geral","t":"Cirurgia bariátrica / Complicações","g":"D","x":false,"q":"Sobre as afecções de tratamento cirúrgico na infância, relacione os diagnósticos, na coluna da esquerda, com seus respectivos sinais/sintomas, na coluna da direita. (1) Apendicite aguda. (A) Atraso na primeira eliminação de mecônio. (II) Megacólon congênito. (B) Vômitos de conteúdo lácteo após as mamadas. (Ill) Atresia de duodeno. (C) Evacuação de muco com aspecto de “geleia de morango”. (IV) Estenose hipertrófica de piloro. (D) Sinal radiográfico de dupla bolha. (V) Invaginação intestinal. (E) Dor abdominal, inicialmente difusa, evoluindo com localização em fossa ilíaca direita. Assinale a alternativa que contém a associação correta.","o":["I-B, II-A, III-E, IV-D, V-C.","I-B, II-E, III-C, IV-D, V-A.","I-D, II-E, II-C, IV-A, V-B.","I-E, II-A, HII-D, IV-B, V-C.","I-E, II-C, HII-D, IV-B, V-A."]},{"a":2023,"n":24,"e":"Urologia","t":"Litíase urinária / Diátese gotosa","g":"B","x":false,"q":"Assinale a alternativa que apresenta, corretamente, o tratamento clínico de litíase urinária mais apropriado para um paciente com diátese gotosa.","o":["Alopurinol.","Citrato de potássio.","Fluidos aumentados.","Restrição de cálcio na dieta.","Tiazidas. E"]},{"a":2023,"n":25,"e":"Urologia","t":"Cálculos urinários / Ácido úrico","g":"D","x":false,"q":"Questão 25 ' Assinale a alternativa que apresenta, corretamente, a anormalidade mais comum identificada em pacientes com cálculos de ácido úrico.","o":["Acidose tubular renal distal.","Alta concentração de ácido úrico sérico.","Baixa concentração de ácido úrico urinário.","Urina ácida.","Urina alcalina."]},{"a":2023,"n":26,"e":"Urologia","t":"Priapismo / Anemia falciforme","g":"A","x":false,"q":"Assinale a alternativa que apresenta, corretamente, uma doença na qual o priapismo é mais comumente associado.","o":["Anemia falciforme.","Depressão orgânica.","Doença de Parkinson.","Doença de Peyronie.","Leucemia."]},{"a":2023,"n":27,"e":"Cirurgia Vascular","t":"Oclusão arterial aguda / Rutherford","g":"A","x":false,"q":"Paciente cardiopata, 55 anos de idade, hipertenso, atendido no pronto-socorro, com dor, em repouso, no membro inferior direito, sem déficit neurológico sensitivo ou motor, enchimento capilar normal. Ao Doppler, apresenta sinais arteriais e venosos audíveis e pressão no tornozelo de 80 mmHg. Em relação à classificação de Rututheford para a viabilidade dos membros na oclusão arterial aguda, assinale a alternativa correta.","o":["Rutherford |, membro viável.","Rutherford |, membro marginalmente ameaçado.","Rutherford Ila, membro marginalmente ameaçado.","Rutherford llb, membro com ameaça imediata.","Rutherford Ill, membro inviável."]},{"a":2023,"n":28,"e":"Cirurgia Vascular","t":"Aneurisma aorta abdominal","g":"E","x":false,"q":"Um paciente dá entrada na emergência com ferimento único por arma de fogo na coxa direita. Nessas situações, é necessário avaliar a possibilidade de trauma vascular e, assim, devem-se reconhecer os sinais maiores e menores que indicam essa possibilidade. Assinale a alternativa que apresenta, corretamente, os sinais que são considerados maiores (Hard Signs) de lesão vascular em trauma penetrante das extremidades.","o":["Frêmito e déficit neurológico. ;","Hematoma em expansão e pulsos diminuídos.","Sangramento ativo e história de torniquete, no atendimento. ;","Sangramento não pulsátil e lesão próxima de trajeto vascular.","Sopro audível e ausência de pulsos distais."]},{"a":2023,"n":30,"e":"Cirurgia Geral","t":"Pancreatite aguda / Exames complementares","g":"C","x":false,"q":"Paciente feminina, 77 anos de idade, é admitida no serviço de emergência devido a náuseas, vômitos e distensão abdominal, há 10 dias. Última evacuação há 5 dias e desde então não elimina gases. Tem diagnóstico de dislipidemia, obesidade e colelitíase. Nega cirurgias prévias. Ao exame físico, apresenta bom estado geral, desidratada, eupneica. Abdome: distendido, ruídos hidroaéreos aumentados, doloroso à palpação profunda, sem irritação peritoneal. Toque retal: sem fezes na ampola. Exames laboratoriais: Hb: 11,0 g/dL; Ht: 38%; Creatinina: 1,9 mg/dL; Ureia: 80 mg/dL. Demais exames sem alterações. Realizada a tomografia de abdome, apresentada a seguir. ca +. 4 po dr [ Ras = | \" | RA » VES + à A , \"a a 1 : | o 6 Assinale a alternativa que apresenta, corretamente, a principal hipótese diagnóstica.","o":["Abdome agudo obstrutivo por bridas.","Colecistite enfisematosa.","Ílio biliar.","Síndrome de Ogilvie.","Volvo de sigmoide."]},{"a":2023,"n":31,"e":"Cirurgia Geral","t":"Pancreatite aguda / Critérios gravidade","g":"A","x":false,"q":"Paciente masculino, 56 anos de idade, encontra-se na unidade de terapia intensiva no 6º dia pós-operatório de laparotomia longitudinal mediana por abdome agudo inflamatório. Após crise de tosse, em decorrência de quadro associado de Covid-19, apresenta drenagem súbita de líquido serossanguinolento em grande quantidade em ferida operatória. Em relação à conduta apropriada, assinale a alternativa correta.","o":["Abrir a ferida operatória e avaliar a fáscia.","Indicar laparotomia exploradora.","Iniciar antibioticoterapia de amplo espectro.","Reforçar o curativo da ferida e tranquilizar o paciente pelo diagnóstico de seroma.","Tomografia de abdome com contraste endovenoso."]},{"a":2023,"n":32,"e":"Cirurgia Geral","t":"Colecistite aguda / Tratamento","g":"D","x":false,"q":"Observe a imagem a seguir. d Re à 4 DO 7 Paciente vítima de ferimento por arma branca (faca) em parede anterior do abdome dá entrada no pronto- - socorro em ar ambiente, estável hemodinamicamente, consciente e orientado. Ao exame abdominal, sem sinais de peritonite ou sangramento ativo. Considerando esse caso e a imagem, assinale a alternativa que apresenta, corretamente, a próxima conduta nesse momento.","o":["Observação clínica e exame físico seriado.","Laparotomia exploradora.","Laparoscopia.","Exploração digital da lesão.","Tomografia de abdome."]},{"a":2023,"n":33,"e":"Cirurgia Geral","t":"Úlcera péptica perfurada / Diagnóstico","g":"E","x":false,"q":"Paciente masculino, 55 anos de idade, é admitido no pronto-socorro devido a quadro de dor abdominal súbita em região de mesogástrio, há 6 horas, associado a náuseas e vômitos esverdeados. Tem antecedentes de tabagismo e uso recente de anti-inflamatórios para tratamento de dor lombar. Ao exame físico, encontra-se descorado, desidratado, taguicárdico e normotenso. Ao exame abdominal, apresenta dor à palpação superficial e profunda, porém sem sinais de peritonite. Exames laboratoriais: Leucócitos: 16.000/uL; Bilirrubinas totais: 1,1 mg/dL; Amilase 393 U/L; Creatinina 1,5 mg/dL; Proteína C reativa: 150 mg/L. Considerando a principal hipótese etiológica para o caso, assinale a alternativa correta.","o":["A principal hipótese diagnóstica é a embolia mesentérica, devendo-se iniciar prontamente anticoagulação com enoxaparina.","A radiografia simples de abdome sem o achado de pneumoperitônio exclui a hipótese diagnóstica de úlcera gástrica perfurada.","As complicações mais comuns da doença ulcerosa péptica são o sangramento digestivo e a obstrução.","Os achados tomográficos prováveis para esse caso incluem a presença de edema e borramento da gordura peripancreática.",""]},{"a":2023,"n":34,"e":"Cirurgia Geral","t":"Lesão cística pâncreas / Conduta","g":"C","x":false,"q":"Questão 34 : Assinale a alternativa que apresenta, corretamente, a melhor conduta diagnóstica para um paciente com uma lesão cística de cabeça de pâncreas, com 3 cm de diâmetro com ducto pancreático de 7 mm, identificada por ressonância magnética de abdome.","o":["Colangiografia retrógrada endoscópica (CPRE).","Dosagem de CA 19-9.","Punção guiada por ultrassom endoscópico.","Repetir ressonância em 3 meses.","Tomografia por emissão de pósitrons/PET-CT."]},{"a":2023,"n":35,"e":"Infectologia","t":"Megaesôfago chagásico / Disfagia","g":"B","x":false,"q":"Assinale a alternativa que apresenta, corretamente, um sinal clínico que pode estar presente em pacientes com megaesôfago chagásico.","o":["Abaulamento na região cervical, geralmente, à direita.","Disfagia.","Hipertrofia de glândulas parótidas.","Presença de linfonodo palpável na região supraclavicular.","Submacicez em hemitórax esquerdo."]},{"a":2023,"n":36,"e":"Cirurgia Geral","t":"Bypass gástrico / Vômitos pós-op","g":"B","x":false,"q":"Paciente, 30 anos de idade, no 40º dia pós-operatório de derivação gástrica em “Y-de- Roux” (by-pass gástrico) passa a apresentar vômitos após alimentação em quase todas as refeições, nega dor abdominal e alteração de hábito intestinal. Em relação ao exame mais indicado para esse paciente, assinale a alternativa correta.","o":["Cintilografia gástrica.","Endoscopia digestiva alta.","Raios-X contrastados de esôfago e estômago.","Tomografia de abdome.","Ultrassom endoscópico."]},{"a":2023,"n":39,"e":"Cirurgia do Trauma","t":"Trauma torácico / Hemotórax","g":"D","x":false,"q":"Assinale a alternativa que apresenta, corretamente, a patologia na qual se aplica a regra de Goodsall.","o":["Abscesso anorretal.","Doença hemorroidária.","Fissura anal.","Fístula anal.","Estenose canal anal."]},{"a":2023,"n":41,"e":"Cirurgia do Trauma","t":"Trauma crânio-encefálico","g":"A","x":false,"q":"Questão 41 ' Sobre as vacinas contra o pneumococo para crianças, considere as afirmativas a seguir. 1. A vacina pneumocócica 10-valente faz parte do calendário nacional de vacinação da criança do Programa Nacional de Imunizações (PNI) e deve ser realizada aos 2, 4e 12 meses de vida. Il. A vacina pneumocócica 13-valente não faz parte do Programa Nacional de Imunizações (PNI), mas está disponível, nos Centros de Referência para Imunobiológicos Especiais (CRIES), para crianças maiores de 5 anos de idade de alto risco: HIV/aids, transplantados de medula óssea e de órgãos sólidos e pacientes oncológicos. HI. A vacina pneumocócica 10-valente, por ter polissacarídeos capsulares conjugados a proteínas carreadoras, induz memória imunológica insatisfatória e proteção de curta duração. IV. A vacina pneumocócica 23-valente está indicada para crianças maiores de 2 anos de idade que tiveram quadro de meningite bacteriana, asma intermitente ou persistente leve e síndrome convulsiva. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas II, Ill e IV são corretas."]},{"a":2023,"n":42,"e":"Clínica Médica","t":"Sepse / Bundle / Antibioticoterapia","g":"D","x":false,"q":"No mês de julho de 2022, a Organização Mundial da Saúde declarou a Monkeypox como Emergência de Saúde Pública de Importância Internacional, indicando a necessidade de medidas para evitar a sua disseminação nos países. A respeito dessa infecção em crianças, assinale a alternativa correta.","o":["A antibioticoterapia está formalmente indicada a fim de evitar infecções bacterianas secundárias.","A principal forma de transmissão é por meio da aspiração de gotículas eliminadas pelos pacientes infectados.","As lesões de pele evoluem em estágios na sequência crostas, pústulas, vesículas, pápulas e máculas.","Junto com as gestantes e os imunodeprimidos, as crianças fazem parte dos grupos mais vulneráveis.",""]},{"a":2023,"n":43,"e":"Clínica Médica","t":"Choque distributivo / Sepse grave","g":"E","x":false,"q":"A invaginação ou intussuscepção intestinal é a penetração de uma porção do intestino proximal no distal, em decorrência de sua peristalse. Sobre a invaginação ou intussuspceção intestinal, assinale a alternativa correta.","o":["A tríade clássica de Ombredane consiste de vômitos biliosos, fossa ilíaca direita vazia e fezes em “geleia de morango”.","A apresentação de sangramento anal está associada à isquemia do intestino e, portanto, ocorrerá alguns dias após a instalação do quadro.","As alternativas de tratamento radiológicas têm melhores resultados do que as operatórias, com menores taxas de recorrência.","Os casos idiopáticos, ou seja, sem uma doença estrutural de base, são menos comuns e acometem crianças mais velhas.",""]},{"a":2023,"n":44,"e":"Clínica Médica","t":"Ventilação mecânica / Manejo","g":"D","x":false,"q":"O divertículo de Meckel é um divertículo verdadeiro que se origina de uma falha na obliteração e absorção do ducto onfaloentérico durante a vida embrionária. Sobre a regra mnemônica dos “2”, frequentemente citada, considere as afirmativas a seguir. |. Acomete cerca de 2% da população. Il. Costumam ter 5 cm de comprimento e estar a 65 cm da válvula ileocecal. Ill. Podem ter 2 tipos de mucosa ectópica (gástrica e pancreática). IV. Manifestações costumam ocorrer após os 2 anos de idade. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2023,"n":45,"e":"Clínica Médica","t":"ITU complicada / Antibiograma","g":"E","x":false,"q":"Lactente feminina, 6 meses de idade, em tratamento ambulatorial para infecção do trato urinário, primeiro episódio. Retorna, no terceiro dia de tratamento, para checagem de resultado de urocultura. Apresenta- -se com exame físico normal e com regressão de todos os sintomas que o levaram à primeira avaliação. Na urocultura, coletada por sondagem vesical, houve crescimento de Escherichia coli 100000 UFC, com o seguinte perfil de antibiograma: cefalexina, nitrofurantoína, cefalotina: resistente; ácido nalidíxico, meropenem, ertapenem, ciprofloxacina, sulfametoxazol-trimetoprim, amicacina: sensível; amoxicilina/clavulanato: intermediário. Como a paciente está em uso de cefalexina, assinale a alternativa que apresenta, corretamente, a conduta terapêutica mais adequada.","o":["Internar imediatamente a paciente e trocar antibiótico por amicacina.","Internar imediatamente a paciente e trocar antibiótico por meropenem. ;","Trocar antibiótico por ciprofloxacina e reavaliar a paciente em 48 horas.","Trocar antibiótico por ácido nalidíxico e reavaliar a paciente em 48 horas.","Manter uso de cefalexina, apesar do perfil de resistência in vitro."]},{"a":2023,"n":46,"e":"Pediatria","t":"DRGE pediátrica / Omeprazol","g":"A","x":false,"q":"Paciente, 7 anos de idade, apresenta quadro de queimação retroesternal após alimentação e dor epigástrica de repetição, há 2 meses. Refere sensação de náusea pela manhã. Nega sensação de impactação alimentar. Já passou por atendimento, há 4 semanas, em que foram orientadas mudanças dietéticas e comportamentais, porém sem melhora do quadro. De acordo com as recomendações da Sociedade Brasileira de Pediatria de 2021, assinale a alternativa que apresenta, corretamente, a conduta a ser realizada nesse momento.","o":["Prescrever omeprazol pela manhã em jejum.","Prescrever sucralfato antes das principais refeições.","Realizar 15 dias de dieta isenta da proteína do leite de vaca.","Solicitar endoscopia digestiva alta.","Solicitar pHmetria."]},{"a":2023,"n":47,"e":"Pediatria","t":"Diarreia aguda / Reidratação oral","g":"B","x":false,"q":"Lactente, 1 ano de idade, previamente hígido, levado ao pronto atendimento devido a 1 episódio de vômito, 3 evacuações líquidas e um pico febril de início há 24 horas. Ao exame físico, observa-se: frequência cardíaca: 132 bpm, frequência respiratória: 30 ipm, tempo de enchimento capilar de 2 segundos, mucosas hidratadas, abdome plano, depressível, indolor, sem sinais de irritação peritoneal. Mãe refere que a criança faz uso de fórmula infantil de seguimento e costuma realizar 3 refeições ao dia. Referente às orientações da Sociedade Brasileira de Pediatria para manejo alimentar e hídrico do paciente, assine a alternativa correta.","o":["Iniciar fórmula infantil extensamente hidrolisada sem lactose e realizar teste de provocação oral, após 15 dias, para confirmação do diagnóstico.","Manter alimentação habitual da criança e aumentar ingesta de líquidos caseiros, como água, chás, sucos e sopas.","Nas primeiras 4 horas, oferecer 50 mL/kg de soro de reidratação oral e reavaliar, em seguida, estado de hidratação.","Orientar dieta leve e sem produtos lácteos ou isentos de lactose até a remissão dos sintomas.",""]},{"a":2023,"n":48,"e":"Pediatria","t":"Desnutrição infantil / Kwashiorkor","g":"B","x":false,"q":"Lactente, 2 meses de vida, em aleitamento materno exclusivo, apresentou quadro de sangramento vermelho vivo nas fezes e desconforto durante as evacuações. Após o segundo episódio de sangramento, foi orientado suspender da dieta materna produtos com leite de vaca e seus derivados. Não foram mais observados sangramento nas fezes após 24 horas do início da dieta materna. Apesar da melhora clínica, o médico orienta a necessidade do correto diagnóstico do quadro. Assinale a alternativa que apresenta, corretamente, o procedimento para obter esse diagnóstico.","o":["Realizar prick teste no dorso do lactente com extrato de leite de vaca, soja e ovo.","Reintroduzir leite de vaca e derivados na dieta materna entre 2 e 4 semanas.","Orientar a mãe a introduzir pequenas quantidade de laticínios sem lactose e aumentar progressivamente conforme aspecto das fezes da criança.","Solicitar IgE para leite de vaca, caseína e betalacglobulina para a mãe e para a criança.","Suspend
