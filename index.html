<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UEL/COPS — Simulado Residência Médica</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1f2436;
    --border: #2a3050;
    --accent: #4f8ef7;
    --accent2: #7c5cbf;
    --green: #34c98a;
    --red: #f05c6e;
    --yellow: #f5c542;
    --text: #e8eaf2;
    --muted: #7a82a0;
    --card: #1a1f32;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* ── TELA INICIAL ── */
  #screen-home { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  .logo { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: .4rem; }
  .subtitle { color: var(--muted); font-size: 1rem; margin-bottom: 3rem; letter-spacing: .05em; }
  .config-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 100%; max-width: 680px; }
  .config-card h2 { font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 1.2rem; }
  .filter-section { margin-bottom: 1.8rem; }
  .filter-label { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .6rem; display: block; }
  .chips { display: flex; flex-wrap: wrap; gap: .5rem; }
  .chip { padding: .35rem .85rem; border-radius: 99px; border: 1px solid var(--border); font-size: .82rem; cursor: pointer; transition: all .2s; color: var(--muted); background: transparent; }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
  .chip.all { border-color: var(--accent2); color: var(--accent2); }
  .chip.all.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .mode-btn { padding: 1rem; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; text-align: left; transition: all .2s; }
  .mode-btn:hover { border-color: var(--accent); background: rgba(79,142,247,.07); }
  .mode-btn.active { border-color: var(--accent); background: rgba(79,142,247,.12); }
  .mode-btn .mode-icon { font-size: 1.4rem; margin-bottom: .4rem; display: block; }
  .mode-btn .mode-title { font-weight: 600; font-size: .95rem; }
  .mode-btn .mode-desc { font-size: .78rem; color: var(--muted); margin-top: .2rem; }
  .stat-bar { display: flex; gap: 1.5rem; padding: 1rem 0; border-top: 1px solid var(--border); margin-top: 1rem; }
  .stat { text-align: center; }
  .stat-n { font-size: 1.4rem; font-weight: 600; color: var(--accent); font-family: 'Playfair Display', serif; }
  .stat-l { font-size: .75rem; color: var(--muted); }
  .btn-start { width: 100%; padding: 1rem; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 1.5rem; transition: opacity .2s; font-family: 'DM Sans', sans-serif; letter-spacing: .03em; }
  .btn-start:hover { opacity: .88; }
  .btn-start:disabled { opacity: .4; cursor: not-allowed; }

  /* ── TELA DE QUIZ ── */
  #screen-quiz { display: none; flex-direction: column; min-height: 100vh; }
  .quiz-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .progress-wrap { flex: 1; margin: 0 2rem; }
  .progress-info { display: flex; justify-content: space-between; font-size: .78rem; color: var(--muted); margin-bottom: .4rem; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .4s ease; }
  .score-pill { display: flex; gap: 1rem; font-size: .85rem; font-weight: 500; }
  .score-c { color: var(--green); }
  .score-e { color: var(--red); }
  .btn-quit { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: .4rem .9rem; border-radius: 8px; cursor: pointer; font-size: .82rem; transition: all .2s; }
  .btn-quit:hover { border-color: var(--red); color: var(--red); }

  .quiz-body { flex: 1; display: flex; justify-content: center; padding: 2.5rem 1.5rem; }
  .question-card { width: 100%; max-width: 800px; }
  .q-meta { display: flex; gap: .6rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
  .badge { padding: .25rem .7rem; border-radius: 99px; font-size: .75rem; font-weight: 500; }
  .badge-esp { background: rgba(79,142,247,.15); color: var(--accent); border: 1px solid rgba(79,142,247,.3); }
  .badge-ano { background: rgba(124,92,191,.15); color: var(--accent2); border: 1px solid rgba(124,92,191,.3); }
  .badge-tema { background: rgba(245,197,66,.1); color: var(--yellow); border: 1px solid rgba(245,197,66,.25); font-size: .7rem; }
  .q-text { font-size: 1.05rem; line-height: 1.75; color: var(--text); margin-bottom: 2rem; font-weight: 300; }
  .options { display: flex; flex-direction: column; gap: .75rem; }
  .option { display: flex; align-items: flex-start; gap: 1rem; padding: 1rem 1.2rem; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; transition: all .2s; background: var(--card); }
  .option:hover:not(.locked) { border-color: var(--accent); background: rgba(79,142,247,.06); }
  .option-letter { min-width: 28px; height: 28px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: .8rem; font-weight: 600; color: var(--muted); flex-shrink: 0; margin-top: .1rem; }
  .option-text { font-size: .95rem; line-height: 1.55; color: var(--text); }
  .option.correct { border-color: var(--green); background: rgba(52,201,138,.08); }
  .option.correct .option-letter { background: var(--green); color: #fff; }
  .option.wrong { border-color: var(--red); background: rgba(240,92,110,.08); }
  .option.wrong .option-letter { background: var(--red); color: #fff; }
  .option.locked { cursor: default; }

  .feedback { margin-top: 1.5rem; padding: 1.2rem 1.4rem; border-radius: 12px; font-size: .92rem; line-height: 1.6; display: none; }
  .feedback.correct { background: rgba(52,201,138,.1); border: 1px solid rgba(52,201,138,.3); color: var(--green); }
  .feedback.wrong { background: rgba(240,92,110,.1); border: 1px solid rgba(240,92,110,.3); color: #f07a88; }
  .feedback.show { display: block; }

  .btn-next { margin-top: 1.5rem; padding: .85rem 2rem; border-radius: 12px; background: var(--accent); border: none; color: #fff; font-size: .95rem; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; display: none; transition: opacity .2s; }
  .btn-next:hover { opacity: .85; }
  .btn-next.show { display: inline-block; }

  /* ── TELA DE RESULTADO ── */
  #screen-result { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 3rem 2.5rem; max-width: 560px; width: 100%; text-align: center; }
  .result-score { font-family: 'Playfair Display', serif; font-size: 5rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
  .result-label { color: var(--muted); margin: .5rem 0 2rem; font-size: 1rem; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
  .result-stat { background: var(--card); border-radius: 12px; padding: 1rem; }
  .result-stat-n { font-size: 1.6rem; font-weight: 700; font-family: 'Playfair Display', serif; }
  .result-stat-l { font-size: .75rem; color: var(--muted); margin-top: .2rem; }
  .result-breakdown { text-align: left; background: var(--card); border-radius: 12px; padding: 1.2rem; margin-bottom: 1.5rem; max-height: 260px; overflow-y: auto; }
  .result-breakdown h3 { font-size: .8rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .8rem; }
  .breakdown-row { display: flex; justify-content: space-between; font-size: .85rem; padding: .35rem 0; border-bottom: 1px solid var(--border); }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-pct { font-weight: 600; }
  .pct-good { color: var(--green); }
  .pct-mid { color: var(--yellow); }
  .pct-bad { color: var(--red); }
  .btn-restart { padding: .9rem 2.5rem; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }

  /* ── SPACED REP INDICATOR ── */
  .sr-indicator { font-size: .72rem; color: var(--muted); margin-top: .5rem; }
  .sr-new { color: var(--accent); }
  .sr-review { color: var(--yellow); }
  .sr-known { color: var(--green); }
</style>
</head>
<body>

<!-- TELA HOME -->
<div id="screen-home">
  <div class="logo">UEL·COPS</div>
  <div class="subtitle">Residência Médica · Simulado Adaptativo</div>

  <div class="config-card">
    <div class="filter-section">
      <span class="filter-label">Especialidades</span>
      <div class="chips" id="chips-esp"></div>
    </div>
    <div class="filter-section">
      <span class="filter-label">Anos da prova</span>
      <div class="chips" id="chips-ano"></div>
    </div>
    <div class="filter-section">
      <span class="filter-label">Modo de estudo</span>
      <div class="mode-grid">
        <button class="mode-btn active" data-mode="adaptive" onclick="setMode(this)">
          <span class="mode-icon">🧠</span>
          <div class="mode-title">Adaptativo</div>
          <div class="mode-desc">Prioriza suas maiores fraquezas (SM-2)</div>
        </button>
        <button class="mode-btn" data-mode="random" onclick="setMode(this)">
          <span class="mode-icon">🎲</span>
          <div class="mode-title">Aleatório</div>
          <div class="mode-desc">Questões em ordem aleatória</div>
        </button>
        <button class="mode-btn" data-mode="sequential" onclick="setMode(this)">
          <span class="mode-icon">📋</span>
          <div class="mode-title">Sequencial</div>
          <div class="mode-desc">Por ano e número da prova</div>
        </button>
        <button class="mode-btn" data-mode="weak" onclick="setMode(this)">
          <span class="mode-icon">🎯</span>
          <div class="mode-title">Pontos fracos</div>
          <div class="mode-desc">Só questões com menos de 60% de acerto</div>
        </button>
      </div>
    </div>

    <div class="stat-bar" id="stat-bar">
      <div class="stat"><div class="stat-n" id="stat-total">—</div><div class="stat-l">questões</div></div>
      <div class="stat"><div class="stat-n" id="stat-feitas">—</div><div class="stat-l">respondidas</div></div>
      <div class="stat"><div class="stat-n" id="stat-acerto">—</div><div class="stat-l">% acerto</div></div>
    </div>

    <button class="btn-start" id="btn-start" onclick="startQuiz()">Iniciar simulado</button>
  </div>
</div>

<!-- TELA QUIZ -->
<div id="screen-quiz">
  <div class="quiz-header">
    <div class="score-pill">
      <span class="score-c" id="hdr-correct">✓ 0</span>
      <span class="score-e" id="hdr-wrong">✗ 0</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="prog-text">0 / 0</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <button class="btn-quit" onclick="goHome()">Sair</button>
  </div>

  <div class="quiz-body">
    <div class="question-card">
      <div class="q-meta" id="q-meta"></div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="q-options"></div>
      <div class="feedback" id="q-feedback"></div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Próxima questão →</button>
      <div class="sr-indicator" id="sr-indicator"></div>
    </div>
  </div>
</div>

<!-- TELA RESULTADO -->
<div id="screen-result">
  <div class="result-card">
    <div class="result-score" id="res-score">0%</div>
    <div class="result-label">de aproveitamento</div>
    <div class="result-grid">
      <div class="result-stat">
        <div class="result-stat-n" id="res-correct" style="color:var(--green)">0</div>
        <div class="result-stat-l">corretas</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-n" id="res-wrong" style="color:var(--red)">0</div>
        <div class="result-stat-l">erradas</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-n" id="res-total" style="color:var(--accent)">0</div>
        <div class="result-stat-l">total</div>
      </div>
    </div>
    <div class="result-breakdown">
      <h3>Por especialidade</h3>
      <div id="res-breakdown"></div>
    </div>
    <button class="btn-restart" onclick="goHome()">Nova sessão</button>
  </div>
</div>

":"Sobre a Atenção Primária à Saúde, pode-se afirmar que ela deve ter alto grau de descentralização e o seu desenvolvimento deve ser próximo da comunidade. Em relação às diretrizes da Atenção Primária à Saúde, assinale a alternativa correta.","o":["Coordenar as ações centradas em alta tecnologia e especialidades médicas.","Fiscalizar e acompanhar os estabelecimentos de saúde. R","Possuir um território determinado, de forma a permitir o planejamento das ações de saúde.","Possibilitar o acesso restrito, mas contínuo, aos serviços de saúde de qualidade.","Restringir a participação dos pacientes para melhorar o cuidado."]},{"a":2020,"n":24,"e":"Medicina Preventiva","t":"Vigilância epidemiológica / SINAN","g":"A","x":false,"q":"O conceito de Vigilância em Saúde refere-se a um grupo de atividades desenvolvidas no âmbito do Sis- tema Único de Saúde (SUS), cujo objetivo é observar e analisar permanentemente a situação de saúde da população, articulando-se em um conjunto de ações destinadas a controlar determinados riscos e danos à saúde de populações que vivem em territórios específicos. Sobre o conceito de Vigilância em Saúde, considere as afirmativas a seguir. 1. Vigilância em saúde é uma intervenção sobre problemas de saúde, que requerem atenção e acompa- nhamento contínuos; adoção do conceito de risco; articulação entre ações promocionais, preventi- vas, curativas e reabilitadoras. Il. Apoiada no conceito positivo do processo saúde-enfermidade, a vigilância em saúde desloca radical- mente o olhar sobre o objeto da saúde pública - da doença para o modo de vida (as condições e os estilos de vida) das pessoas. HI. O sistema de Vigilância Epidemiológica, por sua importância para o planejamento das ações de saúde, é de responsabilidade exclusiva do Ministério de Saúde. IV. Vigilância em saúde é a nova denominação dada à vigilância sanitária. Assinale a alternativa correta.","o":["Somente as afirmativas le Il são corretas.","Somente as afirmativas | e IV são corretas.","Somen s | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2020,"n":57,"e":"Cardiologia","t":"Endocardite infecciosa / Duke / Tratamento","g":"B","x":false,"q":"Considere os valores normais de referência para os parâmetros de uma gasometria arterial a seguir. pH 7,35 - 7,45 pCOz 35 - 45 mmHg HCO: 23 - 26 mEg/L; Sobre os distúrbios ácido-básicos, relacione as gasometrias com o distúrbio predominante. (1) pH 7,30 - pCOz 54 mmHg - HCO: - 28 mEg/L; (11) pH 7,26 - pCO2 48 mmHg - HCO: 18 mEg/L; (HI) pH 7,47 - pCOz 45 mmHg - HCOs 29 mEg/L; (IV) pH 7,52 - pCO> 28 mmHg - HCO: 28 mEg/L; (V) pH 7,25 - pCO> 28 mmHg - HCOs 14 mEq/L; (A) Alcalose mista; (B) Acidose respiratória; (C) Alcalose metabólica; (D) Acidose metabólica; (E) Acidose mista; Assinale a alternativa que contém a associação correta.","o":["I-B, II-D, II-A, IV-C, V-E.","I-B, II-E, III-C, IV-A, V-D.","I-D, II-B, II-C, IV-A, V-E.","I-D, II-E, III-A, IV-C, V-B.","I-E, II-D, III-C, IV-A, V-B."]},{"a":2020,"n":58,"e":"Cardiologia","t":"HAS / Crise hipertensiva / Urgência emergência","g":"A","x":false,"q":"Paciente masculino, 75 anos de idade, admitido em pronto atendimento do hospital universitário após ser encaminhado de outro serviço por sepse de foco pulmonar. Tem antecedente patológico de doença renal crônica não dialítica, sendo sua creatinina sérica (Cr) basal de 1,8 mg/dL. Na admissão hospitalar, a Cr estava em 2,4 mg/dL e, no segundo dia de internação, 3,0 mg/dL. O paciente está com sonda vesical de demora desde a admissão e tem débito urinário preservado. Sobre esse caso de injúria renal aguda (IRA), assinale a alternativa correta.","o":["A taxa de filtração glomerular desse paciente pode não ser estimada adequadamente pela creatinina devido à instabilidade deste marcador no curso da IRA.","A diurese e a creatinina sérica são parâmetros que podem ser usados na prática clínica para o diagnóstico de injúria renal aguda, desde que o paciente não seja portador de doença renal crônica.","A forma mais adequada de estimar a taxa de filtração glomerular desse paciente é por meio da equação do Estudo MDRD (Modification of Diet in Renal Disease).","Como o paciente apresenta doença renal crônica previamente à internação, a creatinina perde seu valor como marcador de IRA, e o diagnóstico neste caso se baseia principalmente no débito urinário reduzido.",""]},{"a":2020,"n":59,"e":"Cardiologia","t":"Fibrilação atrial / Cardioversão","g":"B","x":false,"q":"Paciente masculino, 65 anos de idade, comparece ao pronto-socorro com quadro de dor torácica e dispneia há 1 dia, sem febre e sem comorbidades. Na chegada, o exame físico taquipneico apresenta PA 140/100 mmHg, saturação 90% em ar ambiente, FC 115 bpm, bulhas rítmicas e ausculta sem ruídos adventícios. Foi realizado o exame a seguir. Sobre esse caso, considere as afirmativas a seguir. 1. O achado mais comum no eletrocardiograma é o padrão de taquicardia sinusal. Il. Por se tratar de embolia maciça, a trombólise deve ser iniciada em até 6 horas. Ill. O exame de D-dímero é o próximo passo no manejo desse paciente para avaliar a gravidade e o prognóstico. IV. Iniciar o tratamento com anticoagulantes e manter por, no mínimo, 3 meses. Assinale a alternativa correta. AP o","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2020,"n":60,"e":"Clínica Médica","t":"DPOC / Exacerbação / Antibioticoterapia","g":"C","x":false,"q":"Paciente masculino, 63 anos de idade, comparece para retorno, apresentando quadro de dispneia progressiva no último ano, com piora no último mês, quando foi ao plantão e foi medicado com antibiótico e corticoide, mas não precisou ser internado. Refere necessidade de parar para respirar quando caminha no rio.","Atelectasia pulmonar.","Infecção de parede abdominal.","Pneumonia.","Pneumotórax."]},{"a":2020,"n":79,"e":"Pediatria","t":"Pancreatite aguda pediátrica","g":"D","x":false,"q":"Sobre a pancreatite aguda, considere as afirmativas a seguir. 1. A doença litiásica biliar e o consumo de álcool são responsáveis por 80-90% dos casos de pancreatite aguda. Il. O diagnóstico da pancreatite aguda é eminentemente clínico e laboratorial, uma vez que o pâncreas pode mostrar-se normal à tomografia computadorizada de abdome (Balthazar A). Ill. Pacientes com pancreatite aguda grave podem apresentar hematomas e equimoses na região periumbilical (sinal de Cullen), nos flancos abdominais (sinal de Grey-Turner) ou nas regiões inguinais (sinal de Fox). IV. Pacientes com pancreatite aguda grave devem receber nutrição parenteral total já no início do quadro, mantendo jejum do trato gastrintestinal. Assinale a alternativa correta.","o":["Trata-se de provável hemotórax maciço e a conduta imediata é a drenagem torácica fechada no quinto espaço intercostal do hemitórax direito, entre as linhas axilar anterior e axilar média.","Trata-se de provável pneumotórax hipertensivo e a conduta imediata é a drenagem torácica fechada no quinto espaço intercostal do hemitórax direito, entre as linhas axilar anterior e axilar média.","Trata-se de provável pneumotórax hipertensivo e a conduta imediata é a realização de toracocentese descompressiva com punção do segundo espaço intercostal na linha hemiclavicular do hemitórax direito.","Trata-se de provável pneumotórax não hipertensivo e a conduta imediata é repetir os raios X de tórax e solicitar avaliação da cirurgia torácica.","Somente as afirmativas Il, Ill e IV são corretas. ave Paciente feminina, 60 anos de idade, internada em unidade de terapia intensiva por sepse de foco uriná- rio, evoluiu com choque séptico e necessidade de noradrenalina endovenosa. Foi introduzido um cateter venoso central na veia jugular direita, realizados raios X de tórax de controle e, na sequência, a paciente apresentou piora súbita do choque, sem resposta a doses crescentes do vasopressor, além de dessatu- ração e assincronia ventilatória. Aos raios X, evidenciados hipertransparência do pulmão direito e desvio de mediastino e traqueia para a esquerda. Assinale a alternativa que apresenta, corretamente, a principal hipótese diagnóstica e a conduta imediata nesse caso."]},{"a":2020,"n":83,"e":"Pediatria","t":"Doença de Kawasaki / Diagnóstico e tratamento","g":"E","x":false,"q":"Sobre as complicações do sarampo, considere as afirmações a seguir. 1. A panencefalite esclerosante subaguda é mais frequente que a encefalite aguda. Il. Cerca de 10% das crianças com sarampo desenvolverão otite média aguda. Ill. Gestantes com sarampo podem apresentar aborto espontâneo, parto prematuro, ter RN com baixo peso ao nascer e evoluir para óbito. IV. A causa mais comum de morte em crianças de baixa idade é a pneumonia. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2020,"n":85,"e":"Pediatria","t":"Diabetes tipo 1 pediátrico / CAD","g":"A","x":false,"q":"Bebê feminina, nascida a termo com 3 kg, em boas condições de vitalidade, recebe alta da maternidade em aleitamento materno. Retorna 15 dias depois, pesando 3,4 kg em boas condições, com pele amarelada, fezes esbranquiçadas e diurese escura. Foram colhidos diversos exames de sangue e observado aumento de bilirrubinas às custas de bilirrubina direta, além de TGO e TGP pouco aumentadas. Assinale a alternativa que apresenta, corretamente, a hipótese diagnóstica mais provável.","o":["Atresia de vias biliares. ;","Cisto de colédoco.","Hepatite neonatal. ?","Incompatibilidade Rh.","Pâncreas anular."]},{"a":2020,"n":87,"e":"Pediatria","t":"Neonatologia / Enterocolite necrotizante","g":"B","x":false,"q":"Quanto aos genes e fatores de transcrição relacionados ao crescimento, no que se refere ao gene SHOX, assinale a alternativa correta.","o":["A haploinsuficiência do SHOX leva à indiferenciação dos condrócitos e à baixa estatura observada nos indivíduos com síndrome de Klinefelter.","Na síndrome de Turner, ocorre a perda de uma das cópias do SHOX (hemizigose), responsável por dois terços da baixa estatura observada na síndrome.","O gene SHOX faz parte da família de genes homeobox e localiza-se apenas no cromossomo X.","O gene SHOX inibe a transcrição de fatores de crescimento, levando à baixa estatura.","O SHOX estimula a diferenciação dos condrócitos e promove avanço da idade óssea."]},{"a":2020,"n":88,"e":"Pediatria","t":"Neonatologia / Sepse neonatal tardia","g":"E","x":false,"q":"Prematuro, 24 semanas de gestação, nasce de parto cesárea de urgência devido a descolamento prematuro da placenta com necessidade de reanimação na sala de parto, Apgar 0/5 no primeiro e quinto minuto, respectivamente. Peso de nascimento: 550 gramas. Desenvolve Síndrome do Desconforto Respiratório (Membrana hialina), com necessidade de reposição de surfactante pulmonar exógeno. No terceiro dia de vida, ocorre piora do desconforto respiratório, com necessidade de aumento dos parâmetros de ventilação pulmonar mecânica e apresenta hemorragia pulmonar maciça e vai a óbito. Em ; relação à causa básica do óbito deste recém-nascido, assinale a alternativa correta.","o":["Asfixia neonatal.","Descolamento prematuro de membrana.","Doença de membrana hialina.","Hemorragia pulmonar.","Prematuridade extrema."]},{"a":2020,"n":89,"e":"Pediatria","t":"Neonatologia / Hiperbilirrubinemia neonatal","g":"A","x":false,"q":"Um médico é chamado para avaliar um recém-nascido de 38 semanas de gestação, com 72 horas de vida, que está em alojamento conjunto, nasceu de parto normal de uma primigesta que não apresentou intercorrências na gestação, Apgar 9/10 no primeiro e quinto minutos, respectivamente, com peso de 3.250 gramas, em aleitamento materno exclusivo. A criança apresenta icterícia Zona Il de Kramer com o restante do exame físico normal. A tipagem sanguínea da mãe é A rH positivo e o recém-nascido é O rH negativo. A dosagem de bilirrubina é 12 mg/dL, sendo a fração indireta de 11,8 mg/dL, normograma de Bhutani entre percentil 40 e 75. Assinale a alternativa que apresenta, corretamente, o diagnóstico e a conduta para esse recém-nascido.","o":["Icterícia fisiológica, alta hospitalar e retorno em 72 horas.","Icterícia fisiológica, fototerapia, repetir bilirrubina total e frações em 24 horas.","Icterícia por incompatibilidade rH, fototerapia, repetir bilirrubina total e frações em 24 horas.","icterícia por incompatibilidade ABO, fototerapia, repetir bilirrubina total e frações em 24 horas.","Icterícia por incompatibilidade ABO, alta hospitalar e retorno em 72 horas."]},{"a":2020,"n":90,"e":"Pediatria","t":"Neonatologia / RCP neonatal / Sala de parto","g":"D","x":false,"q":"As malformações cardíacas são o grupo de doenças congênitas mais frequentes, decorrentes de alterações na embriogênese cardíaca. Após o nascimento, há um período de transição neonatal em que ocorrem mudanças no coração do recém-nascido. Em relação às características do coração fetal e neonatal, assinale a alternativa correta.","o":["Após o término da fase de septação atrial no feto, todos os óstios devem estar ocluídos, sem comunicação entre os átrios.","Devido ao padrão de hipertensão pulmonar próprio do recém-nascido, os sopros cardíacos provenientes de comunicações interventriculares são mais facilmente auscultados nos primeiros dias de vida do que após o primeiro mês de vida.","Os batimentos cardíacos se iniciam logo após a oitava semana de gestação, quando o coração fetal já está totalmente formado.","O canal arterial e o forame oval, estruturas essenciais na circulação cardíaca fetal, sofrem oclusão após o nascimento devido ao aumento da oxigenação no sangue e ao aumento da pressão no átrio esquerdo, respectivamente.",""]},{"a":2020,"n":91,"e":"Pediatria","t":"Sífilis congênita / Diagnóstico e tratamento","g":"C","x":false,"q":"A sífilis congênita teve um aumento progressivo nos últimos anos no Brasil. Sobre esse tema, segundo o Protocolo Clínico para a Prevenção de Transmissão Vertical de HIV, Sífilis e Hepatites, do Ministério da Saúde, de 2018, atualizado em 2019, assinale a alternativa correta.","o":["A penicilina procaína é uma opção de tratamento para a criança cuja mãe não foi ave tratada e sem condições de coleta de líquor. y","FTA-Abs IgM é o exame de escolha para confirmar a infecção do RN, pois apresenta elevada sensibilidade.","O diagnóstico de sífilis congênita é confirmado pela presença de VDRL reagente no sangue e alterações ósseas ou líquor alterado.","O título de VDRL na criança maior que o título materno, em pelo menos uma diluição, confirma a infecção congênita.",""]},{"a":2020,"n":97,"e":"Pediatria","t":"Desnutrição grave / Kwashiorkor","g":"E","x":false,"q":"Uma mãe comparece com seu bebê para revisão. O lactente está bem, mas a mãe se queixa de desconforto para amamentar, distensão das mamas com áreas difusas avermelhadas e dificuldade de saída do leite, sem febre. Assinale a alternativa que apresenta, corretamente, a conduta a ser adotada nesse caso.","o":["Evitar ordenha para não causar a piora da dor.","Aplicar compressas quentes a cada 8 horas.","Prescrever antibiótico e suporte adequado para as mamas.","Suspender o aleitamento materno e ofertar fórmula até melhorar.","Ordenhar, manualmente, a aréola antes da mamada para facilitar a pega. ;"]},{"a":2020,"n":98,"e":"Pediatria","t":"Crescimento pediátrico / Curvas da OMS","g":"B","x":false,"q":"Recém-nascido masculino, com 27 dias de vida, é trazido por seus pais para revisão de puericultura. Os pais estão preocupados devido a um Teste do Pezinho alterado para hipotireoidismo. Assinale a alternativa que apresenta, corretamente, a conduta a ser adotada nesse caso.","o":["Encaminhar imediatamente para a endocrinologia.","Solicitar TSH e T4 livre para confirmação.","Solicitar ultrassonografia de tireoide.","Solicitar Teste do Pezinho ampliado.","Tranquilizar os pais e agendar retorno em 7 dias."]},{"a":2020,"n":99,"e":"Pediatria","t":"Vacinação pediátrica / PNI","g":"D","x":false,"q":"Em relação ao papel dos exames complementares na doença do refluxo gastroesofágico (DRGE), considere as afirmativas a seguir. 1. A presença de episódios de refluxo está presente em até 50% das crianças submetidas ao exame contrastado com bário, o que faz com que esse exame não seja preconizado como uso rotineiro. Il. A principal razão para a realização de endoscopia nas crianças com sintomas extraesofágicos de DRGE é investigar doenças como esofagite eosinofílica. Ill. A cintilografia pode ser indicada para avaliar o esvaziamento gástrico. IV. A pHmetria é o exame com evidências suficientes para uso rotineiro no diagnóstico de DRGE. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas II, Ill e IV são corretas."]},{"a":2020,"n":100,"e":"Pediatria","t":"Doenças exantemáticas / Diagnóstico diferencial","g":"A","x":false,"q":"No segmento do paciente asmástico, é importante a distinção entre o asmático grave e o ; asmático não controlado. Nesse contexto de diferenciação entre ambos, considere as afirmativas a seguir. |. A falta de condicionamento físico pode ser erroneamente diagnosticada como asma. Il. A obesidade é uma comorbidade que precisa ser abordada, pois é uma condição associada ao não controle da asma. III. A técnica de uso dos dispositivos inalados é de fácil compreensão e sua reavaliação periódica é desnecessária. IV. O contato com tabagistas e o controle ambiental não interferem no controle ou na gravidade do as- mático que está em vigência de tratamento medicamentoso. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas I e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas. ave 1 AOODO || 28. AOODO || 51 AVODO || 7. POODO 2 AOODO || 277 AOODO || s2 AVDODO || 7. ADODO 3 AOODO || 28. ADODO || 5. AVODO || 78. AOODO 4. DOODO || 29. ADODO || 54. AOODO || 72. AOODO s AOODO || 30. AVODO || ss. AOODO || 8. AOODO"]},{"a":2021,"n":5,"e":"Clínica Médica","t":"Lombalgia / Diagnóstico diferencial","g":"C","x":false,"q":"Em relação aos acidentes vasculares encefálicos, considere as afirmativas a seguir. 1. A gravidez é uma contraindicação absoluta para se efetuar trombólise arterial. Il. Pacientes portadores de fibrilação atrial devem ser anticoagulados. Ill. Deve-se prescrever antiagregação dupla aos pacientes com isquemia cerebral transitória decorrente de lesão de grandes artérias. IV. Trombólise arterial pode ser cogitada nos pacientes que se mantêm com a pressão arterial inferior a 180/110 mmHg. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas Il e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas II, Ill e IV são corretas."]},{"a":2021,"n":7,"e":"Cardiologia","t":"Insuficiência cardíaca / Diagnóstico e terapia","g":"A","x":false,"q":"Sobre a hanseníase, considere as afirmativas a seguir. 1. É essencialmente uma doença dos nervos periféricos, contituindo-se a causa mais frequente de neu- ropatia periférica tratável. Il. Estados reacionais podem ocorrer antes, durante ou após a instituição do tratamento específico. Ill. Para fins operacionais, os pacientes são classificados em grupos indeterminados, dimorfos e vir- chowianos. IV. A reação hansênica do tipo | tem como principal manifestação o eritema nodoso hansênico. Assinale a alternativa correta","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas Il e IV são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.",""]},{"a":2021,"n":10,"e":"Clínica Médica","t":"Doença de Addison / Insuficiência adrenal","g":"D","x":false,"q":"Paciente de 65 anos, hipertenso e tabagista, evoluiu com dor torácica retroesternal que irradia para as costas, de início súbito. Paciente chega após 3 horas do início da dor, ainda sintomático. Apresentava-se hipertenso, pressão 190x110 mmHg e dispneico, com sopro diastólico em foco ártico 3+|6. Na investigação etiológica, o médico solicita o dímero D, tendo como resultado o valor elevado. Quanto à conduta nesse caso, considere as afirmativas a seguir. 1. A pressão deve ser reduzida com drogas EV. Muitas vezes, um vasodilatador associado a esmolol é a terapia de escolha. Il. O dímero D não é específico para TEP, mas pode ser de grande ajuda para diagnósticos com apresentações clínicas atípicas. Ill. Uma angiotomografia de tórax deverá ser solicitada, independentemente do dímero D. IV. Nesse caso, solicitar um Pro-Bnp e um ecocardiograma transtorácico ajudaria mais que a angio TC. Assinale a alternativa corre","o":["Somente as afirmativas le Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas II, Ill e IV são corretas."]},{"a":2021,"n":11,"e":"Neurologia","t":"AVC hemorrágico / Hipertensão","g":"D","x":false,"q":"Deu entrada na sala de emergência um paciente em parada cardiorrespiratória. Após verificação do ritmo, foi observado parada cardíaca em atividade elétrica sem pulso. Seguindo as novas diretrizes (atualização) do ACLs publicada em 2020, assinale a alternativa que apresenta, corretamente, a conduta mais adequada para esse caso.","o":["A atropina foi reintroduzida no protocolo como opção à epinefrina.","A vasopressina alternada à epinefrina ou à atropina, em intervalo de 3 a 5 minutos, é uma estratégia aceita.","As drogas foram desencorajadas no novo protocolo, com maior ênfase nas compressões torácicas de qualidade.","Aplicar epinefrina logo após a detecção do ritmo não chocável.","Iniciar as compressões e somente introduzir drogas no protocolo após o primeiro ciclo."]},{"a":2021,"n":12,"e":"Neurologia","t":"Epilepsia / Tratamento farmacológico","g":"E","x":false,"q":"Na presença de um paciente com insuficiência cardíaca aguda e fração de ejeção reduzida que se encontra quente e úmido, assinale a alternativa que apresenta, corretamente, a melhor estratégia terapêutica visando à redução de mortalidade.","o":["Iniciar ou otimizar dose de betabloqueador.","Iniciar ou otimizar doses de furosemida.","Iniciar levosimedana em preferência à dobutamina se o paciente estiver em uso de betabloqueador.","Iniciar vasodilatadores endovenosos como nitroglicerina e nitroprussiato de sódio.","Iniciar ou otimizar preferencialmente os IECASs."]},{"a":2021,"n":13,"e":"Pneumologia","t":"DPOC / Critérios diagnósticos","g":"C","x":false,"q":"Sobre o uso de lítio, suas indicações e aspectos clínico-farmacológicos, assinale a alternativa correta.","o":["Devido à gravidade de uma eventual intoxicação medicamentosa voluntária por overdose, o lítio deve ser evitado, e proscrito, em pacientes com ideação suicida ou tentativas prévias de suicídio.","É fundamental o monitoramento dos níveis séricos do lítio, além da função tireoidiana e da função hepática, devido ao risco de hipotireoidismo e hepatotoxicidade.","Pode ocorrer intoxicação pelo lítio por elevação de seus níveis séricos quando prescrito concomitantemente com diuréticos tiazídicos e anti-inflamatórios não esteroidais.","Seus efeitos colaterais mais comuns incluem tremores, rigidez plástica, bradicinesia, hipertonia, sedação, hiporreflexia e obstipação",""]},{"a":2021,"n":14,"e":"Clínica Médica","t":"Crise tireotóxica / Propiltiouracil e dexametasona","g":"B","x":false,"q":"Paciente do sexo feminino, 45 anos, com história de perda de peso, aumento de apetite, palpitação, sudorese, tremores de extremidades e protusão ocular há 6 meses. Há 1 semana com febre, tosse produtiva e piora do estado geral. Foi trazida ao pronto-socorro pelos familiares. Na ocasião apresentava-se torporosa, desidratada, febril (38 ºC), taquicárdica (frequência cardíaca = 130 bpm), sudorética, pressão arterial 90/50 mmHg e com perfusão periférica insatisfatória. Após a reposição volêmica e antibioticoterapia, assinale a alternativa correta.","o":["A administração de solução saturada de iodeto de potássio deve ser a primeira medida terapêutica a ser instalada, imediatamente após a reposição volêmica e a ? antibioticoterapia.","Deve-se administrar propiltiuracil e dexametasona.","Dexametasona está indicada apenas se não houver melhora com as demais medidas após 24 horas.","Metimazol é preferível ao propiltiuracil devido a sua meia vida plasmática maior.",""]},{"a":2021,"n":15,"e":"Pneumologia","t":"DPOC GOLD / Espirometria / Tratamento","g":"A","x":false,"q":"Paciente masculino, 65 anos, chega para consulta de retorno. Queixa-se de dispneia progressiva nos últimos 5 anos, com piora nos últimos 3 meses, após quadro de pneumonia, foi atendido no pronto-socorro e fez tratamento com antibióticos, mas não se lembra de quais. Refere, ainda, tosse com secreção esbranquiçada, que piora ao longo do dia e dificuldade para fazer exercícios, precisando parar várias vezes para respirar quando caminha cerca de 100 metros. Faz uso de medicação para tratamento de hipertensão arterial. Nega alergias. Tabagista desde os 30 anos, cerca de 20 cigarros ao dia. Irmã tinha bronquite na infância. Traz os seguintes exames: Espirometria Pré BD PÓS BD CVF 2,93L (72%) CVF 3,26L (80%) VEF1 1,80L (57%) VEF1 2,13L (68%) VEF1/CVF 61,6 VEF1/CVF 65,3 Radiografia de tórax sem alterações. Hemograma Hb 14 ht 48 leucitos 8600 eosinófilos < 100cel/mcl. Com base no caso apresentado, assinale a alternativa correta.","o":["Paciente DPOC GOLD 2, e deve-se iniciar o tratamento medicamentoso com o uso de broncodilatadores.","Paciente com asma, pois apresenta eosinofilia e história familiar de asma, e o tratamento deve ser iniciado com corticoide inalatório.","Paciente com diagnóstico DPOC GOLD 3, o tratamento medicamentoso deve ser iniciado com a associação de um broncodilatador e um corticoide inalatório.","Paciente com asma, pois apresenta espirometria com resposta ao broncodilatador de 330ml em VEF1.",""]},{"a":2021,"n":16,"e":"Clínica Médica","t":"Acidente vascular encefálico / tPA / Trombólise","g":"A","x":false,"q":"Criança de 2 anos de idade é levada ao consultório médico, pois, durante uma reunião, familiares questionaram sobre a palidez cutânea da criança. Mãe refere não ter percebido isso anteriormente. Nega febre, nega perdas de sangue e sem outras queixas. Aceita poucos alimentos sólidos, tomando cerca de 8 mamadeiras de 240 mil de leite integral com:café. Exame físico identifica apenas palidez cutânea, anictérica, sem outras alterações. Quanto ao resultado laboratorial mais provável, assinale a alternativa correta.","o":["Anemia hipocrômica e microcítica,.saturação de transferrina e ferritina baixas.","Anemia hipocrômica e microcítica, coombs direto positivo e reticulócito alto.","Anemia normocrômica e normocítica, capacidade de ligação do ferro baixa.","Anemia normocrômica e normocítica, ferritina normal e ferro sérico alto.","Anemia normocrômica e macrocítica, reticulócito alto e vitamina B12 baixa."]},{"a":2021,"n":18,"e":"Clínica Médica","t":"Choque séptico / Lactato e vasopressores","g":"C","x":false,"q":"Lactente de 2 meses é levado à consulta devido a regurgitações frequentes. Segundo a mãe, paciente regurgita aproximadamente 8 vezes ao dia, principalmente após a mamada. Alimentação consiste exclusivamente de fórmula de primeiro semestre (fórmula de partida). Paciente foi recém-nascido termo, peso de nascimento 3050 g. Ao exame físico, bom estado geral, corado, hidratado; peso e estatura próximos ao Z score O. Em relação às medidas não farmacológicas indicadas no manejo desse quadro, considere as afirmativas a seguir. 1. Colocar para dormir em decúbito lateral ou supino. Il. Trocar fórmula de partida por fórmula à base de proteína de soja. Ill. Reduzir o volume das mamadas com manutenção do volume total diário. IV. Manter o lactente em posição vertical por 20 a 30 minutos após a mamada. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2021,"n":20,"e":"Clínica Médica","t":"LRA / Critérios KDIGO e indicações de diálise","g":"B","x":false,"q":"Sobre a forma como os agentes infecciosos provocam as doenças exantemáticas na infância, considere as afirmativas a seguir. I. O meningococo desenvolve lesões de pele por lesão vascular. Il. O vírus varicela zoster desenvolve lesões de pele por ação de toxinas. Ill. A escarlatina é provocada pela ação direta da bactéria Streptococcus pyogenes na pele. IV. O exantema do sarampo ocorre por ação imunoalérgica do vírus na pele. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas II, Ill e IV são corretas."]},{"a":2021,"n":21,"e":"Ginecologia/Obstetrícia","t":"Pré-natal / Rastreamento de anomalias fetais","g":"A","x":false,"q":"Paciente do sexo masculino, 5 anos, apresenta dificuldade de evacuar há 2 meses. Segundo a mãe, nos últimos 14 dias, evacua em dias alternados, fezes de grosso calibre, com dor e esforço para evacuar; refere também 2 episódios de escape fecal em roupa íntima. Nega sangramento nas fezes ou perda de peso. Refere eliminação de mecônio entre 24 e 48 horas de vida. Ao exame físico, peso e altura próximos ao Z score 0, abdômen com leve distensão e presença de fezes palpáveis em fossa ilíaca esquerda, ânus com hiperemia perianal, sem fissuras. Com referência ao quadro clínico, considere as afirmativas a seguir, que correspondem aos critérios para diagnóstico de constipação funcional segundo o ROMA IV. I. Dor ao evacuar. Il. Dois episódios de escape fecal em 14 dias. HI. Eliminação de mecônio com menos de 48 horas de vida. IV. Frequência evacuatória em dias alternados. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2021,"n":22,"e":"Ginecologia/Obstetrícia","t":"Pré-eclâmpsia / Critérios e manejo","g":"D","x":false,"q":"Menina de 8 anos e 6 meses é trazida ao pediatra com queixa de baixa estatura. Ao exame físico, apresenta estatura abaixo do percentil 3, com alvo genético no percentil 10. Apresenta idade óssea de 7 anos. Exames complementares (hemograma, eletrólitos, proteínas, cálcio, fósforo, magnésio e provas de função renal e hepática) normais. Exame físico sem alterações, M1, P1. Para dar prosseguimento à investigação, assinale a alternativa que apresenta, corretamente, qual(is) exame(s) deve(m) ser solicitado(s) inicialmente.","o":["ACTH e cortisol.","GH basal.","IGF-1 (fator de crescimento símile a insulina).","TsHe T4 livre.","Teste de estímulo de GH com clonidina."]},{"a":2021,"n":24,"e":"Ginecologia/Obstetrícia","t":"Trabalho de parto prematuro / Tocólise","g":"C","x":false,"q":"(Desatualizada) Recém-nascido a termo, parto vaginal, pré-natal sem intercorrências, 3.200 g ao nascimento, Apgar 9- 9. Ficou em alojamento conjunto e, com 40 horas de vida, realizou-se o “Teste do Coraçãozinho”, que apresentou o seguinte resultado: membro superior direito: 99% e membro inferior: 95%. Em relação ao referido teste, assinale a alternativa correta.","o":["É um teste de triagem neonatal para cardiopatias congênitas críticas e não deve ser realizado na primeira semana de vida.devido à possibilidade de resultados falso-positivos.","Considera-se teste normal quando as saturações de oxigênio em membros superior e inferior estiverem acima de 92%. ?","Repetir o exame desse bebê em uma hora e, se permanecer alterado, indicar a realização de ecocardiograma.","Em relação a esse bebê, pode ser dada alta hospitalar, pois o teste é normal, e reavaliar o recém- nascido em uma semana.",""]},{"a":2021,"n":25,"e":"Ginecologia/Obstetrícia","t":"Eclâmpsia / MgSO4","g":"C","x":false,"q":"Gestante de 37 semanas chegou ao pronto-socorro com pré-eclâmpsia grave, havendo necessidade de interrupção da gestação. Recém-nascido masculino, peso 3300 g, Apgar 7/10, foi encaminhado à Unidade Neonatal devido a taquipneia, com frequência respiratória de 80 bpm, mantendo saturação de 95%, sem necessidade de oxigênio suplementar. Os raios X de tórax mostravam congestão peri-hilar simétrica, espessamento de cisuras interlobares, hiperinsuflação pulmonar leve. Glicemia capilar S0mg/dl e temperatura axilar de 36,5ºC. Quanto ao diagnóstico clínico mais provável, assinale a alternativa correta.","o":["Síndrome do desconforto respiratório do RN (Membrana Hialina).","Cardiopatia congênita.","Taquipneia transitória do RN.","Síndrome de aspiração de mecônio.","Taquipneia devido à hipoglicemia."]},{"a":2021,"n":27,"e":"Pediatria","t":"Aleitamento materno / Classificação OMS","g":"E","x":false,"q":"O cuidado com a saúde da criança exige dominar e utilizar as definições de aleitamento materno adotadas pela Organização Mundial da Saúde (OMS). Assim, em relação aos conceitos estabelecidos, assinale a alternativa correta.","o":["Aleitamento materno - termo usado quando a criança recebe leite materno (direto da mama ou ordenhado) e sem receber outros alimentos.","Aleitamento materno exclusivo -- quando a criança recebe somente leite materno direto da mama.","Aleitamento materno complementado -- quando a criança recebe, além do leite materno, outro tipo de leite ou chás.","Aleitamento materno misto ou parcial -- quando a criança recebe leite materno e outros alimentos sólidos como frutas e legumes.",""]},{"a":2021,"n":28,"e":"Pediatria","t":"Desnutrição / Estado nutricional","g":"A","x":false,"q":"A vigilância do estado nutricional é um importante cuidado na atenção integral à saúde da criança. Considerando essa importância e seus conceitos, assinale a alternativa correta.","o":["A distrofia significa um distúrbio do estado nutricional.","A desnutrição energético-proteica não se associa a outras carências nutricionais.","A desnutrição promove aumento de opsoninas e de atividade fagocítica.","As infecções agravam a desnutrição devido a um balanço nitrogenado positivo.","O crescimento estatural está comprometido apenas na desnutrição grave."]},{"a":2021,"n":29,"e":"Pediatria","t":"Pneumonia pediátrica / Agentes por faixa etária","g":"E","x":false,"q":"Sobre as características das pneumonias na infância, as etiologias e as faixas etárias em que ocorrem, relacione a coluna de cima com a de baixo. (1) Período neonatal. (II) Importante nas pneumonias intra- hospitalares. (III) Importante em crianças com mais de 4 a 5 anos de idade. (IV) Pneumonia bacteriana associada à corioamnionite. (V) A vacinação causou queda importante na sua frequência. (A) Haemophilus influenzae tipo b. (B) Enterobactérias gram-negativas ou Streptococcus agalactiae. (C) Diferentemente de todas as outras faixas etárias, as bactérias representam a principal causa de pneumonia nesse grupo. (D) Staphylococcus aureus. (E) Mycoplasma pneumoniae. Assinale a alternativa que contém a associação correta.","o":["|-B,II-A, III-E, IV-C, V-D.","|I-B,II-D, III-E, IV-A, V-C.","I-C,II- A, III-D, IV-B, V-E.","|-C, II- D, III-A, IV-B, V-E.","|-C, II- D, III-E, IV-B, V-A."]},{"a":2021,"n":30,"e":"Pediatria","t":"IVAS / Faringoamigdalite / Escarlatina","g":"B","x":false,"q":"Lactente de 7 meses de idade é transferido ao pronto atendimento de hospital de alta complexidade com queixa de febre há dois dias e exantema caracterizado por petéquias e púrpuras nas 12 horas mais recentes. A criança apresenta-se obnubilada, pálida, taquicárdica e com extremidades frias. Tempo de enchimento capilar maior que seis segundos. Mãe refere que a criança está há mais de 24 horas sem apresentar diurese. No serviço de origem, recebeu 60 mL/Kg de soro fisiológico, como expansão intravascular. Está edemaciado, fígado palpável a 8 cm do RCD e com estertores crepitantes em bases pulmonares bilateralmente. Sinais vitais: frequência cardíaca de 202 bpm, frequência respiratória de 12 movimentos por minuto, pressão arterial (PA) de 50 / 11 mmHg. Além da intubação orotraqueal, considere as medidas terapêuticas a seguir. I. Prescrever noradrenalina ou adrenalina, para reestabelecimento da pressão arterial. A seguir, considerar inotrópicos, sobretudo em casos de baixa saturação venosa central. Il. Prescrever soro fisiológico em alíquotas de 20 mL/Kg, a cada 20 minutos, até 60 ml/Kg. Após início de diurese e melhora da perfusão periférica, considerar noradrenalina. Ill. Considerando má perfusão periférica e sinais de baixo débito, prescrever inicialmente dobutamina associada à dopamina em doses baixas para melhora da perfusão renal. IV. Considerar prescrição de vasopressina, associada ou não a corticosteroide sistêmico, se a criança não apresentar melhora da pressão arterial após titulação das catecolaminas. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2021, gado.",""]},{"a":2021,"n":37,"e":"Pediatria","t":"Crise convulsiva neonatal / Diagnóstico","g":"A","x":false,"q":"Uma paciente de 16 anos se apresenta à consulta com queixa de amenorreia primária. Ela é ginasta olímpica e faz exercícios intensos regularmente. Ao exame físico, seu índice de massa corpórea (IMC) é de 17, não tem características dismórficas e a genitália externa é feminina. Apresenta desenvolvimento mamário em estágio Il de Tanner e pêlos pubianos e axilares em estágio IV. Em relação ao perfil hormonal dessa paciente, assinale a alternativa correta.","o":["FSH baixo, LH baixo, estradiol baixo, TSH normal, prolactina normal, testosterona normal.","FSH baixo, LH baixo, estradiol baixo, TSH normal, prolactina alta, testosterona normal.","FSH normal, LH normal, estradiol baixo, TSH normal, prolactina normal, testosterona elevada.","FSH normal, LH normal, estradiol normal, TSH normal, prolactina normal, testosterona normal.","FSH alto, LH alto, estradiol baixo, TSH normal, prolactina normal, testosterona normal."]},{"a":2021,"n":38,"e":"Pediatria","t":"Sepse neonatal precoce / Streptococcus GBS","g":"A","x":false,"q":"Assinale a alternativa que apresenta, corretamente, uma contraindicação para a indução do parto.","o":["Vasa prévia.","Pré-eclâmpsia. 7","Ruptura prematura das membranas.","Corioamnionite.","Gestação prolongada."]},{"a":2021,"n":39,"e":"Ginecologia/Obstetrícia","t":"Contracepção / Métodos hormonais","g":"E","x":false,"q":"Quanto aos fatores de risco para gravidez ectópica, considere os itens a seguir. 1. Coito interrompido. Il. Doença inflamatória pélvica. Ill. Idade materna avançada. IV. Tabagismo. Assinale a alternativa correta.","o":["Somente os itens le Il são corretos.","Somente os itens | e IV são corretos.","Somente os itens Ill e IV são corretos.","Somente os itens |, Ile Ill são corretos.","Somente os itens Il, Ille IV são corretos."]},{"a":2021,"n":41,"e":"Ginecologia/Obstetrícia","t":"MgSO4 neuroprofilaxia / Contraindicações","g":"D","x":false,"q":"Quanto às contraindicações ao uso do sulfato de magnésio para neuroprofilaxia em gestações entre 24 a 31 semanas e 6 dias, considere os itens a seguir. I. Miastenia grave. Il. Distúrbios de condução cardíaca materna. Il. Miocardiopatia materna. IV. Restrição de crescimento fetal. Assinale a alternativa correta.","o":["Somente os itens le Il são corretos.","Somente os itens | e IV são corretos.","Somente os itens Ill e IV são corretos.","Somente os itens |, Ile Ill são corretos.","Somente os itens Il, Ille IV são corretos."]},{"a":2021,"n":42,"e":"Ginecologia/Obstetrícia","t":"Parto / Manejo ativo 3o período","g":"D","x":false,"q":"Quanto às complicações da gestante com hipotireoidismo, considere os itens a seguir. 1. Pré-eclâmpsia. Il. Descolamento prematuro de placenta. Ill. Hemorragia pós-parto. IV. Diabetes gestacional. Assinale a alternativa correta. á","o":["Somente os itens le Il são corretos.","Somente os itens Ie IV são corretos.","Somente os itens Ill e IV são corretos.","Somente os itens |, Ile Ill são corretos.","Somente os itens Il, Ille IV são corretos."]},{"a":2021,"n":44,"e":"Ginecologia/Obstetrícia","t":"SOP / Hiperandrogenismo","g":"E","x":false,"q":"Quanto às vantagens do fórceps em relação ao vácuo-extrator na abreviação do segundo período do trabalho de parto, considere as afirmativas a seguir. ; |. É menos traumático para a mãe. Il. Está associado a maior taxa de sucesso. Ill. Pode ser utilizado nos fetos prematuros. IV. Mais improvável de se desprender no momento da tração do polo cefálico. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas. ;","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2021,"n":45,"e":"Ginecologia/Obstetrícia","t":"Leiomioma uterino / Tratamento","g":"C","x":false,"q":"Secundigesta de 35 anos está com 31 semanas e 5 dias de uma gestação gemelar dicoriônica diamniótica. O gemelar 1 está com um crescimento fetal no percentil 20, mas o gemelar 2 está com o percentil abaixo de 5, volumes de líquidos amnióticos normais. Foi realizado um ciclo de corticoterapia antenatal com betametasona e neuroprofilaxia com sulfato de magnésio. Na avaliação de hoje, o Doppler da artéria umbilical está normal no gemelar 1, mas o gemelar 2 apresenta fluxo diastólico final ausente (diástole zero) com Doppler do ducto venoso demonstrando onda A reversa. Assinale a alternativa que apresenta, corretamente, a conduta para esse caso.","o":["Complementar com cardiotocografia de cada feto a cada 12 horas.","Induzir e promover o parto vaginal.","Proceder imediatamente ao parto via abdominal.","Repetir o Doppler da artéria umbilical do gemelar 2 em uma semana.","Repetir o Doppler do ducto venoso do gemelar 2 em três dias."]},{"a":2021,"n":46,"e":"Ginecologia/Obstetrícia","t":"Rastreamento câncer colo / Citologia","g":"B","x":false,"q":"A epidemiologia pode ser conceituada como a ciência que estuda o processo saúde/doença em coletividades, analisando a distribuição e os fatores contribuintes para os agravos em saúde, subsidiando a elaboração de medidas de prevenção, controle e erradicação de doenças, além do suporte para o planeja- mento, gestão e avaliação das ações e dos serviços de saúde (ALMEIDA FILHO; ROUQUAYROL, 2006). Com base na conceituação de epidemiologia e sua perspectiva em descrever a ocorrência de agravos em saúde, pode-se afirmar que a epidemiologia descritiva consiste na avaliação de três características primordiais. Sobre essas características, assinale a alternativa correta.","o":["Clínica (diagnóstico, prognóstico e terapêutica individual), estatística (abordagem de doenças pelo método numérico) e medicina social (tomar coletivamente a questão da saúde). cíclicas, sazonais e irregulares) e espaço (diferentes espaços, como continentes, países, estados, municípios e até pequenos agrupa- mentos populacionais).","","Promoção (atividades dirigidas à transformação dos comportamentos), proteção (esforço de se antecipar à doença) e recuperação da saúde (melhoria do estado de saúde da pessoa por meio de alguma intervenção terapêutica).","Características sociodemográficas (sexo, idade, classe social, entre outras), hábitos de vida (prática de atividade física, alimentação, consumo de bebidas alcoólicas, tabagismo) e morbidades (doenças/agravos pelos quais o indivíduos estão acometidos).",""]},{"a":2021,"n":47,"e":"Ginecologia/Obstetrícia","t":"Rastreamento câncer mama / Mamografia","g":"B","x":false,"q":"Sobre os diversos estudos epidemiológicos, considere as afirmativas a seguir. 1. Nos ensaios clínicos, os grupos experimental e controle são facilmente comparáveis devido ao controle das variáveis de confundimento. Il. A possibilidade de falácia ecológica (atribuir a indivíduos o que se observou nas análises estatísticas) é uma limitação importante dos estudos caso-controle. Il. Os estudos de coorte apresentam um delineamento favorável para a investigação da etiologia de doenças raras. IV. Nos estudos transversais, a relação cronológica entre os eventos (exposição e desfecho) pode não ser facilmente detectável. Assinale a alternativa correta","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2021,"n":48,"e":"Medicina Preventiva","t":"Indicadores de saúde / Mortalidade infantil","g":"E","x":false,"q":"Indicadores de saúde são medidas em saúde que refletem situações particulares de uma população, as quais normalmente não são detectáveis pela observação direta. Assim, um indicador de saúde tem como principal objetivo fornecer informações sobre a situação de saúde de um indivíduo ou de uma população (PEREIRA, 1995). Sobre os indicadores de saúde, relacione o indicador, na coluna de cima, com a descrição correspondente, na coluna de baixo. (1) Coeficiente de mortalidade geral (CMG) (Il) Coeficiente de mortalidade infantil (CMI) (III) Razão de mortalidade propor- cional (RMP) (IV) Anos potenciais de vida per- didos (APVP) (V) Taxa de mortalidade infantil neonatal (TMIN) (A) Medida de mortalidade baseada não apenas na dimensão da frequência com que os óbitos ocorrem, mas também na dimen- são do tempo que se deixou de viver em decorrência de uma morte. (B) Estimativa de risco de mortes antes de completar 28 dias de vida a que está exposta a população de nascidos vivos em uma determinada área e período. (C) Proporção de óbitos de indivíduos com idade igual ou superior a 50 anos, em relação ao total de óbitos. (D) Quociente entre o total de óbitos e a população de uma área, em determinado período de tempo. (E) Estimativa do risco de morte a que está exposta uma população de nascidos vivos em uma determinada área e período, antes de completar o primeiro ano de vida. y Assinale a alternativa que contém a associação correta.","o":["I-C, II-B, III-D, IV-A, V-E.","I-C, II-E, III-A, IV-D, V-B.","I-D, II-B, III-C, IV-A, V-E.","I-D, II-B, III-A, IV-C, V-E.","I-D, II-E, III-C, IV-A, V-B."]},{"a":2021,"n":49,"e":"Medicina Preventiva","t":"Epidemiologia / Estudo de coorte histórico","g":"E","x":false,"q":"O resumo a seguir é referente ao artigo intitulado “Ganho de peso por década entre trabalhadores de um hospital público: estudo de coorte histórica”. RESUMO O objetivo do estudo foi avaliar as modificações no perfil nutricional dos trabalhadores de um hospital público por três décadas e sua associação com fatores ocupacionais. Estudo de coorte histórica com trabalhadores ativos em 2013 admitidos em três períodos. Foram coletados dados sociodemográficos, de peso e de estatura, e calculado o índice de massa corporal (IMC) do exame admissional e de dois exames periódicos/década. Avaliados 386 trabalhadores (76,4% mulheres, 88,1% de cor de pele branca e 29,3 7,3 anos). A média do peso corporal e do IMC da admissão foram maiores naqueles admitidos em 2000 (P = 66,3 12,5 kg; IMC = 21,3 2,5 kg/m?), em comparação àqueles admitidos em 1980 (P = 56,7 10,2 kg; IMC=21,3 2,5 kg/m? ) e 1990 (P = 62,2 11,5 kg; IMC = 22,9 3,3 kg/m?). A variação do peso e do IMC/década foi maior nos trabalhadores admitidos em 2000, em comparação com aqueles admitidos em 1990 e 1980. Quando essa comparação foi estratificada por sexo, a diferença na variação do peso e do IMC/década foi observada apenas nos homens. Turno de trabalho e categoria profissional não foram associados com a variação do peso corporal e IMC. O aumento ponderal e do IMC refletem a transição nutricional observada no País, o que reforça a necessidade de vigilância nutricional e educação continuada desses trabalhadores. (MONTZEL; COSTA; SILVA, 2019), publicado na revista Ciência & Saúde Coletiva. A partir das informações contidas no resumo, considerando as tipologias de estudos epidemiológicos, pode- se afirmar que o estudo em questão apresenta","o":["unidade de análise agregada, posição do pesquisador de intervenção e eixo temporal transversal.","unidade de análise agregada, posição do pesquisador de observação e eixo temporal transversal.","unidade de análise individuada, posição do pesquisador de observação e eixo temporal transversal.","unidade de análise individuada, posição do pesquisador de intervenção e eixo temporal longitudinal.","unidade de análise individuada, posição do pesquisador de observação e eixo temporal longitudinal."]},{"a":2021,"n":51,"e":"Medicina Preventiva","t":"Doenças de notificação compulsória","g":"E","x":false,"q":"Um estudo foi realizado em município do norte do Paraná com o objetivo de verificar o efeito da mudança e/ou manutenção de pior situação socioeconômica, de estilo de vida e de condições de saúde sobre a incidência de dependência funcional para atividades instrumentais da vida diária (AIVD) em pessoas de 50 anos ou mais (VIEIRA et al. 1755682 TISTERMO 575.377 Número de casos 4.745.464 177.007 10.715 Óbitos 142.058 4.447 238 Fonte: IBGE (2020), PARANA (2020). Os dados apresentados na tabela acima permitem afirmar que, no ano de 2020, até o mês de setembro,","o":["o coeficiente de incidência por COVID-19 no Paraná foi de 250,9 a cada 10.000 casos.","o coeficiente de letalidade por COVID-19 em Londrina foi de 41,4 óbitos a cada 100.000 habitantes.","o coeficiente de mortalidade por COVID-19 no Brasil foi de 2,2%.","o Brasil apresenta o maior coeficiente de letalidade por COVID-19, entre as localidades y apresentadas.",""]},{"a":2021,"n":56,"e":"Medicina Preventiva","t":"Declaração de óbito / Médico responsável","g":"C","x":false,"q":"Um trabalhador de 50 anos de idade caiu acidentalmente da escada no seu local de trabalho fraturando o fêmur direito. Após permanecer internado por um mês em tratamento ortopédico no Hospital Universitário, veio a falecer em decorrência de broncopneumonia de decúbito durante um plantão noturno de final de semana. Nesse caso, assinale a alternativa que apresenta, corretamente, por quem deve ser fornecida a declaração de óbito.","o":["Médico plantonista na noite do óbito.","Médico do Trabalho.","Instituto Médico Legal - IML. ?","Ortopedista responsável pelo caso.","Serviço de verificação de óbitos."]},{"a":2021,"n":58,"e":"Medicina Preventiva","t":"CAT / Comunicação acidente de trabalho","g":"D","x":false,"q":"Com relação à comunicação dos acidentes de trabalho (CAT), assinale a alternativa correta.","o":["Cabe ao médico do pronto-socorro fazer a comunicação, apenas se ele também for médico do trabalho.","Deve ser feita pelo médico do pronto-socorro, imediatamente após o atendimento.","O preenchimento da informação médica cabe ao médico do trabalho da empresa ou que dá assistência de medicina do trabalho à empresa, ouvido o médico que atendeu a vítima.","O preenchimento da informação médica cabe ao médico que atendeu o paciente no pronto- socorro, independente da sua especialidade ;",""]},{"a":2021,"n":59,"e":"Medicina Preventiva","t":"Saúde do trabalhador / NR / Legislação","g":"D","x":false,"q":"Para a Atenção Integral à Saúde dos Trabalhadores, recomenda-se que sejam desenvolvidas algumas iniciativas. Sobre tais iniciativas, considere as afirmativas a seguir. 1. Apoio ao desenvolvimento de estudos e pesquisas relacionados com a Saúde dos Trabalhadores. Il. Fortalecimento da vigilância de ambientes, processos e agravos relacionados ao trabalho. Ill. Promoção de ambientes e processos de trabalho saudáveis. q IV. Participação da comunidade na assistência à saúde dos trabalhadores. Assinale a alternativa correta","o":["Somente as afirmativas le Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2021,"n":60,"e":"Medicina Preventiva","t":"Epidemiologia / OR e RR","g":"A","x":false,"q":"A medicina baseada em evidências propõe a integração das melhores evidências com a experiência clínica e as circunstâncias dos pacientes na tomada de decisões clínicas pelos médicos nos Serviços de Saúde. Em relação à qualidade dessas evidências, assinale a alternativa que apresenta, corretamente, o tipo de estudo que nos fornece evidências de maior qualidade.","o":["Revisões sistemáticas.","Estudo de coorte.","Estudo de casos e controle.","Série de casos.","Ensaios clínicos randomizados."]},{"a":2021,"n":61,"e":"Cirurgia Geral","t":"Cirurgia bariátrica / Indicações e resultados","g":"C","x":false,"q":"O exame físico para a identificação de derrame pleural, sempre teve características facilmente identificáveis, apesar de ser cada vez menos apreciado e utilizado pelos médicos em tempos atuais, principalmente pelo surgimento e disseminação dos exames radiológicos como radiografia de tórax ou mais recentemente a tomografia computadorizada de tórax. A boa prática da medicina deve primar por um bom exame físico em qualquer patologia, pois, além de ser de baixo custo, estreita a relação médico- paciente, promovendo aproximação e contato humano. Em relação aos achados esperados no exame físico de um paciente com derrame pleural volumoso, assinale a alternativa correta.","o":["Percussão com macicez, palpação do frêmito toracovocal diminuído, ausculta com murmário vesicular aumentado, ausculta da voz com broncofo","Percussão com macicez, palpação do frêmito toracovocal diminuído, ausculta da voz com murmúrio vesicular normal, ausculta da voz com pectorilóguia.","Percussão com macicez, palpação do frêmito toracovocal diminuído, ausculta com murmáúrio vesicular diminuído ou abolido, ausculta da voz com egofonia.","Percussão timpânica, palpação do frêmito toracovocal diminuído, ausculta da voz com murmáúrio vesicular diminuído ou abolido, ausculta da voz com egofonia.",""]},{"a":2021,"n":62,"e":"Cirurgia Geral","t":"Câncer gástrico / Estadiamento e ressecção","g":"D","x":false,"q":"A doença coronavírus de 2019 (COVID-19) é caracterizada por síndrome respiratória aguda grave causada pelo coronavírus 2 (SARS-CoV2), considerada uma pandemia pelo mundo pela Organização Mundial da Saúde. A COVID-19 tem uma série de implicações , cardiovasculares importantes, uma delas é a associação com eventos trombóticos arteriais e venosos. Com base nessas informações, considere as afirmativas a seguir. I. Em relação ao uso de anticoagulantes na infecção pelo SARS-CoV-2, é necessário avaliar o risco/benefício, pesando a sua potencial eficácia: prevenção de trombose em microcirculação pulmonar, tromboembolismo venoso e trombose arterial, contra o risco de complicações, como o sangramento. Il. As anormalidades hemostáticas mais frequentes com COVID-19 incluem trombocitopenia e níveis aumentados de dímero-D, que estão associados a um maior risco de eventos tromboembólicos, de exigir ventilação mecânica e admissão na unidade de terapia intensiva. Ill. Pacientes internados com COVID-19 devem ser extratificados de acordo com os escores de Pádua ou Caprini e receberem profilaxia com heparina não fracionada ou de baixo peso molecular em doses profiláticas de acordo com o seu risco de desenvolver fenômenos tromboembólicos. IV. A infecção pelo SARS-CoV-2 parece carregar potencial trombogênico aumentado, com repercussões na microcirculação pulmonar, podendo haver benefício de anticoagulação sistêmica com doses terapêuticas de heparina em todos os pacientes sintomáticos. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas I e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2021,"n":65,"e":"Cirurgia Geral","t":"Colecistite aguda / Laparoscopia","g":"E","x":false,"q":"Quanto às causas de hipotensão no choque neurogênico, considere as afirmativas a seguir. |. Aumento da resistência vascular periférica. Il. Dilatação arteriolar sistêmica. III. Dilatação venosa sistêmica. IV. Diminuição do débito cardíaco. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas. :","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2021,"n":66,"e":"Cirurgia Geral","t":"Obstrução intestinal / Aderências","g":"E","x":false,"q":"Quanto ao sintoma ou sinal mais precope e confiável para o diagnóstico de choque hipovolêmico, assinale a alternativa correta.","o":["Agitação.","Confusão mental e Glasgow rebaixado.","Hipotensão.","Taquicardia.","Vasoconstrição cutânea."]},{"a":2021,"n":67,"e":"Cirurgia Geral","t":"Hemorragia digestiva alta / Varizes esofágicas","g":"E","x":false,"q":"Quanto às alterações que, muitas vezes, ocorrem logo após um politrauma grave, considere os itens a seguir. 1. Hiperfagia. Il. Hipermetabolismo. Ill. Febre. IV. Taquipneia. Assinale a alternativa correta.","o":["Somente os itens le Il são corretos.","Somente os itens | e IV são corretos.","Somente os itens Ill e IV são corretos.","Somente os itens |, Ile Ill são corretos.","Somente os itens Il, Ille IV são corretos."]},{"a":2021,"n":68,"e":"Cirurgia do Trauma","t":"Gluconeogênese pós-trauma","g":"B","x":false,"q":"Questão 68 : As alterações hormonais que ocorrem no pós-trauma ou no pós-operatório favorecem a aceleração da gluconeogênesis. Assinale a alternativa que apresenta, corretamente, onde essa glucose é consumida.","o":["Sistema nervoso central e ossos","Sistema nervoso central e tecido traumatizado em cicatrização.","Rins e musculatura esquelética.","Rins e ossos","Tecido traumatizado em cicatrização e musculatura esquelética."]},{"a":2021,"n":69,"e":"Cirurgia Geral","t":"Sinal de Gersuny / Pancreatite crônica","g":"A","x":false,"q":"O sinal de Gersuny pode ser encontrado no exame físico de pacientes com complicação de determinada patologia. Assinale a alternativa que apresenta, corretamente, a qual patologia o sinal de Gersuny se refere.","o":["Megacolon.","Megaesôfago.","Doença diverticular do cólon.","Pinçamento aorto mesentérico.","Tumores de cabeça de pâncreas."]},{"a":2021,"n":73,"e":"Cirurgia Vascular","t":"Doença arterial periférica / ABI","g":"D","x":false,"q":"Paciento de 45 anos, masculino, internado, no 5º pós-operatório de colecistectomia com coledocotomia para retirada de cálculos do colédoco, apresenta drenagem biliar de 700 ml pelo dreno de Kehr. Está com boa evolução, afebril, boa diurese, aceitando alimentação oferecida, ferida operatória em bom aspecto. Quanto à melhor conduta para esse paciente, assinale a alternativa correta.","o":["Alta hospitalar e retorno ambulatorial para retirada do dreno. :","Solicitar colangiografia por ressonância magnética.","Retirar dreno de Kehr e alta hospitalar.","Solicitar conlangiografia trans-Kehr (colangiografia através da introdução de contraste pelo do dreno).","Solicitar CPRE (colangiopancreatografia endoscópica retrógrada)."]},{"a":2021,"n":74,"e":"Cirurgia Vascular","t":"Varizes / Insuficiência venosa / CEAP","g":"B","x":false,"q":"Paciente de 10 anos refere dor na região escrotal direita há cerca de 3 horas, irradiada para'a região inguinal direita, de início súbito, acompanhada de vômitos. Ao exame físico: BEG, corado, hidratado. TGU: testículo direito aumentado de volume, endurecido, extremamente doloroso e elevado, com perda do reflexo cremastérico ipsilateral. Não houve alívio da dor com a elevação mecânica do órgão. Quanto à(s) conduta(s) nesse caso, assinale a alternativa correta.","o":["Alta com anti-inflamatórios não esteroidais e orientações de repouso e elevação do testículo.","Exploração cirúrgica imediata.","Jejum, analgesia, ultrassonografia de abdome total e observação clínica.","Jejum, raios X de abdome, urina 1, urocultura com antibiograma e cintilografia.","Jejum, urina 1, urocultura com antibiograma e uretrocistografia miccional."]},{"a":2021,"n":75,"e":"Cirurgia do Trauma","t":"Trauma torácico / Pneumotórax hipertensivo","g":"A","x":false,"q":"Assinale a alternativa que apresenta, corretamente, o tratamento de eleição para o teratoma sacrococcígeo, independentemente do tipo histológico.","o":["A ressecção do tumor e do cóccix.","A ressecção do tumor, do sacro e do cóccix.","A ressecção apenas do tumor.","Observação clínica e acompanhamento com níveis séricos de alfa feto proteína e exame ultrassonográfico a cada 3 meses.",""]},{"a":2022,"n":1,"e":"Infectologia","t":"Tuberculose extrapulmonar","g":"A","x":false,"q":"O Brasil está entre os 30 países de alta carga para TB, considerados prioritários pela Organização Mundial de Saúde para o controle da doença no mundo. Nos últimos anos, foram diagnosticados, em média, 70 mil casos novos da doença. As formas extrapulmonares representam, muitas vezes, um grande desafio diagnóstico e terapêutico. Sobre a tuberculose extrapulmonar, considere as afirmativas a seguir. 1. A tuberculose de coluna (Mal de Pott) é responsável por até 50% dos casos de tuberculose óssea, sendo a coluna torácica baixa e lombar os locais mais comumente acometidos. O tratamento pode ser feito com antituberculostáticos por 12 meses. Il. A tuberculose pericárdica tem apresentação subaguda ou crônica. Os sintomas mais comuns são dor torácica, tosse seca, dispneia e, raramente, evolui para tamponamento cardíaco. O tratamento de escolha é feito com antituberculostáticos por, pelo menos, 6 meses. HI. A meningite tuberculosa tem, geralmente, apresentação clínica subaguda ou crônica. A análise do líquor apresenta pleocitose com predomínio linfomononuclear com hipoglicorraquia e pesquisa de BAAR (bacilos álcool-ácido resistentes) em líquor frequentemente positiva. O tratamento é realizado com antituberculostáticos associados a corticoides por 9 a 12 meses. IV. O diagnóstico de tuberculose pleural é, costumeiramente, realizado pela análise do líquido pleural, que tem características clássicas de exsudato com predomínio de polimorfonucleares e níveis elevados de adenosina deaminase (ADA). O tratamento de escolha é feito com antituberculostáticos por 6 meses. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2022,"n":2,"e":"Clínica Médica","t":"Cirrose hepática / Alterações laboratoriais","g":"B","x":false,"q":"Em relação às alterações laboratoriais encontradas no paciente com cirrose hepática, considere as afirmativas a seguir. 1. A hipergamaglobulinemia ocorre pela presença de shunts portossistêmicos. Il. Para o diagnóstico na etiologia alcoólica, é necessário que a aspartato aminotransferase esteja elevada, no mínimo, em duas vezes o limite superior da normalidade. Ill. Hipernatremia é um achado comum no cirrótico descompensado com ascite. IV. A trombocitopenia resulta, dentre vários fatores, da diminuição da síntese hepática de trombopoetina. Assinale a alternativa correta.","o":["Somente as afirmativas le Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Il e Ill são corretas.",""]},{"a":2022,"n":10,"e":"Pneumologia","t":"Asma / Manejo agudo","g":"C","x":false,"q":"Em relação ao risco de suicídio e à avaliação do paciente com risco suicida, considere as afirmativas a seguir. 1. Mulheres cometem quatro vezes mais suicídios que homens. Il. O método empregado ou planejado na tentativa de suicídio é irrelevante na avaliação, já que toda tentativa de suicídio deve ser levada a sério. HI. Tentativa prévia de suicídio é o principal fator de risco para suicídio consumado no futuro. IV. Mesmo diante de recusa de um paciente, com alto risco de suicídio, em aceitar tratamento, a internação psiquiátrica deve ser considerada e discutida com o paciente e os familiares. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas II, Ill e IV são corretas."]},{"a":2022,"n":11,"e":"Clínica Médica","t":"DPOC / Oxigenoterapia domiciliar","g":"A","x":false,"q":"Mulher, 43 anos de idade, moradora de rua, com uso abusivo de álcool há muitos anos, foi trazida pelo serviço de urgência após ser encontrada desacordada. À admissão, apresentava-se estável hemodinamicamente, FC: 110 bpm, FR: 27 irpm, PA: 108/75 mmHg, Sat 02 99%, com oxigênio suplementar via máscara de venturi a 31%. Exames laboratoriais: Hemoglobina: 10,0 g/dL, Leucócitos totais: 6.000 sem desvio à esquerda, Plaquetas: 270.000 mm, Cr: 1,17 mg/dL, U: 40 mg/dL, Na: 137 mEg/L, K: 3,3 mEg/L, CL: 101,5 mEg/L, Ca iônico: 1,05 mmol/L, albumina: 2,5 g/dL, glice
