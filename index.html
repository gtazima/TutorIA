er o aleitamento materno e iniciar fórmula com proteína extensamente hidrolisada."]},{"a":2023,"n":49,"e":"Pediatria","t":"Puberdade / Desenvolvimento puberal","g":"E","x":false,"q":"Assinale a alternativa que apresenta, corretamente, o genótipo relacionado ao HLA (complexo de histocompatibilidade humana) que determina o risco aumentado para desenvolver diabetes mellitus tipo 1 (DM1).","o":["DR1 e DR2","DR1e DR3","DR2e DR3","DR2 e DR4","DR3 e DR4"]},{"a":2023,"n":50,"e":"Pediatria","t":"Epilepsia infantil / Tratamento","g":"B","x":false,"q":"Nas formas monogênicas de obesidade na infância, em um paciente com deficiência de leptina, encontra-se","o":["obesidade que irá se manifestar no final da adolescência e na vida adulta.","hipogonadismo hipogonadotrófico.","redução da densidade mineral óssea e atraso da idade óssea.","alteração concomitante dos receptores das lipoproteínas.","hipertireoidismo central e insuficiência adrenal."]},{"a":2023,"n":51,"e":"Pediatria","t":"Asma pediátrica / Classificação e controle","g":"D","x":false,"q":"Gestante de 36 semanas, com diagnóstico de diabetes gestacional, feto macrossômico, de apresentação pélvica, é submetida à cesárea, devido a pico hipertensivo. O líquido amniótico era claro com grumos, Apgar do recém-nascido foi 5/8 no primeiro e quinto minuto, respectivamente. Peso de nascimento 3800 gramas. Logo após o nascimento, : iniciou quadro de taquipneia (FR 100 mpm), gemência, batimento de asa de nariz, retrações intercostais discretas, necessitando de CPAP nasal com FiOz de 0,25, mantendo saturação pelo oxímetro de pulso de 95%. Ausculta pulmonar sem ruídos adventícios, FC 130 bpm. Raios-X de tórax mostra discreta congestão peri-hilar e espessamento de cissuras interlobares. Assinale a alternativa que apresenta, corretamente, o diagnóstico para esse caso.","o":["Pneumonia congênita.","Síndrome de aspiração de mecônio.","Síndrome do desconforto respiratório do recém-nascido (Membrana Hialina).","Taquipneia transitória do recém-nascido.","Síndrome de escape de ar. ."]},{"a":2023,"n":52,"e":"Pediatria","t":"Asma / Degrau terapêutico","g":"C","x":false,"q":"Questão 52 , Assinale a alternativa que apresenta, corretamente, as estruturas que fazem parte da circulação cardíaca fetal e que, após o nascimento, evoluem normalmente para a oclusão espontânea.","o":["Forame oval e veia pulmonar.","Forame oval e comunicação interventricular.","Forame oval e ducto arterioso.","Comunicação interventricular e ducto arterioso.","Ducto arterioso e arco aórtico."]},{"a":2023,"n":53,"e":"Pediatria","t":"Anemia ferropriva / Suplementação de ferro","g":"C","x":false,"q":"Recém-nascido a termo comparece a sua primeira consulta de puericultura aos 7 dias de vida. Filho de mãe tabagista, com restrição de crescimento intrauterino, nasceu com 2000 gramas. Atualmente, em aleitamento materno exclusivo, apresentando ganho ponderal adequado para a idade. Em relação à prevenção da anemia ferropriva, assinale a alternativa que apresenta a orientação correta.","o":["Manter aleitamento materno exclusivo até o 6º mês de vida e iniciar profilaxia de ferro a partir do 6º mês, com 1 mg/kg/dia, durante 24 meses.","Manter aleitamento materno exclusivo até o 6º mês de vida e iniciar profilaxia de ferro aos 90 dias de vida, com 1 mg/kg/dia, durante 24 meses.","Manter aleitamento materno exclusivo até o 6º mês de vida e iniciar profilaxia de ferro aos 30 dias de vida, com 2 mg/kg/dia, nos primeiros 12 meses.","Manter aleitamento materno exclusivo até o 6º mês de vida e iniciar tratamento com ferro aos 30 dias de vida, com 4 mg/kg/dia, nos primeiros 12 meses.",""]},{"a":2023,"n":54,"e":"Pediatria","t":"Imunizações / Calendário vacinal","g":"D","x":false,"q":"A sucção, no recém-nascido, é um ato reflexo que garante sua sobrevivência e faz parte do ato da amamentação, que garante o sucesso desse importante momento do binômio mãe/bebê. Deve-se estar atento para as dificuldades de amamentação, evitando, assim, possíveis desmames. Assina licado por um especialista.",""]},{"a":2023,"n":81,"e":"Neurologia","t":"Parkinson / Tratamento farmacológico","g":"C","x":false,"q":"Paciênte masculino, 70 anos de idade, procura auxílio médico devido a queixa de tremor no membro superior direito, principalmente em repouso, há 1 ano. Os familiares complementam a história referindo alteração da memória nos últimos meses e sonolência diurna. Ao exame, além do tremor, detectou-se bradicinesia bilateral e rigidez plástica à direita. Assinale a alternativa que apresenta, corretamente, o melhor tratamento para esse paciente.","o":["Amantadina.","Biperideno.","Levodopa.","Pramipexol.","Rotigotina."]},{"a":2023,"n":83,"e":"Ginecologia/Obstetrícia","t":"Eclâmpsia / PCR na gestante","g":"E","x":false,"q":"Paciente feminina, 29 anos de idade, grávida de 38 semanas, chega ao pronto-socorro, deitada em uma maca, trazida por familiares por mal-estar geral e crise convulsiva há ; cerca de 5 minutos. O médico prontamente chama a paciente e, como não tem resposta, avalia a respiração e checa o pulso de forma simultânea. Percebe, então, que a paciente está em parada cardiorrespiratória. Imediatamente, o médico começa as manobras de ave ressuscitação, com compressão e ventilação de forma adequada. y Seguindo os algoritmos específicos, assinale a alternativa correta.","o":["Estudos de metanálise mostraram que, nesses casos, a cesariana de emergencia não aumentou a sobrevida materna e do feto.","Todas as medicações usadas em parada cardiorrespiratória, como amiodarona, vasopressina e adrenalina, estão contraindicadas nesse momento.","A cesariana de emergência está indicada e deverá ser realizada em menos de 5 minutos do início do atendimento, em centro cirúrgico, preferencialmente.","A cesariana de emergência só deverá ser indicada após o primeiro ciclo de 5 minutos, priorizando a massagem cardíaca e a ventilação de qualidade. ,",""]},{"a":2023,"n":89,"e":"Clínica Médica","t":"Sepse / Gasometria / Hipernatremia","g":"C","x":false,"q":"Paciente feminina, 85 anos de idade, hipertensa, diabética não insulinodependente, hipotireoidismo. Não respondia ligações da filha há 2 dias, foi encontrada desacordada em domicílio, trazida pelo SAMU em Glasgow 10, confusa, pouco comunicativa. Ao exame físico, regular estado geral, descorada 2+/4+, pupilas isocóricas, fotorreagentes, mucosas secas, axilas secas, murmúrio vesicular presente bilateralmente, roncos e estertores à direita, bulhas cardíacas rítmicas em 2 tempos sem sopros. Abdome plano, depressível, indolor. Sem edema de membros inferiores. Extremidades frias, mal-perfundidas, tempo de enchimento capilar 4 segundos. PA 90/50 mmHg, FC 143 bpm, FR 24 rpm, SpO2 92%. Sinais de depleção. Realizou tomografia de crânio, sem sinais de sangramento ou isquemia aguda. Raios-X tórax com área de consolidação em base direita. Laboratório inicial com Hemoglobina: 6,5 g/dL; Leucócitos: 16.650 /mm3; Plaquetas: 50.000 /mm3; U: 205; Cr: 2,95; Na+: 154mEg/L; K+: 3,2 mEg/L; Gasometria com pH: 7,0; Bicarbonato: 10 mEg/L; pCO2: 14 mmhHg; Cloro: 115 mEq/L; Glicemia: 95 mg/dL; Cálcio iônico: 0,9 mmol/L. Sobre o caso descrito, considere as afirmativas a seguir. I. Paciente apresenta acidose metabólica hiperclorêmica, visto cloro elevado e ânion-gap normal. Tem indicação de reposição de bicarbonato de sódio parenteral, a despeito de hipernatremia e hipocalcemia. Il. Espera-se uma fração de excreção de sódio urinário elevada, visto hipernatremia hipovolêmica. Ill. A relação Ureia/Creatinina sérica elevada sugere etiologia pré-renal de injúria renal, contudo pode estar aumentada em casos de sangramento gastrointestinal, devendo ser ponderada a hipótese diagnóstica. IV. Paciente apresenta distúrbio de água e sódio sobrepostos. A expansão com solução de Ringer- Lactato é uma boa opção pelos distúrbios eletrolíticos presentes. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2023,"n":90,"e":"Clínica Médica","t":"Hipotireoidismo / Hashimoto / Seguimento","g":"A","x":false,"q":"Diante de um paciente com diagnóstico de hipotiroidismo por tireoidite de Hashimoto, assinale a alternativa correta.","o":["As dosagens de T3 total e T3 livre no plasma são irrelevantes para o diagnóstico.","Além da reposição com levotiroxina, deve-se considerar sempre a adição de T3.","Deve-se solicitar a dosagem de tireoglobulina sérica para auxiliar no ajuste da reposição hormonal.","Uma vez estabelecida a dose adequada de reposição com levotiroxina, deve-se proceder à monitorização do eixo hipófise-tiroide a cada 3 meses.",""]},{"a":2023,"n":91,"e":"Clínica Médica","t":"Endocrinologia / Síndrome metabólica","g":"D","x":false,"q":"Paciente masculino, 53 anos de idade, agricultor, é trazido ao pronto atendimento devido à febre, há 2 dias, associada à dispneia. Ao exame físico inicial, o paciente apresentava resposta motora e verbal apenas ao estímulo doloroso, frequência respiratória de 44 rpm com cianose de extremidades e saturação periférica de oxigênio de 63%, necessitando de intubação orotraqueal. Foi coletada amostra de secreção traqueal, cuja análise microscópica detectou a presença de larvas. Segundo relato da esposa, o paciente era portador de diabetes tipo 2 insulinodependente e HTLV-1. Além do uso irregular de insulina, também estava em uso de prednisona 40 mg duas vezes ao dia, há 5 dias, devido à lombalgia, por indicação de um vizinho. Em relação à principal hipótese diagnóstica, assinale a alternativa correta. é","o":["Ascaridíase.","COVID-19.","Esquistossomose.","Estrongiloidíase.","Paracoccidioidomicose."]},{"a":2023,"n":92,"e":"Clínica Médica","t":"Reumatologia / Artrite reumatoide","g":"D","x":false,"q":"Paciente feminina, 36 anos de idade, portadora de doença de Crohn com indicação de uso de anti-TNF devido à atividade de doença. Relata dor abdominal difusa associada à diarreia crônica, com cerca de 6 episódios por dia, nos últimos 40 dias. Nega febre, sudorese noturna e quaisquer sintomas respiratórios. Exame físico: ruídos hidroaéreos aumentados com dor difusa à palpação abdominal, sem sinais de descompressão brusca. Radiografia de tórax sem alterações. IGRA (Interferon Gamma Release Assay) positivo. Com base nessas informações, assinale a alternativa que apresenta, corretamente, o tratamento indicado.","o":["Isoniazida, dose diária por 4 meses.","Rifampicina, dose diária por 6 meses.","Rifampicina + isoniazida + pirazinamida + etambutol, dose diária por 6 meses.","Rifapentina + isoniazida, dose semanal por 12 semanas.","Não há necessidade de tratamento com antimicrobianos."]},{"a":2023,"n":94,"e":"Clínica Médica","t":"Pancreatite aguda / Diagnóstico","g":"A","x":false,"q":"Paciente masculino, 53 anos de idade, é admitido no pronto-socorro com quadro de dor abdominal, há 1 dia, em todo andar superior, de forte intensidade, com irradiação para dorso, com náuseas, vômitos e comprometimento do estado geral. Ao exame abdominal, apresentava dor difusa à palpação, com defesa em andar superior, descompressão brusca não dolorosa e ausculta com ruídos hidroaéreos ausentes. Em relação aos exames complementares para confirmação diagnóstica, considere as afirmativas a seguir. 1. Distensão de alça de cólons ascendente e transverso com ausência de ar a partir de ângulo esplênico contribui para hipótese de pancreatite aguda. Il. Uma ultrassonografia de abdome superior normal não descarta o diagnóstico de pancreatite aguda bem como patologia de árvore biliar. Ill. Raios-X de tórax sem pneumoperitôneo, com pequeno derrame pleural e atelectasias basais favorecem para origem pulmonar do quadro de dor abdominal. IV. O nível sérico da amilase pancreática, além de essencial para o diagnóstico de pancreatite aguda, é um fator considerado na avaliação da gravidade da doença. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2023,"n":95,"e":"Reumatologia","t":"LES / Anticorpos anti-DNA","g":"D","x":false,"q":"Paciente feminina, 22 anos de idade, refere dores articulares, lesões de pele em face e mãos, queda de cabelo e perda de peso involuntária, há 6 meses. Deu entrada na Unidade de pronto atendimento com queixa de edema generalizado, há 3 dias. O exame físico mostrou pressão arterial 168/98 mmHg, ausculta cardíaca e pulmonar sem alterações, lesões cutâneas eritematosas levemente elevadas em regiões malares bilateralmente, lesões eritematosas em face dorsal de mãos, sobre as falanges proximais e médias, artrite em 3º interfalangiana de mão direita e 22 e 32 metacarpofalangianas de mão esquerda, anasarca, com sinal do cacifo em membros inferiores 3+|4. Hemograma com anemia leve e pesquisa de anticorpos antinucleares (FAN) 1:160 padrão pontilhado fino (valor de referência: menor que 1:80), creatinina 2,2 mg/dL. Assinale a alternativa que apresenta, corretamente, o resultado mais útil para estabelecer o diagnóstico mais provável.","o":["VDRL 1:8 (valor de referência: não reagente).","Anticorpo anticitoplasma de neutrófilo (ANCA) 1:20 padrão perinuclear (valor de referência: não reagente).","Anticorpo anti-Ro 146 U (não reagente: inferior a 20 U).","Anticorpo anti-DNA dupla-hélice 1:160 (não reagente: inferior a 1/10).","Fator reumatoide 18,5 U (não reagente: menor que 7 U)."]},{"a":2023,"n":97,"e":"Infectologia","t":"HIV / Coinfecção tuberculose","g":"B","x":false,"q":"A dexmedetomedina é um sedativo com ação analgésica, frequentemente utilizado no ambiente de terapia intensiva. Essa medicação possui um efeito alfa2 agonista e seu uso pode ser suspenso devido a efeitos colaterais. Assinale a alternativa que apresenta, corretamente, os efeitos colaterais mais frequentes associados ao uso da dexmedetomedina.","o":["Bradicardia e hipoglicemia.","Bradicardia e hipotensão.","Taquicardia e hipotensão.","Taquicardia e miose.","Hipotensão e miose."]},{"a":2023,"n":98,"e":"Clínica Médica","t":"Hipertensão / Crise hipertensiva","g":"D","x":false,"q":"A dengue é a arbovirose urbana mais prevalente nas Américas, principalmente no Brasil. É uma doença febril que tem se mostrado de grande importância, em saúde pública, nos últimos anos. O vírus dengue é um arbovírus transmitido pela picada da fêmea do mosquito Aedes aegypti e possui quatro sorotipos diferentes. Sobre a dengue, assinale a alternativa correta.","o":["A prova do laço é importante para o diagnóstico diferencial da dengue, porém não deve ser realizada em pacientes com mais de 65 anos de idade, devido ao risco de complicações.","A dengue pode ser confirmada através da sorologia - método Enzyme-Linked Immunosorbent Assay (ELISA), que deve ser solicitada a partir do segundo dia do início dos sintomas. €) O choque da dengue ocorre quando um volume crítico de plasma é perdido através do extravasamento para o terceiro espaço, o que geralmente ocorre entre o 12º e 14º dia da doença.","","O choque hemodinâmico da dengue é de rápida instalação e tem curta duração; y podendo levar o paciente a óbito em um intervalo de 12 a 24 horas ou a sua recuperação rápida, após terapia apropriada.",""]},{"a":2023,"n":99,"e":"Clínica Médica","t":"Diabetes / Complicações agudas","g":"A","x":false,"q":"Paciente feminina, 44 anos de idade, chega ao pronto-socorro com queixa de dor torácica de forte intensidade, há cerca de 40 minutos. Sem irradiação. Antecedentes pessoais: diabetes mellitus e histerectomia, há 1 semana. Ao exame: bom estado geral, pressão arterial 130/90 mmHg, frequência cardíaca 120 bpm, saturação 96% em ar ambjente, frequência respiratória 24 ipm, ausculta pulmonar sem ruídos adventícios. Eletrocardiograma taquicardia sinusal. Apresenta o exame de imagem a seguir. 4 t hd O a E No U] + ) |) 1) r ; , Sobre esse caso, assinale a alternativa correta.","o":["O exame é uma angiotomografia de tórax e mostra uma embolia pulmonar. O tratamento com anticoagulante deve ser iniciado.","O exame é uma angiotomografia de tórax e não pode confirmar embolia pulmonar. Uma arteriografia deve ser feita antes de iniciar o tratamento.","O exame é uma angiotomografia de tórax e mostra uma embolia pulmonar. O tratamento mais adequado nesse momento é trombólise com estreptoquinase.","O exame é uma tomografia de tórax e o próximo passo deve ser a coleta do dímero D para confirmação diagnóstica.",""]},{"a":2023,"n":100,"e":"Clínica Médica","t":"DRC / Manejo conservador","g":"B","x":false,"q":"Paciente masculino, 34 anos de idade, queixa de dispneia e tosse seca, há mais de 3 anos, com quadro intermitente de piora dos sintomas. Piora também com mudança climática. Não consegue realizar atividade física por dispneia. Acorda várias vezes à noite pelos mesmos sintomas. Não faz uso de medicação. Nega tabagismo. Exame físico sem alterações. Apresenta o exame a seguir. & Pós sim É Ro VoitL] À 2 | [4 s 5 N f f FEVIRPVOO Mis 755 Mm E 38 ER 2 Sobre esse caso, assinale a alternativa correta.","o":["Espirometria com distúrbio obstrutivo, quadro clínico sugestivo de DPOC. Deve iniciar o tratamento com broncodilatadores em monoterapia.","Espirometria com distúrbio obstrutivo, quadro clínico sugestivo de asma. Pode iniciar o tratamento com corticoide inalatório.","Espirometria com distúrbio restritivo, quadro clínico sugestivo de fibrose pulmonar. Pode iniciar o tratamento com nintendanibe.","Espirometria com distúrbio restritivo. É necessário progredir com exame de imagem para elucidação diagnóstica.",""]},{"a":2024,"n":2,"e":"Pediatria","t":"Choque séptico / Conduta inicial","g":"E","x":false,"q":"Sobre as condutas iniciais nas crianças, em que foi concluído o diagnóstico de choque séptico, assinale a alternativa correta.","o":["A nutrição enteral está contraindicada em crianças com choque séptico após ressuscitação hemodinâmica adequada, mesmo quando não são necessárias doses progressivas de agentes vasoativos, considerando o risco de isquemia intestinal.","Classificar inicialmente o tipo de choque entre o “frio” e o “quente” é imperativo, porque, após essa distinção, no caso de choque refratário, o volume será uma variável para decidir entre noradrenalina, nos casos de choque quente, e adrenalina.","Em casos de sepse, mesmo sem disfunção orgânica ou choque, foi sugerido que o início da antibioticoterapia seja efetivado na primeira hora do reconhecimento da condição clínica da criança, preferencialmente após coleta de hemocultura.","Na abordagem inicial para o atendimento da criança com diagnóstico de choque séptico, as chamadas catecolaminas, independentemente da escolha, só poderão ser instaladas para infusão contínua quando houver acesso venoso central.",""]},{"a":2024,"n":3,"e":"Pediatria","t":"Insuficiência respiratória aguda","g":"D","x":false,"q":"Sobre a percepção da insuficiência respiratória aguda em pacientes pediátricos, assinale a alternativa correta.","o":["O sistema nervoso central é considerado altamente sensível às oscilações da hematose, no entanto, os quimiorreceptores periféricos, localizados nos corpos aórtico e carotídeo, são insensíveis às oscilações das pressões parciais do O2 e COz.","Lesões no tronco cerebral levam a padrões respiratórios anormais característicos com base no nível da lesão, independentemente da ação do córtex sobre a frequência ou sobre o esforço respiratório compensatório.","A barreira hematoencefálica permite que o hidrogênio, mas não o COz, passe livremente, de modo que o pH do LCR é determinado pela concentração de íons hidrogênio, e não pela pressão parcial do gás carbônico.","A insuficiência respiratória hipóxica é definida por uma pressão parcial arterial de oxigênio (PaO>) abaixo de 60 mmHg, que normalmente produz tipicamente uma saturação arterial de oxigênio de 90%.",""]},{"a":2024,"n":4,"e":"Infectologia","t":"Influenza / Oseltamivir","g":"B","x":false,"q":"Os vírus influenza apresentam anualmente um comportamento sazonal e é um dos causadores de síndrome gripal (SG) e síndrome respiratória aguda grave (SRAG). Os pacientes classificados como grupos de risco apresentam maiores chances de complicações, como a pneumonia, ao serem infectados pelo influenza. Nesse contexto, considere as afirmativas a seguir. 1. Paciente com asma grave e SRAG com 4 dias de evolução pode receber oseltamivir. Il. Paciente com asma grave, vacinado contra influenza, com SG há 2 dias, não tem indicação de receber oseltamivir. Ill. A presença de condensação no raios X de tórax afasta o diagnóstico de pneumonia por influenza. IV. O oseltamivir é um potente inibidor seletivo da neuraminidase. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.",""]},{"a":2024,"n":10,"e":"Pediatria","t":"Apendicite aguda pediátrica","g":"E","x":false,"q":"A apendicite aguda é a principal causa de abdome agudo inflamatório na infância. Sobre essa situação, assinale a alternativa correta.","o":["É muito comum a ocorrência de perfuração nas primeiras 24 horas do início da inflamação.","Está restrita às faixas etárias pré-escolar, escolar e adolescência.","Há necessidade de confirmação do diagnóstico através de exames laboratoriais e de ; exames complementares de imagem.","O exame de imagem que deve ser realizado é a tomografia computadorizada do abdome, porque ele é superior à ultrassonografia e tem menos desvantagens.",""]},{"a":2024,"n":11,"e":"Pediatria","t":"Sepse neonatal precoce / Pneumonia","g":"A","x":false,"q":"Recém-nascido com 1 hora de vida apresenta FR = 75 mpm, retrações intercostais, batimento de asa de nariz, gemência, necessitando de CPAP nasal com FiOz de 25%. A criança nasceu de parto natural com 36 semanas de gestação. A bolsa amniótica rompeu 24 horas antes do parto, a gestante apresentou temperatura de 38,5 ºC durante trabalho de parto, útero doloroso. O líquido amniótico era claro c om grumos com fisometria. Pesquisa de Streptococcus do grupo B desconhecida. Raios X de tórax com infiltrado nodular grosseiro em base de pulmão direito. ; Em relação à hipótese diagnóstica, assinale a alternativa correta.","o":["Pneumonia precoce","Taquipneia transitória do recém-nascido","Síndrome do desconforto respiratório ( Membrana Hialina)","Síndrome de Aspiração de Mecônio","Displasia Broncopulmonar"]},{"a":2024,"n":12,"e":"Pediatria","t":"Síndrome de Prader-Willi","g":"B","x":false,"q":"A Síndrome de Prader-Willi (SPW) é um dos exemplos de obesidade genética. A incidência da SPW é d e cerca de 1 a cada 15 mil nascimentos, afetando ambos os sexos igualmente e em todas as etnias. Embora rara, a síndrome de Prader-Willi é a causa genética mais comum da obesidade. Em relação à síndrome de Prader-Willi, assinale a alternativa correta.","o":["Muitos sintomas da síndrome de Prader-Willi variam de acordo com a idade da criança. Recém- nascidos geralmente são GIG (grandes para a idade gestacional) e têm ganho de peso excessivo no primeiro ano de vida.","Problemas hormonais são comuns e há uma redução anormal na função dos órgãos reprodutores, o que limita o crescimento e o desenvolvimento sexual. Os meninos têm criptorquidia e pênis e escroto subdesenvolvidos.","O tratamento com hormônio do crescimento é contraindicado, há aumento da resistência à insulina e, visto que não há cura, são poucos os benefícios com o uso da somatrofina.","A síndrome de Prader-Willi resulta da ausência de material genético ativo em uma região do cromossomo 15 (15q11-q13) e o diagnóstico é feito com a solicitação de cariótipo.",""]},{"a":2024,"n":13,"e":"Pediatria","t":"DM tipo 1 pediátrico / Metas glicêmicas","g":"D","x":false,"q":"Conforme as Recomendações do Ministério da Saúde e da Sociedade Brasileira de Diabetes, um dos objetivos glicêmicos para uma criança de 10 anos com Diabetes Melito tipo 1 é uma glicemia pós-prandial","o":["de 70 a 99 mg/dL.","de 70 a 126 mg/dL.","de 200 a 250 mg/dL.","abaixo de 180 mg/dL.","acima de 300 mg/dL."]},{"a":2024,"n":14,"e":"Pediatria","t":"APLV / Alergia proteína leite de vaca","g":"B","x":false,"q":"Lactente foi exposto a fórmula infantil, à base de leite de vaca, pela primeira vez aos 15 dias de vida e, após 12 horas do contato, apresentou muco nas fezes e irritabilidade ao evacuar, sem lesões de pele ou sintomas respiratórios. Com 1 mês de vida, foi novamente exposto a fórmula infantil e, no dia seguinte, eliminou fezes com a presença de muco e raias de sangue, além do aumento da frequência evacuatória. Assinale a alternativa que explica, corretamente, qual reação adversa ao leite de vaca o paciente apresentou.","o":["Nessa faixa etária, a baixa concentração de lactase nas pontas das vilosidades predispõe à diarreia quando o lactente é exposto a fórmulas à base de leite de vaca.","Decorre de uma interação entre as proteínas do leite de vaca e as células do sistema imune intestinal, que desencadeia uma inflamação local com migração de eosinófilos.","Trata-se de uma reação alérgica mediada por anticorpos da classe IgE formados durante a primeira exposição ao leite de vaca, o que justifica o sangramento no segundo contato.","Quadro causado por anticorpos maternos transmitidos pelo leite materno. Como o paciente se encontra em aleitamento misto, há uma reação antígeno-anticorpo no lúmen intestinal.",""]},{"a":2024,"n":15,"e":"Pediatria","t":"Doença celíaca / Dieta sem glúten","g":"E","x":false,"q":"Pré-escolar de 3 anos de idade é encaminho ao ambulatório de Pediatria devido a quadro de baixo ganho de peso, distensão abdominal e fezes amolecidas há 4 meses. Já recebeu albendazol, sem melhora clínica. Durante a investigação, paciente apresentou anticorpo antitransglutaminase IgA positivo, sendo o diagnóstico confirmado pela biópsia de intestino delgado. Assinale a alternativa que apresenta, corretamente, o tratamento recomendado para esse paciente.","o":["Amoxicilina e claritromicina por 14 dias e omeprazol por 28 dias.","Anti-histamínicos para o controle de sintomas e reduzir a ingestão de ultraprocessados.","Inibidor de bomba de prótons por 8 semanas.","Predinisolona Img/kg por 4 semanas, seguida de redução progressiva.","Restringir consumo de trigo, cevada e centeio por toda a vida."]},{"a":2024,"n":16,"e":"Infectologia","t":"Hepatites virais / Vacinas PNI","g":"A","x":false,"q":"As hepatites virais são importante etiologias de hepatites agudas e crônicas na faixa etária pediátrica. A principal forma de prevenção é por meio da vacinação. Sobre os imunizantes para hepatite disponíveis no Plano Nacional de Vacinação, considere as afirmativas a seguir. 1. A vacina para hepatite B deve ser aplicada no momento do nascimento, inclusive em filhos de portadoras do vírus B. Il. A vacina da hepatite B é encontrada na composição da vacina pentavalente, aplicada aos 2,4e 6 meses. Ill. São indicadas 2 doses da vacina da hepatite A em adolescentes acima de 11 anos, preferencialmente antes do início da vida sexual. IV. A vacina da hepatite A é contraindicada para portadores crônicos do vírus da hepatite Assinale a alternativa correta. .","o":["Somente as afirmativas | e Il são corretas. ,","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2024,"n":17,"e":"Pediatria","t":"ITU pediátrica / Investigação pós-tratamento","g":"D","x":false,"q":"Menina de 4 anos de idade terminou tratamento ambulatorial para primeiro episódio de infecção do trato urinário por E. coli. Quanto à investigação após o diagnóstico e o término do tratamento, assinale a alternativa correta.","o":["Uretrocistografia miccional.","Urografia excretora.","USG de vias urinárias.","Acompanhamento clínico.","Cintilografia renal com DMSA marcado com tecnécio-99m."]},{"a":2024,"n":19,"e":"Medicina Preventiva","t":"Vacinação adolescente / PNI","g":"A","x":false,"q":"Sobre o esquema de vacinação do adolescente do Programa Nacional de Imunizações (PNI) do Ministério da Saúde do Brasil, considere as afirmativas a seguir. |. O reforço da vacina contra difteria e tétano (dT) está indicado a cada 10 anos ou a cada 5 anos, em caso de ferimento grave. Il. O reforço da vacina tríplice viral (sarampo, caxumba e rubéola) está indicado na adolescência, independentemente da-.idade em que foram vacinados. Hll. A vacina contra o papilomavírus humano (HPV) é contraindicada para adolescentes masculinos. IV. A vacina meningocócica indicada para adolescentes protege contra o sorogrupo B. Assinale a alternativa correta.","o":["Somente as afirmativas le Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas II, Ill e IV são corretas."]},{"a":2024,"n":20,"e":"Hematologia","t":"Talassemia alfa / Hemoglobinopatia H","g":"D","x":false,"q":"Criança, 2 anos de idade, foi encaminhada para serviço de hematologia devido à anemia ferropriva refratária ao tratamento. Em uso de ferro 4 mg/kg/dia, paciente mantinha quadro de anemia discreta com microcitose em hemograma. Foram solicitados exames complementares que evidenciaram ferritina aumentada, com saturação de transferrina normal, um discreto aumento de reticulócitos e, em eletroforese de hemoglobina, a presença de 2% de hemoglobina H. Em relação ao diagnóstico desse paciente, assinale a alternativa correta.","o":["Beta-talassemia minor.","Doença falciforme Sbeta-talassemia.","Hemoglobinopatia C.","Traço alfa-talassêmico.","Traço falciforme."]},{"a":2024,"n":21,"e":"Cirurgia Geral","t":"Pseudo-obstrução colônica / Neostigmina","g":"D","x":false,"q":"Idoso admitido na UTI devido a acidente vascular encefálico evolui com quadro progressivo de distensão abdominal e, há quatro dias, não evacua. Encontra-se em internação crônica e já realizou tratamento para sepse de foco pulmonar. Apresenta abdome distendido, ruídos hidroaéreos ausentes, hipertimpânico e doloroso predominantemente em fossa ilíaca direita. Exames laboratoriais: leucócitos 11.000/uL, creatinina 1,8 mg/dL, sódio 148 mEq/L, potássio 3,2 mEq/L e proteína C reativa 35 mg/L. A tomografia mostra distensão do ceco com diâmetro aproximado de 10 centímetros, sem fator obstrutivo. Assinale a alternativa que apresenta, corretamente, o diagnóstico e a conduta.","o":["Apendicite aguda, tratamento cirúrgico.","Diverticulite aguda complicada com obstrução, tratamento cirúrgico.","Íleo paralítico, hidratação e correção dos distúrbios hidroeletrolíticos.","Pseudo obstrução colônica, administração de neostigmina.","Tumor de cólon direito com suboclusão, colonoscopia diagnóstica."]},{"a":2024,"n":22,"e":"Cirurgia do Trauma","t":"Trauma renal / Arteriografia embolização","g":"A","x":false,"q":"Paciente de 22 anos, vítima de ferimento por arma branca em flanco esquerdo é admitido no pronto-socorro. Apresenta-se com vias aéreas pérvias, estável hemodinamicamente, consciente e orientado. Visualiza-se coletor do cateter vesical de demora com conteúdo hemático. Foi submetido à tomografia de abdome que revelou a presença de blush em artéria renal segmentar esquerda. ; / a da AO n», À 5 ; nda es Considerando o caso descrito e a imagem acima, assinale a alternativa que apresenta, corretamente, a conduta.","o":["Arteriografia para angioembolização.","Laparotomia para nefrectomia esquerda.","Nefrostomia esquerda com irrigação contínua.","Nefrectomia esquerda videolaparoscópica.","Tratamento não operatório, observação clínica."]},{"a":2024,"n":24,"e":"Cirurgia Geral","t":"Fasceíte necrotizante perineal","g":"B","x":false,"q":"Paciente do sexo feminino de 45 anos é admitida no pronto-socorro, com lesão necrótica em região perineal há três dias com evolução rápida e progressiva. Apresentou febre não mensurada e calafrios. Hipertensa, diabética e tabagista. Ao exame, encontra-se descorada, desorientada e taquicárdica. Avaliação perineal mostra extensa lesão necrótica e fétida com pontos de flutuação, extensão para coxa e região supra púbica. Após estabilização clínica, a paciente foi submetida à tomografia demonstrada a seguir. , | - 4 | A respeito do caso apresentado, considere as afirmativas a seguir. 1. A realização de colostomia pode ser indicada quando houver contínua contaminação da ferida por conteúdo fecal. Il. A antibioticoterapia deverá ser indicada apenas após o resultado da cultura do tecido. Ill. A terapia com pressão negativa não apresenta vantagem em relação ao curativo oclusivo simples. IV. A paciente deverá ser encaminhada para debridamento de todo o tecido necrótico com urgência. Assinale a alternativa correta.","o":["Somente as afirmativas le Il são corretas.","Somente as afirmativas I e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2024,"n":25,"e":"Cirurgia do Trauma","t":"FAB abdome / Laparotomia + hemocomponentes","g":"B","x":false,"q":"Paciente de 18 anos, admitido após ferimento por arma branca em parede anterior do abdome. Encontra-se com máscara de oxigênio de alto fluxo, pressão arterial 90/50 mmHg, frequência cardíaca de 130 bpm, desorientado e confuso. FAST realizado na sala de emergência positivo em janela hepatorrenal. A seguir, a exposição do paciente. ” PA X a. ad , Er La it de - “sm ] ua à Considerando o caso descrito e a imagem acima, assinale a alternativa que apresenta, corretamente, a conduta.","o":["Laparotomia exploradora e rápida infusão de cristaloides.","Laparotomia exploradora e reposição de hemocomponentes.","Laparoscopia e reposição de hemocomponentes.","Encaminhar a tomografia e reposição de hemoderivados.","Encaminhar a tomografia e rápida infusão de cristaloides."]},{"a":2024,"n":26,"e":"Urologia","t":"Cálculo urinário / Oxalato de cálcio mais comum","g":"D","x":false,"q":"Assinale a alternativa que apresenta, corretamente, o tipo de cálculo urinário mais comum, mundialmente.","o":["Cálcio mono-hidratado","Estruvita","Fosfato de cálcio , ú","Oxalato de cálcio","Urato ;"]},{"a":2024,"n":27,"e":"Urologia","t":"Litotripsia extracorpórea","g":"E","x":false,"q":"Quanto à característica do cálculo urinário mais favorável para o tratamento com litotripsia extracorpórea, assinale a alternativa correta.","o":["Composição de cistina.","Densidade 1000 - 1300 unidades Hounsfield.","Localização em cálice inferior.","Localização em ureter médio.","5-10 mm de diâmetro. ;"]},{"a":2024,"n":28,"e":"Pediatria","t":"Hirschsprung / Biópsia retal","g":"C","x":false,"q":"Questão 28 ' Recém-nascido a termo com 24 horas de vida sem eliminação de mecônio, apresentando distensão abdominal e dificuldade de aceitação de leite materno. Abdômen globoso, brilhoso, tenso e reativo à palpação. Realizado exame proctológico, observado ânus tópico, pérvio e saída de mecônio com pressão ao estímulo retal. Em relação ao quadro clínico, assinale a alternativa correta.","o":["Raramente apresenta outras anomalias associadas.","Exame padrão ouro é o enema opaco.","Exame padrão ouro é biópsia retal com pesquisa de células ganglionares.","O segmento intestinal mais comprometido é cólon proximal.","O tratamento inicial é colostomia. 7"]},{"a":2024,"n":29,"e":"Pediatria","t":"Atresia duodenal / Sinal dupla bolha","g":"E","x":false,"q":"Recém-nascido prematuro de 33 semanas e 5 dias de gestação, com história de polidrâmnio ao ultrassom gestacional, suspeita de síndrome de Down, apresentou aspirado gástrico de 45 mL bilioso na sala de parto. Realizado RX abdômen com a seguinte imagem. Em relação ao caso descrito acima e com base na imagem, assinale a alternativa correta.","o":["A correção cirúrgica deve ser de imediato.","Distúrbio hidroeletrolítico é raro.","Diagnóstico é estenose hipertrófica de piloro.","Má-formação cardíaca associada é rara.",""]},{"a":2024,"n":33,"e":"Cirurgia Geral","t":"Acalasia esôfago / Cirurgia de Heller","g":"E","x":false,"q":"Leia o caso a seguir. Um paciente de 68 anos, do sexo masculino, refere dificuldade para engolir (disfagia) há 2 anos com piora nos últimos 6 meses. Nega queixa de pirose anterior e alteração, de hábito intestinal. Realizou uma endoscopia digestiva alta que não evidenciou alterações. Com base no resultado da endoscopia foi solicitado raios X contrastado de esôfago, hiato, estômago e duodeno (E.E.D.) que mostrou retardo do esvaziamento esofágico, uma dilatação do órgão de 5 cm, sinal do bico de pássaro, presença de ondas peristálticas terciárias e ausência de bolha gástrica. Assinale a alternativa que apresenta, correta e respectivamente, a principal hipótese diagnóstica e a conduta terapêutica para este paciente.","o":["Estenose péptica - cirurgia de Nissen","Estenose péptica - dilatação endoscópica","Estenose péptica - dilatação endoscópica e cirurgia de Nissen","Acalasia de esôfago - cirurgia de Heller","Acalasia de esôfago - dilatação endoscópica"]},{"a":2024,"n":34,"e":"Cirurgia Geral","t":"Cirurgia bariátrica / Mal-absortiva","g":"A","x":false,"q":"Quanto às cirurgias a seguir, para o tratamento da obesidade, assinale a alternativa que apresenta, corretamente, uma cirurgia mal absortiva.","o":["Derivação bilio-pancreática com duodenal switch","Derivação gástrica em “Y-de-Roux” (Bypass gástrico)","Gastrectomia vertical (Sleeve gastrectomy)","Banda gástrica ajustável","Cirurgia de Foby-Capella"]},{"a":2024,"n":35,"e":"Cirurgia Geral","t":"Doença hemorroidária grau IV","g":"D","x":false,"q":"Um paciente com história de sangramento vermelho vivo ao evacuar procura atendimento médico. Durante o exame físico, evidencia-se presença de botões hemorroidários prolapsados e não redutíveis. Assinale a alternativa que apresenta, corretamente, a classificação desta doença hemorroidária.","o":["Graul","Grau ll","Grau ll","Grau IV","Grau V"]},{"a":2024,"n":38,"e":"Gastroenterologia","t":"Sinal de Gersuny / Pancreatite crônica","g":"C","x":false,"q":"Assinale a alternativa que apresenta, corretamente, a patologia em que pode ser encontrado o sinal de Gersuny.","o":["Tumores de cólon","Hipertensão portal","Fecaloma por megacólon","Pancreatite aguda","Pancreatite crônica"]},{"a":2024,"n":39,"e":"Cirurgia Vascular","t":"Isquemia mesentérica / Embolia","g":"D","x":false,"q":"Paciente masculino de 75 anos, refere há aproximadamente 6 horas, início de dor súbita em região epigástrica com piora gradativa associada a náuseas e vômitos biliosos. Apresenta antecedente de tabagismo desde a juventude e já apresentou dois episódios prévios de infarto agudo do miocárdio. Relata ser hipertenso, porém não faz uso de medicações de uso contínuo. Ao exame, encontra-se curvado na poltrona de atendimento ; com o abdome distendido, doloroso à palpação difusa sem sinais de peritonite. Em relação ao caso apresentado, assinale a alternativa correta.","o":["A maioria dos pacientes com abdome agudo vascular apresenta-se com leucocitose, distúrbios hidroeletrolíticos, aumento do lactato e alcalose metabólica.","A ultrassonografia é o exame mais indicado para o diagnóstico definitivo pela facilidade técnica do método.","Ao diagnóstico de trombose venosa mesentérica, a conduta imediata deve ser a revascularização do segmento acometido independentemente da presença de necrose intestinal.","Na embolia da artéria mesentérica superior, a isquemia tende a ocorrer apenas no íleo terminal, enquanto, nos casos de trombose, a tendência é o acometimento de todo o intestino delgado. .",""]},{"a":2024,"n":40,"e":"Cirurgia do Trauma","t":"FPAF perna / Exploração cirúrgica imediata","g":"E","x":false,"q":"Paciente masculino de 18 anos dá entrada no pronto-socorro vítima de ferimento por arma de fogo transfixante em perna direita. O paciente encontra-se com pressão arterial de 130/70 mmHg e frequência cardíaca de 90 bpm, com pequeno sangramento não pulsátil no local da lesão. Ao exame secundário, não há sinais de isquemia ou déficit neurológico. Assinale a alternativa que apresenta, corretamente, a conduta adequada nesse caso.","o":["Alta hospitalar, já que o paciente encontra-se com pulsos presentes e ausência de acometimento neurológico.","Anticoagulação plena para evitar trombose secundária decorrente de lesão térmica causada pelo projétil.","Encaminhar o paciente para o centro cirúrgico para exploração cirúrgica imediata por se tratar de ferimento transfixante.","Radiografia simples em duas incidências para pesquisar possíveis fraturas cominutivas.","Realizar índice tornozelo - braço, caso se apresente alterado, deverá ser realizado exame de imagem."]},{"a":2024,"n":41,"e":"Nefrologia","t":"Vasculite pauci-imune / Síndrome pulmão-rim","g":"C","x":false,"q":"Paciente masculino, 23 anos, trazido pelo pai ao serviço de urgência com história de mal- estar generalizado, confusão mental, urina avermelhada e tosse com expectoração de sangue iniciados hoje pela manhã. Relato familiar de tabagismo e uso de cocaína. Não faz uso de medicações de uso contínuo. Ao exame físico, mau estado geral, descorado 3+/4+, diaforético, exame físico pulmonar com estertores até ápice pulmonar, bulhas cardíacas taquicárdicas, sem sopros, abdome flácido, depressível, indolor, extremidades frias. FC 137 bpm, FR 35 rpm, PA 105/67 mmHg, anúrico desde a admissão, mesmo após dose pontual de furosemida Img/kg. Laboratório inicial com Hemoglobina: 7,7 g/dL; Leucócitos: 22.000/mm? , Plaquetas: 58.000/mm:; Cr: 5,8 mg/dL, Ureia: 240 mg/dL; Na+: 138 mEg/L; K+: 7,5 mEg/L, pH: 6,98; Bicarbonato: 8 mEqg/L; pCO?: 35 mmHg; Cloro: 103 mEqg/L; Glicemia: 87 mg/dL; Lactato 7mmol/L, Albumina: 1,8 g/dL. Resultados de Urina | e marcadores reumatológicos ainda não disponíveis. Quanto ao caso descrito e seus diagnósticos diferenciais, considere as afirmativas a seguir. 1. A pesquisa negativa de anticorpos anticitoplasma de neutrófilos (ANCA) descarta a hipótese de Doença de Goodpasture. Il. O início de suporte renal artificial deve ser adiado até maior estabilidade clínica, visto sangramento ativo atual e alto risco de discrasia relacionado ao procedimento. Il. Tem-se acidose metabólica de ânion-gap aumentado, cujo valor está subestimado pela hipoalbuminemia. IV. A Granulomatose com Poliangeíte e a Poliangeíte Microscópica são vasculites pauci- imunes que podem se apresentar como Síndrome Pulmão-Rim. Assinale a alternativa correta. :","o":["Somente as afirmativas Ie Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2024,"n":42,"e":"Nefrologia","t":"Litíase renal / Vitamina C e oxalato","g":"E","x":false,"q":"Em relação aos conhecimentos sobre litíase renal, assinale a alternativa correta.","o":["Cirurgias bariátricas disabsortivas reduzem a absorção intestinal e, por consequência, a excreção urinária de oxalato, o que cursa com resolução das hiperoxalúrias.","Dietas hiperproteicas têm efeito protetor quanto à nefrolitíase, por aumentarem a excreção de citrato urinário, o que impede a formação de cálculos de oxalato de cálcio.","A acidificação urinária e agentes uricosúricos, como a probenecida, têm benefício na profilaxia de formação de cálculos de urato.","A hidroclorotiazida pode aumentar a calciúria, sendo contraindicada em pacientes com cálculos urinários de cálcio.",""]},{"a":2024,"n":43,"e":"Neurologia","t":"HSA / Nimodipina","g":"E","x":false,"q":"Paciente CFZ, 32 anos, relata pior dor de cabeça de sua vida, por isso procurou atendimento médico no pronto-socorro da sua cidade onde foi realizada tomografia de crânio e evidenciado hemorragia subaracnoide. O médico responsável internou a paciente, iniciou o tratamento medicamentoso e programou arteriografia. Sobre o tratamento a ser proposto, assinale a alternativa que apresenta, corretamente, o medicamento que pode reduzir o risco de evolução para isquemia cerebral tardia e ter impacto sobre morbimortalidade da paciente.","o":["Aumentar a sedação para regularização da pressão arterial e redução da variação da pressão de pulso.","Continuar com a expansão volêmica, pois a paciente ainda está em uma fase responsiva ao volume.","Infundir azul de metileno para agir sobre a vasoplegia induzida pelo trauma vascular e corrigir a hipotensão.","Iniciar dobutamina, pois a paciente ainda está hipotensa apesar do uso de noradrenalina e pode apresentar disfunção miocárdica pelo trauma vascular.","Nimodipina E e ? Paciente jovem de 35 anos, vítima de acidente moto x auto com lesão de vascular e ortopédica é encaminhada à UTI após abordagem cirúrgica. No hospital recebeu 2000 ml de cristaloide e 2 concentrados de hemácias antes de ser encaminhada à UTI. Na admissão, pressão arterial 80/40, frequência cardíaca 110 bpm, noradrenalina 0,1 mcg/kg/min, sedada em ventilação mecânica controlada com FiOz 50%, frequência respiratória 20 irpm, PEEP 5, volume corrente de 8 ml/Kg de peso predito. O plantonista, enquanto realizava o exame físico de admissão, verificou que o monitor apresentava a seguinte curva de pressão arterial invasiva com variação da pressão de pulso de 25%. Com base nessas informações, assinale a alternativa que apresenta, corretamente, a melhor intervenção nesse momento."]},{"a":2024,"n":46,"e":"Cardiologia","t":"DIC em mulheres / IAM","g":"D","x":false,"q":"Sobre as diferenças na doença isquêmica do coração entre homens e mulheres, publicada no Posicionamento sobre Doença Isquêmica do Coração (DIC) - Mulher no Centro do Cuidado pela Sociedade Brasileira de Cardiologia em 2023, assinale a alternativa correta.","o":["Ador torácica não é o sintoma mais prevalente de IAM em mulheres, sendo as mulheres mais propensas a apresentar sintomas atípicos, incluindo dor na parte superior das costas e pescoço, fadiga, náuseas e vômitos.","As mulheres são mais propensas do que os homens a apresentar ruptura de placa e, nelas, a revascularização da artéria ocluída pode ser mais difícil, devido ao sangramento no local de acesso e artérias coronárias pequenas e tortuosas. ;","As mulheres têm artérias coronárias epicárdicas menores do que os homens, mesmo após ajuste para superfície corporal e massa do ventrículo esquerdo, porém, em comparação com os homens, as mulheres têm maior prevalência de aterosclerose coronariana obstrutiva.","As mulheres que apresentam DIC obstrutiva geralmente são mais velhas do que os homens, têm mais comorbidades cardiovasculares e maior incidência de desfechos cardiovasculares adversos, incluindo mortalidade após infarto agudo do miocárdio (IAM).",""]},{"a":2024,"n":47,"e":"Cardiologia","t":"Doença de Chagas / Alterações ECG","g":"C","x":false,"q":"Sobre a doença de Chagas (DC), considere as afirmativas a seguir. 1. A ausência de alterações eletrocardiográficas é um indicador fidedigno de ausência de acometimento cardíaco. Il. A duração do QRS > 140 ms e o intervalo QT > 450 ms tem acurácia moderada em predizer FEVE reduzida em pacientes com DC. Il. A duração do QRS está diretamente relacionada ao tamanho do ventrículo esquerdo e inversamente relacionada com a fração de ejeção do ventrículo esquerdo (FEVE) . IV. O Bloqueio de Ramo Direito (BRD) é a anormalidade eletrocardiográfica mais comum, isoladamente ou em associação com outras alterações. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas Il e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas II, Ill e IV são corretas."]},{"a":2024,"n":48,"e":"Endocrinologia","t":"Hipertrigliceridemia / Quilomicronemia familiar","g":"C","x":false,"q":"No ambulatório de Cardiologia, o médico atende um paciente do sexo masculino de 25 anos, encaminhado por apresentar exames laboratoriais alterados, além de episódios de pancreatite no passado. Ao analisar os exames, foi observado um triglicérides de 4800 mg/dL. Sobre a Síndrome da Quilomocronemia Familiar (SQF), assinale a alternativa correta.","o":["A dieta restrita em gorduras tem baixo impacto no valor do triglicérides em pacientes portadores de SQF.","A plasmaferese é contraindicada em pacientes portadores de SQF, devido ao elevado risco de eventos trombóticos.","A Volanesorsena é a droga de escolha para adultos maiores de 18 anos, com confirmação genética e alto risco de pancreatite.","Em adultos ou crianças, a presença de uma dosagem de triglicerídes < 170 mg/dL não exclui a investigação de SQF. .","O tratamento farmacológico convencional com fibratos e estatinas possuem resultados promissores. :"]},{"a":2024,"n":49,"e":"Pneumologia","t":"Protocolo BLUE / Ultrassom pulmonar","g":"A","x":false,"q":"Durante a investigação de um quadro de dispneia, o médico decide usar o ultrassom para elucidação diagnóstica. Seguindo o protocolo BLUE de ultrassom pulmonar e seus perfis, observa-se a imagem a seguir. E 2 ” = | a | ——— - s du | —e ———— oii | io — — DR e a E e ds E— RR = TT—e— y a — | ER pç, = e Eidos Com base nas informações do enunciado e na imagem, assinale a alternativa correta.","o":["Perfil A' com lung point (pneumotórax).","Perfil B' (pneumonia).","Perfil A/B ou C (pneumonia).","Perfil A (embolia pulmonar).","Perfil B (edema pulmonar)."]},{"a":2024,"n":50,"e":"Clínica Médica","t":"Morte encefálica / Transplante cardíaco","g":"E","x":false,"q":"O médico de plantão no PSM de um HU acaba de finalizar um protocolo de morte encefálica. Após alguns minutos, ele é informado que o paciente é um potencial candidato a doação de coração. Segundo as recomendações da 32 Diretriz Brasileira de Transplante Cardíaco e cuidados ao Doador, considere as afirmativas a seguir. 1. Não está indicada a administração de metilprednisolona por via intravenosa de rotina. Il. Manter Pressão Venosa Central (PVC) entre 6-12 mmHg. Ill. Controle da hipotermia, com uso de colchão térmico; fluidos endovenosos aquecidos à temperatura ao redor de 26 e 28 ºC e pelo aquecimento do ar inspirado do ventilador (32 e 35 ºC). IV. Corrigir alterações metabólicas e hematócrito: distúrbios eletrolíticos e acidobásicos; hiperglicemia; corrigir anemia com concentrado de hemácias (ideal hamatocrito > 30% e hemoglobina > 10 g/dL). Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas. ,","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas II, Ill e IV são corretas."]},{"a":2024,"n":52,"e":"Dermatologia","t":"Neoplasias malignas pele / CBC e CEC","g":"D","x":false,"q":"Sobre as neoplasias malignas da pele, considere as afirmativas a seguir. I. Embora a prevalência do carcinoma basocelular(CBC) aumente conforme a exposição solar, a distribuição das lesões não se correlaciona diretamente com a área de maior exposição à radiação ultravioleta. Il. O carcinoma espinocelular(CEC) apresenta uma baixa incidência em populações não caucasianas, porém ainda é o tipo de câncer cutâneo mais comum nesse grupo populacional. Ill. Em pacientes transplantados, observa-se inversão da frequência do CEC em relação ao CBC, sendo o CEC aproximadamente 2 a 3 vezes mais frequente que o CBC. IV. O carcinoma basocelular, em pacientes com fototipos altos, geralmente surge em áreas não fotoexpostas e, frequentemente, é associado com inflamação/ferida crônica ou cicatriz. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas I e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2024,"n":54,"e":"Neurologia","t":"Compressão medular T10 / RNM","g":"E","x":false,"q":"Um homem de 20 anos é atendido no pronto-socorro com a queixa de fraqueza progressiva nos membros inferiores, há um dia, acompanhada de retenção urinária e fecal. Ao exame neurológico, paraparesia nos membros inferiores, nível sensitivo em T10, reflexos hiperativos nos membros inferiores e sinal de Babinski presente bilateralmente. Quanto ao procedimento diagnóstico, assinale a alternativa correta.","o":["Eletroneuromiografia dos membros inferiores.","Punção liquórica.","Ressonância nuclear magnética (RNM) da coluna lombar.","Ressonância nuclear magnética (RNM) da coluna sacral.","Ressonância nuclear magnética (RNM) da medula torácica."]},{"a":2024,"n":55,"e":"Reumatologia","t":"Espondiloartrite / Lombalgia inflamatória","g":"D","x":false,"q":"Homem, 50 anos, previamente hígido, sem comorbidades, há 4 meses teve início insidioso de lombalgia, às vezes com irradiação para a nádega direita. A dor é pior pela manhã, ao acordar. Ficar em pé por mais de 30 minutos causa exacerbação da dor, que é aliviada quando deita. Nega febre ou perda de peso. Exame físico: Lasegue negativo, exame neurológico normal, quadris com mobilidade normal e sem dor às rotações interna e externa. O paciente sente dor à extensão da coluna lombar e à palpação da coluna vertebral, em topografia de L3 e L4. Com base nesses dados semiológicos, assinale a alternativa que apresenta, corretamente, o diagnóstico mais provável.","o":["Hérnia discal","Fratura vertebral","Espondiloartrite","Espondilose","Síndrome do piriforme"]},{"a":2024,"n":56,"e":"Gastroenterologia","t":"Doença de Crohn","g":"B","x":false,"q":"Em relação à doença de Crohn, considere as afirmativas a seguir. 1. A artrite é a manifestação extraintestinal mais frequente, ocorrendo em grandes articulações, sem destruição sinovial. Il. O envolvimento da cavidade oral caracteriza-se por queda dentária por perda óssea, fissuras em lábios e em dorso de língua levando a episódios de sangramento. Ill. Quando o acometimento está restrito às porções distais do íleo, o diagnóstico diferencial com colite ulcerativa será estabelecido após teste terapêutico com infliximabe. IV. A enterografia por ressonância magnética de intestino delgado é útil para identificar áreas de este nose com maior acurácia que a enterotomografia. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2024,"n":58,"e":"Infectologia","t":"Esquistossomose aguda","g":"B","x":false,"q":"Paciente de 32 anos, morador da zona rural da cidade de Bandeirantes-PR, e pescador, comparece em consulta médica devido à febre diária há 2 semanas, associada a calafrios, dor abdominal, tosse seca e manchas de pele pruriginosas em tornozelo. Ao exame físico, Tx 38,3 ºC, fígado a 4cm do RCD, doloroso à palpação profunda, e baço palpável a 3 cm do RCE; presença de micropápulas eritemasosas em tornozelo esquerdo. Exames: Hb 13,3 g/dL; Leucócitos 15500 (58% neutrófilos, 28% linfócitos, eosinófilos 14%). Quanto ao provável diagnóstico, assinale a alternativa correta.","o":["Ascaridíase ?","Esquistossomose aguda","Teníase","Giardíase","Mononucleose infecciosa"]},{"a":2024,"n":59,"e":"Medicina Preventiva","t":"Cigarro eletrônico / EVALI","g":"C","x":false,"q":"O tabagismo representa um grave problema de saúde pública global, contribuindo significativamente para o aumento da morbidade e mortalidade em diversas doenças respiratórias, cardiovasculares e oncológicas. Recentemente, os cigarros eletrônicos, dispositivos eletrônicos para fumar, têm ganhado popularidade entre os jovens, suscitando preocupações sobre seus efeitos à saúde. Sobre o tema do tabagismo de cigarros eletrônicos, considere as afirmativas a seguir. I. Cigarros eletrônicos contêm propilenoglicol, glicerina e aromatizantes, substâncias comuns de uso cosmético e alimentício, portanto não têm a capacidade de causar lesões pulmonares agudas. Il. O tabagismo de cigarros eletrônicos, apesar de associado ao desenvolvimento de doenças respiratórias, é uma estratégia que pode ser usada a título de “redução de danos” para a cessação do tabagismo de cigarro comum. Ill. Cigarros eletrônicos não expõem o tabagista a monóxido de carbono, mas podem conter substâncias químicas prejudiciais à saúde pulmonar, incluindo nicotina, altamente viciante, e produtos químicos voláteis. IV. Estudos científicos indicam que o uso de cigarros eletrônicos está relacionado ao aumento do risco de doenças respiratórias agudas, como a EVALI (sigla em inglês para e- cigarette, or vaping, product use- associated lung injury), especialmente em adolescentes e jovens adultos. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2024,"n":60,"e":"Endocrinologia","t":"DM critérios diagnósticos","g":"A","x":false,"q":"O diabetes mellitus é considerado um problema de saúde pública mundial. Estima-se que, aproximadamente, 12% da população seja portadora da doença, dos quais até 45% não diagnosticados. Considerando esse contexto, assinale a alternativa correta sobre os critérios diagnósticos e recomendações de rastreamento.","o":["Deve-se iniciar o rastreamento em.crianças após os 10 anos de idade, que apresentem índice de massa córporea (IMC) > percentil 85 e presença de 1 ou mais fatores de risco para a doença. ?","O rastreamento está indicado em todas as crianças a partir dos 10 anos de idade, recomenda-se repeti-lo a cada 3 anos.","Glicemias de jejum = 110 mg/dL e hemoglobina glicada = 6,5% são considerados critérios diagnósticos.","Glicemia após 2h do teste oral de sobrecarga de glicose (GTT) = 200 e hemoglobina glicada = 5,7% são considerados critérios diagnósticos.",""]},{"a":2024,"n":61,"e":"Medicina Preventiva","t":"Previne Brasil / Portaria 2.979/2019","g":"C","x":false,"q":"O financiamento pelo Governo Federal da Atenção Primária à Saúde (APS) ocorria por meio do Piso d e Atenção Básica (PAB), o qual destinava um valor por habitante de cada localidade. Contudo, essa forma de financiar a APS foi alterada. Assinale a alternativa que apresenta, corretamente, o ato normativo que promoveu a alteração na forma de financiamento do Governo Federal.","o":["Portaria nº 2.488/2011.","Portaria nº 2.436/2017.","Portaria nº 2.979/2019.","Lei nº 141/2012.","Lei nº 1.2871/2013."]},{"a":2024,"n":62,"e":"Medicina Preventiva","t":"Planejamento normativo vs estratégico","g":"A","x":false,"q":"Historicamente, no campo da saúde, dois modelos de planejamento estiveram em disputa: o planejamento normativo e o planejamento estratégico. Sobre essas formas de planejamento, considere as afirmativas a seguir. 1. No planejamento normativo, o sujeito que planifica está fora da realidade planejada. Il. O planejamento estratégico procura conciliar o conflito e o consenso. Ill. No planejamento normativo deixa de ocorrer o monopólio na elaboração do planejamento. IV. O planejamento estratégico desconsidera os oponentes e os obstáculos. Assinale a alternativa correta.","o":["Somente os itens le Il são corretos.","Somente os itens | e IV são corretos.","Somente os itens Ill e IV são corretos.","Somente os itens |, Ile Ill são corretos.","Somente os itens Il, Ille IV são corretos."]},{"a":2024,"n":64,"e":"Medicina Preventiva","t":"Regionalização SUS","g":"D","x":false,"q":"Um município hipotético, com cerca de 8 mil habitantes, não possui estrutura hospitalar em seu território. Diante disso, o secretário de saúde se reuniu com outros gestores da região com o objetivo de pactuar para quais municípios ele poderia encaminhar os usuários que necessitassem de internação hospitalar. Com base nessas informações, assinale a alternativa que apresenta, corretamente, o princípio organizativo do sistema único de saúde retratado na descrição.","o":["Complementaridade do setor privado.","Controle social.","Descentralização.","Regionalização.","Universalidade."]},{"a":2024,"n":65,"e":"Medicina Preventiva","t":"Estudo de coorte","g":"A","x":false,"q":"Considere um estudo epidemiológico que partiu de uma amostra probabilística de 1.356 pessoas. Esse grupo foi observado durante alguns anos para investigar o surgimento de alguns desfechos. Assinale a alternativa que apresenta, corretamente, o tipo de estudo epidemiológico desenvolvido.","o":["Coorte. E","Caso - controle.","Ecológico. ?","Inquérito.","Ensaio clínico."]},{"a":2024,"n":66,"e":"Medicina Preventiva","t":"Abordagens APS / APS integral e seletiva","g":"E","x":false,"q":"O termo Atenção Primária à Saúde (APS) é um conceito polissêmico que abarca diferentes concepções que estão em constante tensão, tanto no cenário internacional como no contexto brasileiro. Existem pelos menos quatro abordagens de APS. Sobre essas abordagens, considere as afirmativas a seguir. 1. APS integral tem como princípio a cobertura universal a partir de uma população previamente cadastrada. Il. APS de primeiro nível refere-se a serviços de primeiro contato do usuário com o sistema de saúde, destinado a resolver os problemas mais comuns de uma população. HI. APS seletiva pode ser relacionada ao modelo de atenção biomédico, orientado pela oferta de um conjunto mínimo de ações e serviços. IV. APS ainda mais abrangente contempla processos emancipatórios na luta pelo direito à saúde, com vistas à criação de sistemas públicos universais. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2024,"n":67,"e":"Medicina Preventiva","t":"Financiamento SUS / Tendências","g":"C","x":false,"q":"O Brasil é um dos poucos países que possui um sistema de saúde de acesso universal e que estabelece constitucionalmente o Estado como seu financiador. Assinale a alternativa que apresenta, corretamente, as últimas tendências observadas do financiamento do Sistema Único de Saúde.","o":["O Governo Federal (União) apresenta um aumento progressivo de investimentos em É ações e serviços de saúde.","Os munícipios investem, proporcionalmente, menos recursos em saúde do que os estados.","Os munícipios são os entes federativos que apresentam tendência de aumento de seus investimentos e em ações e serviços de saúde.","Os estados investem, proporcionalmente, mais recursos em saúde do que o Governo Federal.","Os estados são os entes federativos que mais investem em ações e serviços de atenção primária à saúde."]},{"a":2024,"n":68,"e":"Medicina Preventiva","t":"Indicadores Previne Brasil","g":"E","x":false,"q":"O Programa Previne Brasil estabeleceu as novas regras de financiamento federal da atenção primária à saúde. Um dos eixos de financiamento proposto consiste na avaliação de desempenho por meio de alguns indicadores. Sobre os indicadores considerados pelo programa Previne Brasil, considere as afirmativas a seguir. 1. A proporção de internação por causas sensíveis à atenção primária à saúde corresponde a um dos indicadores propostos pelo programa. Il. A proporção de gestantes com realização de exames para sífilis e HIV corresponde a um dos indicadores propostos pelo programa. Il. A proporção de gestantes com atendimento odontológico realizado corresponde a um dos indicadores propostos pelo programa. IV. A proporção de pessoas com hipertensão, com consulta e pressão arterial aferida em cada semestre, corresponde a um dos indicadores propostos pelo programa. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2024,"n":69,"e":"Medicina Preventiva","t":"Lei 8.142 / Critérios repasse SUS","g":"D","x":false,"q":"Uma das leis orgânicas do Sistema Único de Saúde (SUS), a Lei no 8142 de 1990, estabeleceu uma série de critérios que os estados e municípios devem atender, para, com isso, receber repasses intergovernamentais referentes ao financiamento do SUS. Em relação aos critérios estabelecidos pela lei, considere as afirmativas a seguir. 1. Fundo de saúde. Il. Conselho de saúde. Ill. Plano de saúde. IV. Complementaridade do setor privado. Assinale a alternativa correta.","o":["Somente as afirmativas le Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas II, Ill e IV são corretas."]},{"a":2024,"n":70,"e":"Medicina Preventiva","t":"Incidência e prevalência / Febre amarela","g":"B","x":false,"q":"Incidência e prevalência são termos importantes na epidemiologia. São utilizados para entender a frequência e a extensão das condições de saúde em uma determinada população. Dito isso, considere que, no ano de 1998, um município diagnosticou 20 casos de febre amarela. Desses 20 casos, um evolui para óbito, 18 para cura e um caso permaneceu em tratamento no ano de 1999. Em 1999, mais 15 casos foram notificados. Assinale a alternativa que apresenta corretamente o número de casos incidentes ou prevalentes.","o":["Em 1998, a incidência foi de 18 casos.","Em 1998, a prevalência foi 20 casos.","Em 1998, a prevalência foi de um caso.","Em 1999, a incidência foi de 16 casos.","Em 1999, a prevalência foi de 15 casos."]},{"a":2024,"n":71,"e":"Medicina Preventiva","t":"RR / Hipertensão / IC95%","g":"E","x":false,"q":"Um estudo com o objetivo de analisar os fatores associados à hipertensão arterial autorreferida, bem como sua-prevalência, na população de adultos brasileiros, encontrou os seguintes resultados: Colesterol elevado (RR = 1,6; IC95% 0,7-1,7); Obesidade (RR = 2,0; IC95% 1,9-2,1); Consumo elevado de sal (RR = 1,1; IC95% 0,9-1,2); Fumantes (RR = 0,9; IC95% 0,8-1,2); Consumo de alimentos ultraprocessados (RR = 2,4; IC95% 0,9 - 3,4). Assinale a alternativa que apresenta, corretamente, a variável associada ao risco de ocorrência de hipertensão arterial.","o":["Colesterol elevado.","Consumo de alimentos ultraprocessados.","Consumo elevado de sal.","Fumantes.","Obesidade."]},{"a":2024,"n":72,"e":"Medicina Preventiva","t":"CEREST / Saúde do trabalhador","g":"A","x":false,"q":"Sobre os Centros de Referência em Saúde do Trabalhador (CEREST), considere as ; afirmativas a seguir. I. Devem prestar assistência especializada aos trabalhadores acometidos por doenças e/ou agravos relacionados ao trabalho. Il. Devem acolher, discutir e prover soluções às demandas institucionais e dos movimentos sociais, relacionados com a situação da saúde e trabalho. Ill. Trabalhadores autônomos e informais, em vez de serem atendidos nos CEREST, devem ser encami nhados para a Atenção Primária em Saúde. IV. Mesmo que acometidos por doença ou agravo relacionado ao trabalho, indivíduos desempregados estão desassistidos pela política de atendimento do CEREST. Assinale a alternativa correta. :","o":["Somente as afirmativas Ie Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2024,"n":73,"e":"Medicina Preventiva","t":"Lei 8.213 / Acidente de trabalho","g":"B","x":false,"q":"A Lei Federal nº 8.213, de 24 de julho de 1991, e suas atualizações dispõem, dentre outros temas, sobre as definições, benefícios e serviços envolvidos em casos de acidentes de trabalho. Sobre esse tema, relacione os conceitos, na primeira coluna, com suas respectivas definições, na segunda. (1) Acidente do trabalho (II) Doença profissional (Ill) Doença do trabalho (IV) Acidente ligado ao trabalho (V) Dia do acidente (A) Produzida ou desencadeada pelo exercício do trabalho peculiar a determinada atividade e constante da respectiva relação elaborada pelo Ministério do Trabalho e da Previdência Social. (B) Data do início da incapacidade laborativa para o exercício da atividade habitual, ou o dia em que for realizado o diagnóstico, valendo para este efeito o que ocorrer primeiro. (C) Ocorre pelo exercício do trabalho a serviço de empresa ou de empregador doméstico provocando lesão corporal ou perturbação funcional. (D) Embora não tenha sido a causa única, contribuiu diretamente para a morte do segurado, para a redução ou perda da sua capacidade para o trabalho, ou tenha produzido lesão que exija atenção médica para a sua recuperação. (E) Adquirida ou desencadeada em função de condições especiais em que o trabalho é realizado e com ele se relacione diretamente. ave Assinale a alternativa que contém a associação correta. y","o":["I-B, II-C, III-D, IV-A, V-E.","I-C, II-A, III-E, IV-D, V-B.","I-C, II-E, III-A, IV-D, V-B.","I-D, II-E, III-A, IV-C, V-B.",""]},{"a":2024,"n":76,"e":"Medicina Preventiva","t":"Anuário segurança pública / Mortes violentas","g":"B","x":false,"q":"O Anuário Brasileiro de Segurança Pública é uma importante ferramenta para o acompanhamento d e aspectos relacionados à violência e ao seu perfil de morbimortalidade. Por meio de dados fornecidos pelos anuários dos anos de 2021 e 2023, que tratam respectivamente dos dados referentes aos anos de 2020 e 2022, é possível identificar o seguinte cenário: 2020\" 2022\" População no Brasd 213317639 203062512 Estupros 60.460 74.930 Pessoas encarceradas 750.518 32.295 ; Dans cut: m bass no cem 2007 Com base nos dados fornecidos e nos conhecimentos em epidemiologia, considere as afirmativas a seguir. I. A taxa de mortes violentas intencionais no Brasil, no ano de 2022, foi de 23,39 mortes violentas para cada 100.00 habitantes. Il. A taxa de estupro, entre os anos de 2020 e 2022, apresentou um aumento de 19,3%, ficando, em 2022, em 23,3 estupros a cada 100.000 habitantes. Ill. Os dados apresentados possibilitam inferir que a taxa de pessoas encarceradas apresentou impacto na taxa de mortes violentas intencionais entre os anos indicados. IV. A estimativa populacional inflacionada para o ano de 2020 introduz um erro sistemático na comparação com 2022, que precisa ser comparada com ressalvas. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas. €C) Somente as afirmativas Ill e IV são corretas.","","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas II, Ill e IV são corretas."]},{"a":2024,"n":78,"e":"Medicina Preventiva","t":"Delineamentos de pesquisa VF","g":"B","x":false,"q":"A decisão clínica deve ser embasada nas mais fortes e relevantes evidências científicas. Para tanto, é preciso que os profissionais de saúde tenham clareza das características, limitações, potencialidades e formas de utilização dos principais delineamentos de pesquisa. Em relação ao delineamento de pesquisa e produção científica, atribua V (verdadeiro) ou F (falso) às afirmativas a seguir. () Metanálise é a uma técnica estatística que combina o resultado de diferentes estudos, sendo habitualmente apresentada na forma de gráficos em floresta ou gráficos de floresta, também conhecidos pelo nome em inglês forest plot. () Um ensaio clínico randomizado cego possui elevado grau de rigor no que se refere à confidencialidade de quais indivíduos foram alocados em cada grupo de pesquisa. () Os estudos de coorte são observacionais e longitudinais; habitualmente, iniciam-se pela exposição dos indivíduos a determinado fator e realizam acompanhamento (follow-up) para avaliar o desenvolvimento do desfecho. () Um ensaio clínico cruzado (cross-over) é aquele em que o grupo que recebe a intervenção e o controle alternam-se durante períodos de tempo bem definidos e habitualmente com um período de intervalo, denominado lavagem (wash-out). () Revisões sistemáticas com metanálises se destacam como produções de fácil elaboração e com alt a confiabilidade, uma vez que praticamente não apresentam vieses ou limitações metodológicas que comprometam seus resultados. Assinale a alternativa que contém, de cima para baixo, a sequência correta. AJV,V, FF, V. BJV, EV, V,F. OV, EV, FF. DJFEV, VFV. ave EJFFF,V,V. ; Um estudo do tipo caso-controle foi conduzido para investigar a possível associação entre o consumo elevado de álcool, considerado como o consumo de >50g/dia de álcool, e a paracoccidioidomicose. O s resultados desta pesquisa podem ser verificados no quadro a seguir, no qual foram considerados como casos os indivíduos com paracoccidioidomicose, e controle os indivíduos sem paracoccidioidomicose. Caso | Controle Consumia =50gidia de dicooi [3% / 40 | ; Não consumia >5Ogidia de álcool 20 Bo Com base nesses dados e nos conhecimentos sobre esse tipo de delineamento, assinale a alternativa correta.","o":["A letalidade do consumo de álcool >50g/dia foi de aproximadamente 43%, sendo esta uma das principais informações fornecidas por este delineamento.","A intenção de tratamento (intention to treat) indica que são necessários 7 tratamentos com >50g/dia de álcool para que 3 obtenham sucesso (desfecho).","O referido estudo teve início pela identificação dos indivíduos que consumiam e não consumiam >50g/dia de álcool.","O teste de razão de chances (odds ratio) é mais adequado para este delineamento, tendo valor de 3,0 para os valores apresentados na tabela.",""]},{"a":2024,"n":81,"e":"Ginecologia/Obstetrícia","t":"RCF / Alterações endócrinas fetais","g":"E","x":false,"q":"Quanto às alterações endócrinas e metabólicas no feto com restrição de crescimento intrauterino, considere as afirmativas a seguir. 1. Hipotrofia das glândulas suprarrenais. Il. Ativação do eixo hipotálamo-hipófise-adrenal. Ill. Aumento do cortisol plasmático. : IV. Diminuição dos níveis de hormônio estimulador da tireoide (TSH). Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas Il e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2024,"n":82,"e":"Ginecologia/Obstetrícia","t":"RCF / Anomalias placentárias","g":"D","x":false,"q":"Em relação às anomalias placentárias associadas à restrição de crescimento fetal intrauterina e feto natimorto, considere as afirmativas a seguir. |. Hematoma retroplacentário. Il. Baixo peso placentário. Ill. Artéria umbilical única. IV. Corioamnionite aguda da placa coriônica. Assinale a alternativa correta.","o":["Somente as afirmativas le Il são corretas.","Somente as afirmativas I e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas II, Ill e IV são corretas."]},{"a":2024,"n":83,"e":"Ginecologia/Obstetrícia","t":"RCF início precoce vs tardio","g":"E","x":false,"q":"Em relação à restrição de crescimento fetal intrauterino (RCF), considere as afirmativas a seguir. I. RCF antes de 34 semanas é considerada de início precoce. Il. Lesões placentárias associadas à hipoperfusão nos compartimentos fetal e materno são mais comuns no início da gestação. HI. A RCF de início tardio pode apresentar pouca ou nenhuma elevação do índice de pulsatilidade da artéria umbilical, mas apresenta uma diminuição no fluxo de volume venoso umbilical. IV. A latência desde o diagnóstico até as alterações cardiovasculares tardias é menor no tipo de início precoce em comparação com o tipo de início tardio. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas Il e IV são corretas.","Somente as afirmativas Ill e IV são corretas. ,","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas II, Ill e IV são corretas."]},{"a":2024,"n":84,"e":"Ginecologia/Obstetrícia","t":"STFF / Síndrome transfusão feto-fetal","g":"A","x":false,"q":"Sobre a síndrome da transfusão feto-fetal (STFF) na gestação gemelar, assinale a alternativa correta.","o":["É mais bem tratada através de coagulação fetoscópica a laser das anastomoses vasculares placentárias.","E sempre causada por um desequilíbrio nas quantidades de líquido amniótico de cada feto. Cc) É uma complicação frequente das gestações monocoriônicas monoamnióticas.","","E grave se a polidramnia do receptor exceder 8 cm pela técnica do maior bolsão vertical (MBV), após 20 semanas de gestação, e o gêmeo doador apresentar menos de 2 cm pela técnica do MBV.","Caracteriza-se por um gêmeo doador pletórico que transfundiu sangue para um gêmeo receptor anêmico."]},{"a":2024,"n":85,"e":"Ginecologia/Obstetrícia","t":"Óbito fetal gemelar","g":"E","x":false,"q":"Em relação ao óbito fetal de um dos gemelares, considere as afirmativas a seguir. I. O risco de óbito fetal em gestações gemelares dicoriônicas, com restrição de crescimento fetal (RCF) seletiva de um dos fetos, dobra em comparação ao risco de RCF em gestações com feto único. Il. O tempo de óbito e a corionicidade são fatores importantes na determinação do desfecho do outro gemelar. Ill. Gêmeos sobreviventes monocoriônicos apresentam risco cinco vezes maior de morte após o óbito fetal de um dos gemelares, em comparação com gêmeos sobreviventes dicoriônicos. IV. Entre os tipos de RCF seletiva em gestações gemelares monocoriônicas, o tipo Il apresenta a maior taxa de deterioração fetal grave. Assinale a alternativa correta.","o":["Somente as afirmativas le Il são corretas.","Somente as afirmativas I e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2024,"n":86,"e":"Ginecologia/Obstetrícia","t":"Gestação gemelar / TAPS e complicações","g":"C","x":false,"q":"Em relação à gestação gemelar, considere as afirmativas a seguir. 1. A sequência anemia-policitemia (TAPS) é uma complicação de início precoce na gestação de gêmeos dicoriônicos. Il. As complicações precoces de gêmeos dicoriônicos são causadas por anastomoses vasculares na placenta. : HI. O peso fetal discordante superior a 25% é um preditor independente de mau resultado da gravidez em gêmeos dicoriônicos. IV. Os riscos de complicações são determinados pela corionicidade. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas II, Ill e IV são corretas. &"]},{"a":2024,"n":87,"e":"Ginecologia/Obstetrícia","t":"Anencefalia / Polidrâmnia","g":"D","x":false,"q":"Uma gestante recebe o diagnóstico de anencefalia com 12 semanas de gestação. É orientada sobre o prognóstico neonatal letal e, mesmo assim, optou pela continuidade da gestação. Tendo a patologia fetal como base, assinale a alternativa que apresenta, corretamente, a complicação a que estaria mais susceptível durante a gestação.","o":["Diabetes gestacional","Placenta prévia","Polidramnia","Pré-eclâmpsia","Tromboembolismo venoso"]},{"a":2024,"n":88,"e":"Ginecologia/Obstetrícia","t":"Amniorrexe prematura 20 semanas","g":"B","x":false,"q":"Em relação às complicações da amniorrexe prematura ocorrida com 20 semanas de gestação e adotada a conduta conservadora, considere as afirmativas a seguir. I. Sequência de Potter. Il. Acretismo placentário. Ill. Procidência de cordão umbilical. IV. Hipoplasia pulmonar. ; Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas Il e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas Il, Ill e IV são corretas."]},{"a":2024,"n":
