89,"e":"Ginecologia/Obstetrícia","t":"Anomalia fetal em jovens / Gastrosquise","g":"A","x":false,"q":"Assinale a alternativa que apresenta, corretamente, a anomalia fetal mais comumente observada em gestantes mais jovens.","o":["Gastrosquise R","Displasia esquelética letal","Trissomia 13","Espinha bífida","Agenesia renal"]},{"a":2024,"n":90,"e":"Ginecologia/Obstetrícia","t":"Supressão lactação / Cabergolina","g":"C","x":false,"q":"Gestante deu à luz a um natimorto de 29 semanas e não quer ter a experiência desagradável da produção de leite. Quanto ao medicamento mais adequado para supressão da lactação, assinale a alternativa correta.","o":["Colecalciferol","Carboprost a","Cabergolina","Domperidona","Sulpirida"]},{"a":2024,"n":91,"e":"Ginecologia/Obstetrícia","t":"Câncer mama / Testes genéticos hereditários","g":"B","x":false,"q":"Assinale a alternativa que apresenta, corretamente, o cenário apropriado para oferecer testes genéticos para susceptibilidade hereditária ao câncer de mama.","o":["Jovem de 13 anos cuja mãe morreu de câncer de mama aos 46 anos de idade.","Mulher adotada com diagnóstico de câncer de mama aos 40 anos de idade.","Mulher de 30 anos cuja mãe foi diagnosticada com câncer de mama aos 77 anos de idade, sem qualquer outro histórico familiar de câncer.","Mulher com câncer de mama diagnosticado aos 56 anos e uma tia-avó materna com câncer de mama diagnosticado aos 80 anos.","Mulher adotada com diagnóstico de câncer de mama aos 53 anos."]},{"a":2024,"n":92,"e":"Ginecologia/Obstetrícia","t":"Inibidores aromatase adjuvantes","g":"C","x":false,"q":"Em relação aos inibidores da aromatase que podem ser utilizados como terapia endócrina adjuvante no câncer de mama, considere os itens a seguir. I. Raloxifeno Il. Tamoxifeno Ill. Exemestano IV. Letrozol Assinale a alternativa correta.","o":["Somente os itens le Il são corretos.","Somente os itens | e IV são corretos.","Somente os itens Ill e IV são corretos.","Somente os itens |, Ile Ill são corretos.","Somente os itens Il, Ille IV são corretos."]},{"a":2024,"n":93,"e":"Ginecologia/Obstetrícia","t":"Fogachos pós-QT câncer mama / Venlafaxina","g":"E","x":false,"q":"Uma paciente de 38 anos tem menopausa induzida por quimioterapia por câncer de mama e apresenta fogachos ao longo do dia. Ela acabou de completar a terapia endócrina com tamoxifeno e está livre da doença há cinco anos. Está saudável, exceto por problemas de retenção urinária. Quanto às opções mais adequadas de tratamento dos fogachos para este caso em específico, considere as afirmativas a seguir. 1. Anti-hipertensivos como clonidina. Il. Terapia hormonal com estradiol, pois é mais eficaz, e ela está livre da doença há cinco anos. Ill. Medicamentos antimuscarínicos como a oxibutinina. IV. Inibidores da recaptação de serotonina e norepinefrina em baixas doses, como venlafaxina. Assinale a alternativa correta.","o":["Somente as afirmativas | e Il são corretas.","Somente as afirmativas | e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Somente as afirmativas |, Ile Ill são corretas.","Somente as afirmativas II, Ill e IV são corretas."]},{"a":2024,"n":94,"e":"Ginecologia/Obstetrícia","t":"Bexiga hiperativa / Antimuscarínicos","g":"E","x":false,"q":"Quanto aos fármacos utilizados para o tratamento da bexiga hiperativa, considere os itens a seguir. 1. Prometazina Il. Darifenacina Ill. Solifenacina IV. Tolterodina Assinale a alternativa correta.","o":["Somente os itens le Il são corretos.","Somente os itens | e IV são corretos.","Somente os itens Ill e IV são corretos.","Somente os itens |, Ile Ill são corretos.","Somente os itens Il, Ille IV são corretos."]},{"a":2024,"n":95,"e":"Dermatologia","t":"Hidradenite supurativa","g":"A","x":false,"q":"A hidradenite supurativa é uma doença crônica da pele que acomete mulheres e se manifesta por lesões papulares recorrentes que podem causar abscesso e formação de trato fistular com cicatrizes. Assinale a alternativa que apresenta, corretamente, as áreas mais comumente afetadas em ordem decrescente de frequência.","o":["Axilar, inguinal, perineal, inframamária.","Inframamária, axilar, perineal, inguinal. :","Inguinal, inframamária, perineal, axilar.","Perineal, inguinal, axilar, inframamária.","Perineal, inguinal, inframamária, axilar."]},{"a":2024,"n":97,"e":"Ginecologia/Obstetrícia","t":"Líquen escleroso recorrência","g":"B","x":false,"q":"Mulher de 70 anos relata, durante a consulta ginecológica, uma queixa de ardência vulvar e hipersensibilidade. Ela fora diagnosticada com líquen escleroso vulvar em biópsia há 15 anos, e o prurido vulvar, que era seu principal sintoma naquela época, está bem controlado. Relata também um histórico de incontinência urinária de esforço. O exame recente da área afetada revela manchas vermelhas mal definidas com edema discreto da vulva e da pele perianal. Quanto à causa mais provável dos sintomas vulvares, assinale a alternativa correta.","o":["Atrofia vaginal.","Dermatite de contato por irritação pela urina.","Dor psicogênica.","Recorrência do líquen escleroso.","Uso excessivo de esteroides tópicos."]},{"a":2024,"n":98,"e":"Ginecologia/Obstetrícia","t":"Finasterida / Feminização feto masculino","g":"A","x":false,"q":"Previamente ao início de tratamento do hirsutismo com finasterida, a paciente é cuidadosamente aconselhada sobre a importância de uma contracepção eficaz. O motivo dessa orientação se justifica devido à-medicação ocasionar:","o":["Feminização de um feto masculino. :","Masculinização de um feto feminino.","Restrição de crescimento intrauterino.","Malformações cardíacas fetais.","Fechamento precoce do canal arterial."]},{"a":2024,"n":99,"e":"Ginecologia/Obstetrícia","t":"SOP / Hiperandrogenismo / 17-OHP","g":"D","x":false,"q":"Adolescente de 16 anos comparece à consulta com queixa de acne grave e crescimento recente de pelos no queixo, exigindo depilação quinzenalmente. Sua menarca fora aos 12 anos de idade. Em questionamento adicional, ela relata ter 4-6 menstruações por ano. Assinale a alternativa que apresenta, corretamente, o exame mais adequado para confirmar seu diagnóstico. E","o":["Ressonância magnética tridimensional dos ovários.","Ultrassom pélvico transvaginal.","Avaliação do histórico familiar de menstruação anormal.","Dosagem de testosterona livre sérica.","Dosagem de 17-hidroxiprogesterona sérica."]},{"a":2024,"n":100,"e":"Ginecologia/Obstetrícia","t":"Progestagênios antiandrogênicos","g":"D","x":false,"q":"Quanto aos progestagênios com atividade antiandrogênica, considere os itens a seguir. I. Acetato de Clormadinona Il. Dienogeste HI. Drosperinona IV. Gestodeno Assinale a alternativa correta.","o":["Somente os itens le Il são corretos.","Somente os itens | e IV são corretos.","Somente os itens Ill e IV são corretos.","Somente os itens |, Ile Ill são corretos.","Somente os itens Il, Ille IV são corretos. ; ave 1 AOODO || 28. AOODO || 51 AVODO || 7. POODO 2 AOODO || 277 AOODO || s2 AVDODO || 7. ADODO 3 AOODO || 28. ADODO || 5. AVODO || 78. AOODO 4. DOODO || 29. ADODO || 54. AOODO || 72. AOODO s AOODO || 30. AVODO || ss. AOODO || 8. AOODO"]},{"a":2025,"n":1,"e":"Pediatria","t":"Sepse / Score Phoenix","g":"B","x":false,"q":"Recentemente, foi publicado em periódicos científicos, com acesso para a comunidade médica, o escore Phoenix para o diagnóstico de sepse. Em relação às recomendações desse escore, atribua V (verdadeiro) ou F (falso) às afirmativas a seguir. (| ) Definição de SEPSE como disfunção orgânica potencialmente fatal, no contexto de uma infecção suspeita ou confirmada, operacionalizada por meio de uma pontuação no Escore de Sepse de Phoenix de, pelo menos, 2 pontos, quantificados em 4 categorias funcionais. (' ) O diagnóstico de choque séptico é estabelecido em crianças com sepse que apresentam, pelo me- nos, 2 pontos no componente cardiovascular do Escore de Sepse de Phoenix, ou seja, hipotensão grave para a idade, lactato sanguíneo > 45 mg/dL (ou maior ou igual a 5 mmol/L), ou necessidade de medicação vasoativa. (. ) A pontuação pode ser calculada na ausência de algumas variáveis, por exemplo, mesmo que o nível de lactato não seja medido e medicamentos vasoativos não sejam usados, uma pontuação cardiovas- cular ainda pode ser determinada usando a pressão arterial. ( ) A disfunção respiratória de 1 ponto pode ser avaliada em qualquer paciente que receba oxigênio, cânula nasal de alto fluxo, pressão positiva não invasiva ou suporte respiratório invasivo (VPM), e inclui uma relação PaO>:FIO, inferior a 200 e uma relação SpO>:FIO» inferior a 220 em crianças que não estão recebendo VPM. (/ ) A pontuação da Escala de Coma de Glasgow mede o nível de consciência com base em resposta verbal, ocular e motora (variação de 3 a 15, com uma pontuação mais alta indicando melhor função neurológica), no entanto, esse subescore de disfunção neurológica não foi validado pragmaticamente em pacientes sedados. Assinale a alternativa que contém, de cima para baixo, a sequência correta.","o":["As fístulas completas do primeiro arco branquial vão desde a tonsila palatina, na cavidade oral, até o terço inferior da borda anterior do músculo esternocleidomastoide.","As mais frequentes são as derivadas do terceiro arco branquial.","Incluem doenças como linfangioma cervical e torcicolo congênito.","O tratamento cirúrgico do cisto do ducto tireoglosso inclui a ressecção da porção medial do osso hioide para diminuir a chance de recidiva.","Os sínus pré-auriculares, também chamados de coloboma auris, são derivados do segundo arco branquial e devem ser sempre ressecados."]},{"a":2025,"n":9,"e":"Pediatria","t":"Megacólon congênito / Hirschsprung","g":"E","x":false,"q":"Com relação ao abdome agudo obstrutivo secundário e ao megacólon congênito, assinale a alterna- tiva que apresenta, corretamente, o achado mais significativo para pensar nesse diagnóstico na fase neonatal.","o":["O principal fator etiológico associado ao seu aparecimento são as atresias intestinais.","A forma de apresentação independe do momento em que ocorreu a perfuração, pois raramente ocorre o fecha- mento espontâneo da perfuração.","A presença de calcificações intra-abdominais indica a possibilidade de tratamento conservador.","Por se tratar de peritonite, a manifestação pós-natal mais frequente é por abdome agudo inflamatório.","Uma vez que a maior parte das perfurações ocorre no início da gestação, o diagnóstico precoce não tem impacto no prognóstico dos pacientes."]},{"a":2025,"n":11,"e":"Pediatria","t":"Peritonite meconial","g":"C","x":false,"q":"Território. (B) Espaço onde se desenvolvem as relações sociais, econômicas, culturais e políticas de uma população, influenciando diretamente o processo de saúde e doença. Além de uma delimitação geográfica, trata-se de um es- paço vivido, construído e transformado pelas interações entre as pessoas que nele habitam. (Wl) Estimativa rápida (C) Processo que identifica e analisa as necessidades e as expectativas de uma participativa. população em relação aos serviços de saúde. Busca compreender quais são os problemas de saúde mais prevalentes, os fatores que influenciam essas necessidades e as características socioeconômicas e culturais que podem afetar a busca por assistência. (IV) Diagnóstico de (D) Avaliação sistemática que busca identificar as condições de saúde, os fa- demanda. tores de risco, os determinantes sociais e as necessidades da população em um determinado território. Assinale a alternativa que contém a associação correta.","o":["Somente as afirmativas | e Il são corretas. d) Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas | e IV são corretas. e) Somente as afirmativas II, Ill e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Sequência policitemia-anemia fetal e discordância fetal entre gemelares.","Transfusão feto-fetal e sequência policitemia-anemia fetal. E Em relação à esteatose hepática da gravidez, considere as afirmativas a seguir. I. As três principais causas de morbidade e mortalidade materna são hemorragia, insuficiência hepática e lesão renal aguda. Il. Trata-se com ácido ursodesoxicólico. HI. O prurido geralmente começa no segundo e/ou terceiro trimestre, afeta principalmente as palmas das mãos e as solas dos pés e é pior à noite. IV. O manejo inicial inclui o parto rápido do feto, independentemente da idade gestacional. Assinale a alternativa correta."]},{"a":2025,"n":12,"e":"Infectologia","t":"Strongyloides stercoralis / Síndrome nefrótica","g":"D","x":false,"q":"Criança, 5 anos de idade, em uso de corticosteroides, há 3 semanas, devido à síndrome nefrótica, apre- senta quadro de tosse seca, há 9 dias, com presença de febre por 3 dias (temperatura máxima de 37,9 ºC). Realizada radiografia de tórax, no segundo dia do quadro, com infiltrado intersticial difuso, e hemograma, com hemoglobina de 12,0 g/dL, leucócitos 9500/mm*, neutrófilos 65%, eosinófilos 10% e linfócitos 20%, plaquetas 250.000/mm. Realizado antiparasitário com melhora dos sintomas. Há 1 dia, repetida radiogra- fia, que não evidenciou alterações patológicas. Assinale a alternativa que apresenta, corretamente, o agente responsável por esse quadro clínico.","o":["Entamoeba histolytica.","Enterobius vermicularis.","Schistosoma mansoni.","Strongyloides stercoralis.","Taenia saginata."]},{"a":2025,"n":13,"e":"Pediatria","t":"Vacinação / Prematuridade","g":"E","x":false,"q":"Paciente diagnosticado com atresia de jejuno no ultrassom pré-natal. O parto ocorreu com 36 semanas de idade gestacional e peso de nascimento de 2450 g, Apgar 9/10. Internado ao nascimento para correção cirúrgica, que resultou em 24 dias de internação. Nesse período, não recebeu qualquer vacina. Quanto ao seguimento de puericultura, assinale a alternativa que apresenta, corretamente, a orientação vacinal a ser realizada.","o":["Adiar vacina da febre amarela para o 6º mês de vida devido ao risco de pancreatite.","Contraindicar a vacina de rotavírus devido à malformação intestinal.","Contraindicar a vacina BCG devido ao peso de nascimento abaixo de 2500 g.","Iniciar o calendário vacinal após completar 40 semanas de idade gestacional.","Seguir o calendário vacinal habitual do Ministério da Saúde sem restrições."]},{"a":2025,"n":14,"e":"Pediatria","t":"DRGE pediátrica / Omeprazol","g":"A","x":false,"q":"Criança, 8 anos de idade, queixava de queimação retroesternal e epigastralgia após refeições, há 3 me- ses. Nega engasgos, dificuldades de deglutição, alterações do hábito intestinal ou do peso. Orientado sobre modificações de estilo de vida com pouca mudança da sintomatologia. Dessa forma, foi realizado tratamento com omeprazol por 10 dias com resolução das queixas. Porém, ao suspender a medicação, os sintomas retornaram. Assinale a alternativa que apresenta, corretamente, a orientação, segundo o protocolo da Sociedade Bra- sileira de Pediatria.","o":["Estender o tratamento com omeprazol por 4 a 8 semanas.","Manter sem medicação e suspender o leite de vaca por 14 dias.","Solicitar ultrassom de abdome para afastar alterações pilóricas.","Tratar com dexlansoprazol por 7 dias e reavaliar sem medicação.","Trocar a classe de inibidor de acidez, a exemplo da domperidona."]},{"a":2025,"n":15,"e":"Pediatria","t":"ITU / Refluxo vesicoureteral","g":"E","x":false,"q":"Criança, 3 anos de idade, é trazida ao pronto-socorro com febre alta, irritabilidade e diminuição na ingesta hídrica. O exame de urina apresenta piúria significativa e bacteriúria. Diante dos mecanismos fisiopatológicos que predispõem crianças ao desenvolvimento desse quadro clí- nico, assinale a alternativa que apresenta, corretamente, o fator etiopatogênico mais relevante relacionado à ascensão bacteriana no trato urinário em pacientes pediátricos.","o":["Alcalinização urinária devido a distúrbios metabólicos, criando um ambiente favorável à colonização bacteriana.","Deficiência na mielinização do detrusor vesical, resultando em disfunção miccional e estase urinária.","Disbiose intestinal associada à microbiota imatura, facilitando a translocação de patógenos resistentes ao trato urinário.","Imaturidade imunológica, com redução na produção de citocinas pró-inflamatórias, comprometendo a resposta imune inata.","Refluxo vesicoureteral primário, favorecendo o transporte retrógrado de bactérias uropatogênicas para o trato urinário superior."]},{"a":2025,"n":16,"e":"Pediatria","t":"ITU recorrente / Correção cirúrgica","g":"C","x":false,"q":"Criança, 6 anos de idade, apresenta episódios recorrentes de infecção do trato urinário mesmo após múl- tiplos ciclos de antibioticoterapia de amplo espectro. Considerando as causas mais comuns para a recorrência de infecções urinárias em pediatria e os me- canismos fisiopatológicos envolvidos, assinale a alternativa que apresenta, corretamente, a estratégia terapêutica mais adequada para prevenir novos episódios infecciosos, levando em consideração as parti- cularidades anatômicas e funcionais do trato urinário pediátrico.","o":["Somente as afirmativas | e Il são corretas. d) Somente as afirmativas |, Il e Ill são corretas.","Somente as afirmativas | e IV são corretas. e) Somente as afirmativas II, Ill e IV são corretas.","Somente as afirmativas Ill e IV são corretas.","Uso de probióticos em altas doses para promover a restauração da microbiota local e aumentar a imunidade inata contra bactérias uropatogênicas.","Vacinação profilática contra patógenos uropatogênicos, visando à imunização ativa contra os principais micro- -organismos causadores de infecção. A sepse neonatal tardia, que ocorre após 48 a 72 horas de vida, é causa importante de morbidade e mortalidade, sobretudo em recém-nascidos prematuros. Em relação a esse tema, considere as afirmativas a seguir. I. Os agentes etiológicos mais frequentes são as bactérias gram-negativas, responsáveis por 70% dos casos, seguidas dos estafilococos coagulase-negativo e pelo Staphylococcus aureus. Il. A utilização de cateteres vasculares e de ventilação mecânica, a exposição a antibióticos nas pri- meiras 72 horas de vida e o uso pós-natal de corticoide e de bloqueadores H, são fatores de risco conhecidos para sepse tardia. HI. A punção lombar deve ser realizada nos casos em que não houver contraindicações, pois é funda- mental para o diagnóstico de meningite, o que pode ocorrer em até 25% dos casos. IV. Início precoce de dieta enteral ou de colostroterapia, aplicação do método Canguru, para os prematu- ros de muito baixo peso, e redução do uso prolongado de antibióticos são consideradas intervenções de grande impacto na prevenção da sepse tardia. Assinale a alternativa correta."]},{"a":2025,"n":18,"e":"Infectologia","t":"Varicela / Diagnóstico clínico","g":"B","x":false,"q":"Criança, 12 meses de vida, é trazida pelos pais ao pronto-socorro pediátrico, com história de, há 5 dias, ter iniciado quadro de febre (duração de 3 dias) e, há 2 dias, ter iniciado aparecimento de lesões cutâneas em face, que progrediram para tronco, com algumas lesões em mucosa oral. No exame físico, a criança estava em bom estado geral, com lesões maculares, vesiculares e pustulares em face, tronco, com algumas máculas em braços e coxas. Também apresentava gânglios aumentados em cadeias cervicais e axilares e algumas vesículas em cavidade oral. O restante do exame físico é normal. A criança é previamente hígida, não possui comorbidade e o calendário vacinal do Programa Nacional de Imuniza- ções (PNI) brasileiro estava atualizado. A respeito desse caso clínico, assinale a alternativa correta.","o":["É muito pouco provável que se trate de caso de varicela, pois a criança está com o calendário vacinal em dia e já recebeu a vacina específica contra varicela do PNI.","É possível fazer o diagnóstico clínico de varicela, e o tratamento indicado é o controle dos sintomas (antitérmico, anti-histamínico) e uso de antisséptico nas lesões para evitar infecções secundárias.","O fato de apresentar polimorfismo regional, ou seja, lesões em diferentes estágios de evolução em um mesmo segmento do corpo, afasta a possibilidade do diagnóstico de varicela.","Para fazer o diagnóstico de varicela e indicar tratamento sintomático, é necessário realizar a coleta de sorologia específica (sorologia para o vírus varicela zóster).","Para fazer o diagnóstico de varicela e indicar tratamento antiviral específico, é fundamental fazer a reação de cadeia de polimerase (PCR) para o vírus varicela zóster em líquido das vesículas."]},{"a":2025,"n":19,"e":"Pediatria","t":"Vacina poliomielite / VIP e VOP","g":"A","x":false,"q":"A respeito das vacinas contra poliomielite disponíveis no Programa Nacional de Imunizações (PNI) brasi- leiro — vacina contra poliomielite inativa (VIP) e vacina contra poliomielite atenuada oral (VOP), considere as afirmativas a seguir. 1. O PNI preconiza o uso do seguinte esquema de vacinação contra poliomielite para crianças com as respectivas idades: VIP aos 2, aos 4 e aos 6 meses, VOP aos 15 meses e aos 4 anos. Il. Após a erradicação da poliomielite, o PNI introduziu a VIP por possuir efeitos colaterais menos graves do que a VOP. Ill. Mesmo a VIP pode provocar poliomielite associada à vacina. IV. Uma vez que os efeitos colaterais da VOP são extremamente raros, crianças com imunodepressão severa podem receber esta vacina. Assinale a alternativa correta.","o":["As aponevroses do músculo oblíquo externo e do transverso formam a parede cefálica (superior) do canal inguinal.","A fáscia transversalis faz parte do assoalho do canal inguinal.","Otriângulo de Hesselbach delimita o anel inguinal interno.","O limite inferior é dado pelo ligamento de Cooper e pelos vasos epigástricos.","É limitado superficialmente (anteriormente) pela aponevrose do músculo oblíquo interno."]},{"a":2025,"n":23,"e":"Cirurgia Geral","t":"Disfagia progressiva / Endoscopia digestiva alta","g":"C","x":false,"q":"Paciente, do sexo masculino, 72 anos de idade, apresentando disfagia progressiva há vários anos, com piora importante nos últimos meses, refere também emagrecimento de 10 kg em 6 meses. Assinale a alternativa que apresenta, corretamente, o exame a ser solicitado inicialmente.","o":["Cintilografia esofágica.","Eletromanometria esofágica.","Endoscopia digestiva alta.","Raios X contrastados de esôfago, hiato, estômago e duodeno, técnica padrão.","Tomografia computadorizada de tórax."]},{"a":2025,"n":24,"e":"Cirurgia Geral","t":"Coledocolitíase / Colangio RM","g":"B","x":false,"q":"Paciente, do sexo feminino, 56 anos de idade, IMC de 34 kg/m?, queixa de dor em andar superior de abdome tipo cólica, que fez com que procurasse pronto atendimento, há 3 dias, onde foi realizada uma ultrassonografia de abdome, que mostrou litíase biliar (vários cálculos pequenos) e uma discreta dilatação das vias biliares. Com medo de que a dor voltasse, procurou um gastroenterologista, que solicitou alguns exames, cujos resultados são apresentados a seguir. Hemograma = sem alterações significativas; Amilase = normal, lipase normal; Gama GT = 800 U/L; Fosfatase Alcalina = 650 U/L; Bilirrubina Total = 3,6 mg/dL: direta = 2,4 mg/dL, indireta = 1,2 mg/dL; TGO (aspartato aminotransferase) = 56 U/L e TGP (alanina aminotransferase) = 102 U/L. Assinale a alternativa que apresenta, corretamente, a melhor conduta para essa paciente.","o":["Derivação transparieto-hepática. d) Tomografia computadorizada de abdome.","Colangio ressonância. e) Videocoloecistetomia.","Colangiopancreatografia retrógada endoscópica.","",""]},{"a":2025,"n":25,"e":"Cirurgia Geral","t":"Síndrome de Boerhaave","g":"B","x":false,"q":"Sobre a síndrome de Boerhaave, atribua V (verdadeiro) ou F (falso) às afirmativas a seguir. (. ) É a ruptura pós-emética do esôfago. ( ) Caracteriza-se por hemorragia digestiva alta pós-vômitos incoercíveis. (. ) A maioria das lesões ocorrem no terço médio do esôfago. (. ) O tratamento endoscópico com prótese é a primeira escolha. ( ) A detecção precoce e o tratamento cirúrgico nas primeiras 24 horas aumentam a sobrevida. Assinale a alternativa que contém, de cima para baixo, a sequência correta.","o":["VV FEFF bDVEVEV. OJMEEVF a) FVM FF. JEVMEMM.","","","",""]},{"a":2025,"n":26,"e":"Cirurgia Geral","t":"Neoplasia gástrica / Prateleira de Blummer","g":"C","x":false,"q":"Assinale a alternativa que apresenta, corretamente, a patologia na qual a prateleira de Blummer pode estar presente.","o":["Exploração digital da lesão. d) Tomografia de abdome com contraste.","Laparoscopia. e) Observação clínica e exame físico seriado.","Laparotomia exploradora.","",""]},{"a":2025,"n":28,"e":"Cirurgia do Trauma","t":"Trauma grave / Ácido tranexâmico","g":"E","x":false,"q":"Pacientes politraumatizados representam um grande problema global para a saúde pública, pois o ma- nejo do sangramento pós-traumático e a coagulopatia continuam a ser desafiadores, sendo associados à falência multiorgânica potencialmente evitável e morte, se não forem diagnosticados e gerenciados de forma apropriada. Acerca da avaliação dos pacientes vítimas de traumas graves, considere as afirmativas a seguir. I. A avaliação do índice de choque (shock index) pode ser realizada através da razão da frequência cardíaca pela frequência respiratória. H. O ácido tranexâmico está indicado em pacientes com sangramento ativo ou risco de sangramento dentro de 3 horas do trauma. HI. O lactato sanguíneo e o déficit de bases são testes que permitem estimar e monitorar a extensão do sangramento e da hipoperfusão tecidual. IV. Para pacientes vítimas de traumatismo cranioencefálico grave, é recomendado que seja mantida uma pressão arterial média superior a 80 mmHg. Assinale a alternativa correta.","o":["Estenose hipertrófica de piloro; Gastrostomia.","Estenose hipertrófica de piloro; Piloromiotomia.","Obstrução duodenal; Duodeno-duodeno anastomose.","Refluxo gastroesofágico; Correção de hérnia de hiato.","Refluxo gastroesofágico; Fundoplicatura."]},{"a":2025,"n":36,"e":"Pediatria","t":"VACTERL / Anomalia anorretal","g":"A","x":false,"q":"A associação VACTERL constitui um conjunto de malformações congênitas que podem ser encontradas em recém-nascidos. Assinale a alternativa que apresenta, corretamente, uma má-formação que tipicamente pertença à asso- ciação VACTERL.","o":["Hemianopsia bitemporal não é esperada nesse caso.","Pode-se considerar que esse paciente apresenta hipogonadismo hipergonadotrófico.","Trata-se de um adenoma hipofisário não funcionante com efeito de massa.","A cirurgia transesfenoidal é a opção terapêutica de escolha.","A reposição de testosterona intramuscular é a primeira medida terapêutica."]},{"a":2025,"n":42,"e":"Clínica Médica","t":"Cetoacidose diabética / Critérios diagnósticos","g":"C","x":false,"q":"Diante de um paciente, 18 anos de idade, trazido ao pronto-socorro por suspeita de cetoacidose diabética, assinale a alternativa correta.","o":["A primeira medida terapêutica a ser instituída é insulinização endovenosa.","A reposição de K endovenoso deve ser instituída quando as concentrações plasmáticas do ânion estiverem menores que 3,5 mEq/L.","Cetonemia plasmática > 3 mmol/L é critério diagnóstico.","Glicemia plasmática < 200 mg/dL exclui o diagnóstico.","HCO; < 15 mmol/L é critério de cetoacidose grave."]},{"a":2025,"n":43,"e":"Clínica Médica","t":"Cirrose hepática / Intoxicação metanol","g":"D","x":false,"q":"Paciente, sexo masculino, 37 anos de idade, é admitido no pronto-socorro com relato de torpor e confusão mental. Vizinhos relataram, na origem, história de etilismo de longa data, desde os 12 anos de idade, mais de um litro de pinga diariamente. Não se sabe de medicações de uso contínuo nem de comorbidades. Não há relatos de exteriorização de sangramentos. Paciente encontra-se descorado 3+/4+, ictérico, febril (temperatura axilar 38,4 ºC), mucosas secas, turgor de pele diminuído. Midríase fixa bilateral, Glasgow 10, FC: 110 bpm, FR: 38 rpm (irregular), PA: 85x 46 mmHg. Ausculta pulmonar com murmúrios vesiculares presentes, sem ruídos adventícios, bulhas cardíacas taquicárdicas, sem sopros, abdome globoso com macicez móvel, piparote presente, extremidades frias, enchimento capilar lentificado, sem edema MMII. Os exames iniciais apresentam: Hemoglobina: 5,4 g/dL; Leucócitos: 45.300/mm*; Plaquetas: 13.000/mm; Ureia: 350 mg/dL; Cr: 10,5 mg/dL; Na+: 160 mEq/L; K+: 2,8 mEq/L; pH: 7,40; Bicarbonato: 12 mEq/L; pCO»>: 20 mmHg; Cloro: 89 mEq/L; Cálcio total: 6,5 mg/dL; Fósforo 6,0 mg/dL; Bilirrubina total 12 mg/dL; Albumina: 0,9 g/dL; INR 2,1; Glicemia: 70 mg/dL; Lactato 13 mmol/L. Sobre esse quadro clínico, assinale a alternativa correta.","o":["Alto nível socioeconômico, ausência de doença neurológica e transtorno de personalidade são fatores predis- ponentes.","Deve-se desconsiderar as queixas somáticas e esclarecer ao paciente que, uma vez que os exames não mostraram alterações, os sintomas que apresenta são irrelevantes clinicamente.","Uma doença que o paciente teve no passado pode ser a fonte de sintomas conversivos que, no presente, servem para resgatá-lo de uma situação de estresse.","Os sintomas são fruto de simulação por parte do paciente, que tem por objetivo receber atenção ou manipular pessoas do convívio.","São caracterizados por perturbação da integração normal de consciência, memória, identidade, emoção, per- cepção, representação corporal, controle motor e comportamento. Co BIB"]},{"a":2025,"n":45,"e":"Clínica Médica","t":"THM no climatério / Janela de oportunidade","g":"B","x":false,"q":"Paciente, sexo feminino, 52 anos de idade, chegou ao consultório para consulta de rotina. Nega história familiar para doença arterial coronária. Sobre doenças de base, relata ter dislipidemia, porém não faz uso de medicação. Nega tabagismo e queixas cardiológicas. Ela trouxe um Doppler de carótidas e vertebrais, solicitado pela ginecologista para avaliação de possibilidade de reposição hormonal devido à menopausa (THM). Com base na Diretriz Brasileira sobre a Saúde Cardiovascular no Climatério e na Menopausa — 2024, atribua V (verdadeiro) ou F (falso) às afirmativas a seguir. (. ) ASBC, FEBRASGO e a SOBRAC posicionam-se contra a adoção de implantes hormonais manipula- dos ou outros hormônios bioidênticos manipulados e modulação hormonal. (| ) Embora a diretriz cite o aumento da espessura médio intinal carotídea como fator adicional de risco, a medida deixou de ser estimulada pela última atualização da Sociedade Brasileira de Cardiologia. (/ ) O risco de câncer de mama associado a THM é elevado, com mais de 1 caso adicional por 1000 mulheres por ano. (' ) O início da terapia na “janela de oportunidade”, que seria tempo de menopausa menor que 5 anos e/ou menos de 60 anos de idade, é considerado cardioproteror. (| ) Oinício da terapia de THM fora da “janela de oportunidade” deve ser evitada pelo aumento expressivo de risco cardiovascular e eventos cardioembólicos. Assinale a alternativa que contém, de cima para baixo, a sequência correta.","o":["MV MV FF. bDVYMEFEM. OJMEEVF a) FRMMVM. JEERVEM.","","","",""]},{"a":2025,"n":46,"e":"Clínica Médica","t":"Cigarro eletrônico / DEF","g":"E","x":false,"q":"Os dispositivos eletrônicos para fumar (DEFs), conhecidos como Vapes, está na moda, principalmente, entre os jovens. Recentemente a Sociedade Brasileira de Cardiologia (SBC) divulgou um posicionamento sobre o assunto. Com base no posicionamento da SBC, considere as afirmativas a seguir. I. Pesquisa aponta que os usuários de cigarros eletrônicos apresentam uma maior probabilidade de cessar tabagismo de maneira voluntária. Il. Mesmo exposições a níveis reduzidos de cigarros consumidos podem desencadear doenças cardio- vasculares. HI. O cigarro eletrônico não tem combustão, mas existem outros produtos distintos daqueles do cigarro convencional, muitos dos quais com efeitos desconhecidos na saúde humana. IV. A comercialização e o consumo de DEFs representam um problema de saúde pública devido ao im- pacto que exercem tanto sobre fumantes quanto não fumantes. Assinale a alternativa correta.","o":["Choque hipovolêmico; RUSH. d) Choque distributivo; POCUS.","Choque cardiogênico; FATE. e) Choque obstrutivo; POCUS.","Choque distributivo; FATE.","",""]},{"a":2025,"n":48,"e":"Clínica Médica","t":"Endocardite em TAVI / Cintilografia","g":"A","x":false,"q":"Paciente em pós-operatório de implante percutâneo de válvula aórtica (TAVi), há 1 mês, chega ao pronto- -Socorro encaminhado para investigação de endocardite devido a febre e hemoculturas positivas com germes específicos. Não foram detectadas vegetações valvares pelo ecocardiograma transesofágico. Assinale a alternativa que apresenta, corretamente, a conduta mais adequada para esse caso.","o":["Ácido zoledrônico e colecalciferol.","Alendronato de sódio e colecalciferol.","Carbonato de cálcio e calcitriol.","Denosumabe e carbonato de cálcio.","Terapia de reposição hormonal e citrato de cálcio."]},{"a":2025,"n":54,"e":"Clínica Médica","t":"Prebióticos e probióticos","g":"D","x":false,"q":"Em relação ao uso de prebióticos e probióticos, considere as afirmativas a seguir. 1. Algumas cepas de lactobacilos melhoram a digestão de lactose, reduzindo os sintomas relacionados a sua intolerância. Il. Prebióticos, como a lactulose, são recomendados no tratamento e na prevenção da encefalopatia hepática. Ill. Há evidências sugerindo que o uso de algumas cepas de probióticos e da oligofrutose levam a me- lhora na resposta imune. IV. Há forte evidência de remissão da colite ulcerativa leve e moderada com uso de probióticos. Assinale a alternativa correta.","o":["I-A, II-B, III-C, IV-D. c) I-C, II-D, III-B, IV-A. e) I-D, II-B, III-A, IV-C.","-A, II-D, I-C, IV-B. d) I-D, II-A, III-B, IV-C.","Somente as afirmativas Ill e IV são corretas. El Sobre o conceito de prevenções em saúde coletiva, relacione o tipo de prevenção, na coluna da esquerda, com exemplos práticos, na coluna da direita. (I) Prevenção primária. (A) Rastreamentos. (Il) Prevenção secundária. (B) Medidas de reabilitação em casos de doença ou lesão já estabelecida. (ll) Prevenção terciária. (C) Evitar iatrogenias. (IV) Prevenção quaternária. (D) Campanhas de vacinação. Assinale a alternativa que contém a associação correta.","Ao falar sobre decisão compartilhada e elaboração em conjunto de um plano de manejo dos problemas, acaba- -se assumindo um papel paternalista na relação médico paciente, que deve ser evitado.","Doença e Experiência da doença são termos equivalentes, que exploram a experiência pessoal e subjetiva de estar doente. E Sra. Sebastiana, 97 anos, acamada há 8 anos por diagnóstico de Doença de Alzheimer. Não tem histó- rico de outras doenças crônicas, eventos cardiovasculares ou cirurgias prévias. Teve um TSH alterado há cerca de 5 anos e desde então faz uso de Levotiroxina 25 mcg em jejum. Além disso, faz uso de Omeprazol 40 mg também em jejum, Donepezila 10 mg à noite, Memantina 10 mg 2 vezes ao dia, AAS 100 mg no almoço, Furosemida 40 mg 2 vezes ao dia, Amitriptilina 25 mg 3 comprimidos à noite e Oxibuti- nina 5 mg 1 vez ao dia. Paciente não contactua, sonolenta durante todo dia, dorme bem à noite, alimenta-se via gastrostomia. A família é cuidadosa e presente no cuidado diário. Diante desse caso clínico, considere as afirmativas a seguir. I. O manejo ativo da polifarmácia traz benefícios de saúde globais em populações idosas, porém não é o caso da Sra. Sebastiana, que apresenta indicação clara de uso de cada medicação. Il. É importante revisar e reavaliar as medicações de uso contínuo em cada consulta. HI. Antidepressivos tricíclicos são uma classe medicamentosa potencialmente inadequada para idosos. IV. A sonolência diurna da Sra. Sebastiana pode se dar por efeito colateral ou interação medicamentosa dos seus remédios de uso contínuo. Assinale a alternativa correta."]},{"a":2025,"n":64,"e":"Medicina Preventiva","t":"Multimorbidade / APS","g":"C","x":false,"q":"Segundo o Medical Subject Headings (MeSH), comorbidade é definida como a presença de doenças coexistentes ou adicionais com referência a um diagnóstico inicial ou a uma condição-índice que seja o sujeito de estudo; multimorbidade, por sua vez, diz respeito às interações complexas de múltiplas doenças coexistentes. Sobre o conceito de multimorbidade no contexto da Atenção Primária à Saúde, atribua V (verdadeiro) ou F (falso) às afirmativas a seguir. ( ) A multimorbidade está associada a um aumento na complexidade do cuidado e na necessidade de coordenação entre diferentes serviços de saúde. ( ) Na Atenção Primária à Saúde, a atenção para as categorias de doenças específicas e isoladas é mais importante e mais prevalente do que a necessidade de olhar para condições coexistentes, a exemplo dos agendamentos programáticos para o cuidado de pessoas com hipertensão arterial, diabetes, tuberculose, entre outras. (| ) Fragmentação dos cuidados, má adesão ao tratamento, aumento no risco de interações medicamen- tosas, incompatibilidade de diferentes tratamentos e risco aumentado de efeitos colaterais são exem- plos de dificuldades a que o paciente com uma condição-índice única corre o risco de ser submetido durante o seu cuidado em saúde. (. ) Diante de um paciente com multimorbidade, a decisão compartilhada do plano de cuidados não é o melhor modelo de atendimento, visto que uma abordagem em demasia centrada na pessoa, nesses casos, deixa de fora patologias e índices clínicos importantes de serem tratados e abordados. (. ) A maioria das consultas na atenção primária envolve pacientes com múltiplas doenças crônicas. Assinale a alternativa que contém, de cima para baixo, a sequência correta.","o":["No cálculo do coeficiente de incidência, são considerados todos os casos presentes da doença (antigos e novos) em uma determinada comunidade, em um período de tempo especificado.","O coeficiente de incidência representa a ocorrência de novos casos e mede o risco de ocorrência de um agravo na população.","O coeficiente de letalidade representa o risco de óbito pela doença em uma população.","O coeficiente de mortalidade indica a gravidade da doença; representa a proporção de óbitos entre os casos da doença e estima o risco de morte pela doença entre aqueles que têm a doença.","Os óbitos confirmados em valor absoluto estimam o risco de morte pela doença dentro de uma população definida. EI A existência de informações confiáveis e atualizadas sobre os determinantes e as condições de saúde de uma dada comunidade permite aos gestores e aos profissionais da área da saúde planejar, avaliar e monitorar as ações de saúde orientados por dados que refletem a realidade local. Relacione os conceitos, na coluna da esquerda, com sua explicação, na coluna da direita. (I) Diagnóstico de (A) Metodologia que envolve a comunidade na coleta e na análise de infor- saúde da comuni- mações sobre sua própria situação de saúde e condições de vida. Utiliza dade. técnicas como entrevistas, grupos focais e observação direta e valoriza o conhecimento e a experiência da comunidade para construir um panorama da situação de saúde local."]},{"a":2026,"n":1,"e":"Urgência e Emergência","t":"PCR / SAVC","g":null,"x":true,"q":"Um grupo de 2000 trabalhadores foi acompanhado por 5 anos (A) Estudo caso-controle. para avaliar se a exposição ao ruído intenso aumenta o risco de perda auditiva. (Il) Pacientes com infarto agudo do miocárdio foram comparados (B) Estudo de coorte. a indivíduos sem infarto quanto ao histórico de tabagismo. (Ill) Pacientes com DPOC foram alocados aleatoriamente para uso (C) Estudo transversal. de oxigenoterapia domiciliar contínua ou intermitente, e a mor- talidade foi comparada após 2 anos. (IV) Um levantamento nacional estimou a proporção de adolescen- (D) Ensaio clínico randomizado. tes com sintomas de ansiedade e correlacionou com o tempo de uso diário de redes sociais. Assinale a alternativa que contém a associação correta.","o":["Classificar o paciente como Grupo B, devido à presença de febre e mialgia, e encaminhá-lo ao serviço de referência para hidratação venosa e coleta laboratorial imediata.","Classificar o paciente como Grupo C, orientando encaminhamento imediato ao serviço de referência para hidratação venosa e observação clínica, conforme preconizado para casos com sinais de alarme.","Reconhecer o caso como suspeito de dengue, orientar hidratação oral, buscar sinais de alarme, agendar reavaliação e notificar imediatamente a vigilância municipal, visto que há transmissão ativa no território.","Solicitar exames laboratoriais (hemograma e sorologia) antes de instituir medidas de manejo, pois a confirma- ção laboratorial é necessária para a notificação e definição do diagnóstico.","Prescrever sintomáticos para controle da dor e da febre e agendar retorno em uma semana por não haver sinais de gravidade, desde que o paciente seja orientado quanto aos sinais de alarme."]},{"a":2026,"n":4,"e":"Neurologia","t":"Status epilepticus / Diazepam IM","g":"A","x":false,"q":"Paciente, 33 anos de idade, sexo masculino, com histórico de epilepsia, é trazido por familiares ao pronto- -socorro, devido a crises convulsivas tônico-clônico generalizadas e repetidas. Colocado para monitoriza- ção na sala de emergência, apresentou novas crises e, no intervalo entre uma e outra crise, não apresentou recuperação do nível de consciência. Durante a avaliação do plantonista, surgiu novo episódio. Paciente estava sem acesso venoso. Sobre esse caso, assinale a alternativa que apresenta, corretamente, a melhor opção para interromper as crises.","o":["Cardiomiopatia hipertrófica. d) Miocardite aguda.","Comunicação interventricular. e) Prolapso de valva mitral.","Estenose aórtica.","",""]},{"a":2026,"n":6,"e":"Cardiologia","t":"TSV / Adenosina","g":"C","x":false,"q":"Paciente, 57 anos de idade, sexo feminino, refere início súbito de palpitações taquicárdicas há 1 hora. Nega comorbidades ou uso prévio de medicações. Nega uso de álcool ou drogas. Relata episódios seme- lhantes no último ano, mas todos de curta duração e resolução espontânea. Ao exame físico, encontra-se desperia, atenta, FC 143 bpm, SatO, 96% em ar ambiente, PA 147x93 mmHg, ausculta pulmonar sem al- terações, perfusão periférica satisfatória. Foi registrado o eletrocardiograma (ECG) a seguir logo após a admissão na Unidade de Pronto Atendimento. [A ia ERR ei is Ea RA RRRRRRRRRRARRAANANRRE ARENRRGAROARANAAANARARA RERORCRANANARRRRA RS Ra | SPL IF | IR ) ) BR | Sobre o quadro clínico e a arritmia apresentada no ECG, assinale a alternativa correta.","o":["Acolchicina pode ser usada na fase aguda, preferencialmente, nas primeiras 12 a 24 horas.","A confirmação diagnóstica exige sempre dosagem sérica de ácido úrico elevada no momento da crise.","A análise do líquido sinovial pode mostrar cristais em forma de agulha com birrefringência positiva.","O tratamento de escolha, nas primeiras 24 a 48 horas da crise, é o alopurinol.","O uso de corticosteroides intra-articulares está contraindicado nos pacientes hipertensos."]},{"a":2026,"n":12,"e":"Pneumologia","t":"DPOC","g":"E","x":false,"q":"Paciente, feminino, 68 anos de idade, tabagista ativa (30 anos-maço), apresenta-se com dispneia progres- siva há 3 semanas, que piora aos esforços e melhora com o repouso. Ao exame físico, o médico identifica cianose discreta em extremidades e redução da expansibilidade torácica bilateral. Assinale a alternativa que apresenta, corretamente, o achado mais consistente com o diagnóstico de do- ença pulmonar obstrutiva crônica (DPOC).","o":["Crepitação fina inspiratória difusa com ausência de sibilos.","Frêmito tátil aumentado com estertores crepitantes.","Macicez à percussão com broncofonia aumentada.","Redução do diâmetro anteroposterior do tórax.","Sibilos expiratórios e diminuição do murmúrio vesicular."]},{"a":2026,"n":13,"e":"Nefrologia","t":"Intoxicação por lítio / Diálise","g":"B","x":false,"q":"Paciente, 32 anos de idade, sexo feminino, com relato de transtorno afetivo bipolar, em uso de lítio há 5 anos, foi admitida na urgência com piora do estado geral, tremor fino, náuseas e ataxia. Na avaliação, pálida, afebril, sinais de depleção ao exame físico, Glasgow 11 (3+3+5). Realizada sondagem vesical de demora, mais de 3 L de urina transparente nas últimas 12 horas. Exames séricos com: Ureia: 122 mg/dL; Creatinina: 3,2 mg/dL; Nat: 165 mEq/L; K+: 3,8 mEqg/L; pH: 7,57; HCO; : 30 mEq/L; pCO>: 34 mmHg. Litemia: 5,2 mEq/L. Osmolaridade urinária 100 mOsm/kg. Sobre esse caso clínico, assinale a alternativa que apresenta, corretamente, a conduta mais adequada.","o":["DDAVP (Desmopressina) intranasal.","Expansão volêmica e suporte renal artificial extracorpóreo.","Restrição hídrica e conivaptan endovenoso.","Teste genético e acetazolamida via oral.","Ureia oral e sódio hipertônico endovenoso."]},{"a":2026,"n":15,"e":"Oncologia","t":"Hallmarks do câncer","g":"C","x":false,"q":"O modelo das Marcas do Câncer (Hallmarks of Cancer) descreve características essenciais adquiridas por células tumorais para sustentar crescimento, sobreviver em ambientes hostis e disseminar-se pelo organismo. Assinale a alternativa que apresenta, corretamente, um desses mecanismos e sua relação com a progres- são tumoral.","o":["A indução de apoptose aumenta a taxa de morte celular tumoral, dificultando o crescimento da neoplasia.","A insensibilidade a sinais inibidores de crescimento ocorre apenas nas fases iniciais do desenvolvimento tumo- ral.","A instabilidade genômica facilita o acúmulo de mutações que promovem alterações funcionais em genes regu- ladores do crescimento celular.","A evasão do sistema imune é um fenômeno raro e pouco relevante para a sobrevida das células tumorais.","A ausência de angiogênese favorece a nutrição e a oxigenação adequadas do tumor, permitindo seu cresci- mento."]},{"a":2026,"n":16,"e":"Neurologia","t":"Lítio - efeitos colaterais","g":"E","x":false,"q":"Sobre o uso clínico do carbonato de lítio em transtornos mentais, considere as afirmativas a seguir. I. Embora o lítio possa levar a poliúria e polidipsia, retenção de água e edema, com ganho rápido de peso, os efeitos colaterais com o seu uso são inexistentes. Il. Medicamentos que interagem aumentando o nível sérico de lítio incluem diuréticos tiazídicos, inibi- dores da ECA e anti-inflamatórios não esteroidais. HI. O risco de insuficiência renal maior com uso crônico de lítio é baixa, especialmente se os níveis forem mantidos mais abaixo da margem de toxicidade. IV. O uso de lítio dispensa o monitoramento de função hepática, visto que seu uso não causa hepatoto- xicidade ou elevação de transaminases. Assinale a alternativa correta.","o":["Anemia aplásica secundária à infecção viral.","Anemia devido à síndrome de POEMS.","Anemia megaloblástica por deficiência de vitamina B12.","Anemia por deficiência de ferro com leucopenia associada.","Síndrome mielodisplásica com displasia de multilinhagem."]},{"a":2026,"n":18,"e":"Neurologia","t":"AVC isquêmico - trombólise 4,5h","g":"C","x":false,"q":"Em relação ao tempo padrão para a administração de um trombolítico endovenoso (alteplase), em um paciente com acidente vascular hemisférico isquêmico, em que o único recurso diagnóstico por imagem seja a tomografia de crânio convencional, assinale a alternativa correta.","o":["Até 3 horas do início dos sintomas. d) Até 6 horas do nício dos sintomas.","Até 4 horas do início dos sintomas. e) Até 10 horas do início dos sintomas.","Até 4 horas e meia do início dos sintomas.","",""]},{"a":2026,"n":19,"e":"Infectologia","t":"Sífilis em HIV / Monitoramento VDRL","g":"D","x":false,"q":"Paciente, 32 anos de idade, sexo masculino, HIV positivo em uso regular de terapia antirretroviral, pro- cura atendimento após diagnóstico de sífilis secundária confirmado por VDRL 1:128 e FTA-Abs reagente. Iniciou tratamento adequado com penicilina benzatina e retorna para acompanhamento sorológico. Sobre o tratamento e o monitoramento da resposta terapêutica nesse caso, considere as afirmativas a seguir. I. O esquema terapêutico recomendado para esse paciente é penicilina benzatina 2.400.000 UI, via intra- muscular, semanal, por 3 semanas, sendo o mesmo esquema utilizado para pacientes HIV negativos com sífilis secundária. Il. A resposta adequada ao tratamento é caracterizada pela queda de, pelo menos, dois títulos (quatro vezes) do VDRL em até 6 meses para pacientes HIV positivos, sendo aceitável um período de até 12 meses para observar essa redução. HI. A persistência de títulos elevados de VDRL (>1:16) após 12 meses do tratamento caracteriza falha terapêutica, indicando necessidade de investigação de neurossífilis e retratamento. IV. Pacientes coinfectados com HIV apresentam maior risco de falha terapêutica e devem realizar controle sorológico com VDRL aos 3, 6, 9, 12, 18 e 24 meses após o tratamento. Assinale a alternativa correta.","o":["Colecistite aguda — internar, jejum e USG de abdome superior.","Pancreatite aguda biliar — internar, jejum e USG de abdome.","Pancreatite aguda alcoólica — internar, jejum e tomografia de abdome.","Pancreatite crônica agudizada alcoólica — internar, jejum e tomografia de abdome.","Úlcera gástrica perfurada — internar, exame de imagem e operar."]},{"a":2026,"n":22,"e":"Cirurgia Geral","t":"Polipose adenomatosa familiar","g":"C","x":false,"q":"Paciente, 27 anos de idade, procura consultório com história de sangramento anal recente e sem outros sintomas. Após realização de colonoscopia, foram encontrados múltiplos pólipos (mais que 500), sendo vários ressecados. Assinale a alternativa que apresenta, corretamente, a hipótese diagnóstica e o tipo de pólipo encontrado com maior frequência na biópsia.","o":["Doença de Crohn — Pólipos inflamatórios.","Retocolite ulcerativa — Pólipos inflamatórios.","Polipose adenomatosa familiar — Pólipos adenomatosos.","Síndrome de Lynch — Pólipos serráteis.","Síndrome de Peutz-jeghers — Pólipos hamartomatosos."]},{"a":2026,"n":23,"e":"Cirurgia Geral","t":"Trauma facial / Nervo facial","g":"E","x":false,"q":"Paciente dá entrada no PS utilizado, refere ter sido atacado por cão, com mordeduras em face, ocorrida há 8 horas. Apresenta sinais vitais estáveis. Ao exame físico, apresenta extenso ferimento em sulco nasolabial direito, com extensão até vestíbulo nasal, exposição do processo lateral da cartilagem do septo nasal e outro ferimento, profundo, ipsilateral, envolvendo a região temporal direita, percorrendo a face lateralmente, até projeção do ângulo da mandíbula, com comprometimento do trago da orelha. Ao exame dinâmico, apresenta paresia na hemiface direita. Sobre o caso, assinale a alternativa correta.","o":["O tempo decorrido do trauma contraindica cirurgia ou sutura. É importante a comunicação eficaz com o paci- ente sobre riscos e possíveis sequelas, seguida por encaminhamento para serviço de referência.","Devido ao tempo decorrido do trauma, não há indicação cirúrgica no momento. Há necessidade de curativo nos ferimentos para posterior cicatrização por segunda intenção. A antibioticoterapia fica indicada apenas se houver sinais de infecção secundária, e as rotinas antirrábicas e antitetânicas devem ser implementadas.","Exposições de cartilagens devem ser tratadas com antibióticos tópicos e curativos. Lesões infectadas, com comprometimento pela boca do animal, implicam em alto risco de infecção e deformação, em caso de sutura.","Há indicação de exploração cirúrgica, mas dentro de uma estratégia de controle de danos, com uso de pontos separados, distantes uns dos outros, para permitir drenagem de eventuais infecções. Qualquer tentativa de exploração nervosa é proscrita, sob risco de infecção ascendente.","Há indicação de exploração cirúrgica imediata, para sutura e avaliação do nervo facial, que pode ter sido atingido e pode até ter alguma conduta cirúrgica imediata. As profilaxias antitetânicas e antirrábicas devem ser realizadas normalmente, e o uso de antibiótico profilático está indicado."]},{"a":2026,"n":24,"e":"Cirurgia Geral","t":"Úlcera perfurada / Abdome agudo","g":"C","x":false,"q":"Paciente, 75 anos de idade, tabagista, hipertensa, dislipidêmica e com diagnóstico recente de artrite reumatoide, refere dor abdominal em epigástrio, iniciada às 4 horas, de forte intensidade. Ao exame físico, apresenta PA: 160/90, FC: 85 bpm, Sat: 95% em ar ambiente, FR: 18 IPM. Abdome plano, depressível, doloroso à palpação de todo o andar superior. Realizou radiografia de abdome. s , Ext . Com base na história clínica e no exame, assinale a alternativa que apresenta, corretamente, a conduta a ser seguida.","o":["O quadro clínico sugere uma dor de origem não vascular e uma lesão neurotrófica, como na neuropatia perifé- rica, muito frequente em diabéticos, sem DAOP.","Isquemia assintomática (estágio | de Fontaine) e assintomática (categoria O de Rutherford).","Claudicação intermitente incapacitante (estágio Ilb de Fontaine) e claudicação severa (categoria 3 de Rutherford).","Dor isquêmica em repouso (estágio Ill de Fontaine) e lesão trófica pequena (categoria 5 de Rutherford).","Lesões tróficas (estágio IV de Fontaine) e lesão trófica pequena (categoria 5 de Rutherford)."]},{"a":2026,"n":26,"e":"Cirurgia Vascular","t":"Oclusão arterial aguda / HNF","g":"A","x":false,"q":"Paciente chega ao pronto-socorro com dor súbita e intensa no membro inferior esquerdo, palidez, ausên- cia de pulsos distais e parestesia, compatível com oclusão arterial aguda embólica. Quanto à conduta inicial com relação à anticoagulação e à justificativa para a escolha do tipo de anticoa- gulante, assinale a alternativa correta.","o":["Administração de demulcentes, como mel ou leite, e observação por 24 horas.","Remoção cirúrgica do corpo estranho.","Remoção do corpo estranho utilizando sonda tipo Foley.","Remoção endoscópica imediata.","Remoção endoscópica não urgente, nas próximas 24 horas."]},{"a":2026,"n":28,"e":"Pediatria","t":"Estenose hipertrófica do piloro","g":"A","x":false,"q":"Sobre Estenose Hipertrófica do Piloro, considere as afirmativas a seguir. I. A sintomatologia mais comum é a presença de vômitos não biliosos recorrentes com piora progres- siva. H. A percepção de uma massa do tamanho aproximado de uma azeitona, ao palpar a região epigástrica contra a coluna vertebral, é altamente sugestiva do diagnóstico. HI. O sinal da dupla-bolha em radiografia de abdome confirma o diagnóstico. IV. Os sintomas estão presentes desde o nascimento. Assinale a alternativa correta.","o":["Colangite, pois estão presentes todos os sinais e sintomas da tríade de Charcot. Exames complementares: ultrassom de abdome, hemograma, bilirrubinas, fosfatase alcalina, transaminases, amilase/lipase.","Colecistite aguda, devido à dor que é intermitente e de curta duração, por se tratar de uma condição autolimi- tada com tratamento conservador. Exames complementares: ultrassom de abdome, hemograma, bilirrubinas, fosfatase alcalina, transaminases, amilase/lipase.","Cólica biliar não complicada. Exames complementares: ultrassom de abdome, hemograma, bilirrubinas, fosta- tase alcalina, transaminases, amilase/lipase.","Pancreatite aguda, devido à dor que é leve, intermitente e melhora espontaneamente ou com analgesia simples. Exames complementares: ultrassom de abdome, hemograma, bilirrubinas, fosfatase alcalina, transaminases, amilase e lipase.","Hepatite viral aguda, devido à dor abdominal em cólica, que melhora com o uso de analgésicos, e, geralmente, não está associada à icterícia. Exames complementares: ultrassom de abdome, hemograma, bilirrubinas, fosfatase alcalina, transaminases, amilase/lipase, sorologia para hepatites."]},{"a":2026,"n":34,"e":"Cirurgia Geral","t":"Diverticulite aguda complicada","g":"D","x":false,"q":"Paciente, 78 anos de idade, sexo masculino, queixa de dor contínua em fossa ilíaca à esquerda, há 2 dias, com piora progressiva associada a febre e calafrios, seguida de náuseas. Ao exame físico, observa-se queda do estado geral, febril, depletado com dor à palpação profunda da fossa ilíaca à esquerda com descompressão brusca positiva. Assinale a alternativa que apresenta, corretamente, duas hipóteses diagnósticas mais prováveis.","o":["No Subjetivo, é possível explorar o Terceiro Componente do MCCP, “Elaborando um plano comum de manejo”, priorizando dados relevantes para o raciocínio clínico, expressando integralmente sua vivência e valores.","O Subjetivo do SOAP deve refletir a escuta qualificada e o entendimento da pessoa em sua integralidade, arti- culando dados da anamnese, vínculo e significados atribuídos à experiência de adoecer (Primeiro Componente do MCCP: Explorar a saúde, doença e experiência da doença).","O MCCP e o modelo SOAP têm finalidades distintas e devem ser aplicados separadamente, pois um aborda a relação clínica e o outro se restringe ao registro técnico do atendimento.","O MCCP orienta o profissional a otimizar o processo de raciocínio clínico indutivo e dedutivo, e o registro SOAP foca, principalmente, os dados objetivos da consulta.","O SOAP não contempla os aspectos relacionais e afetivos do encontro clínico, essa etapa é realizada excepcio- nalmente no Quarto Componente do MCCP: Intensificando a relação médico-paciente."]},{"a":2026,"n":42,"e":"Medicina Preventiva","t":"Cuidados paliativos na APS","g":"A","x":false,"q":"Durante uma visita domiciliar, a equipe de Saúde da Família acompanha Dona Elvira, 84 anos de idade, portadora de insuficiência cardíaca avançada, doença renal crônica e limitação importante para as ativi- dades da vida diária. Ela vive com a filha, que relata cansaço e insegurança quanto à evolução da mãe. Dona Elvira expressa o desejo de permanecer em casa, recebendo conforto e evitando hospitalizações. Com base nos princípios dos cuidados paliativos na APS e na atenção domiciliar, assinale a alternativa que apresenta, corretamente, a conduta mais adequada da equipe.","o":["Elaborar um plano de cuidado compartilhado com a paciente e a família, priorizando o alívio de sintomas, apoio emocional e respeito às suas preferências, levando em consideração as possibilidades da equipe da APS.","Encaminhar para ambulatório especializado para assumir o seguimento principal do caso, preservando a APS para suporte administrativo e renovação de receitas.","Manter exclusivamente a paciente em seu domicílio, independentemente do controle de sintomas e das condi- ções de segurança, pois é sua vontade.","Orientar a família sobre a necessidade de hospitalização nas fases finais da doença, pois o óbito domiciliar não é recomendado com base nos princípios da segurança do paciente.","Priorizar metas clínicas estritas e protocolos de intensificação farmacológica para reduzir hospitalizações, pos- tergando a discussão sobre preferências e objetivos pessoais para quando a condição clínica estiver estabili- zada."]},{"a":2026,"n":43,"e":"Medicina Preventiva","t":"Saúde mental APS / Genograma","g":"E","x":false,"q":"Durante o acompanhamento na Unidade de Saúde da Família, o médico observa que Dona Marlene, 56 anos de idade, apresenta insônia, cansaço constante, irritabilidade e preocupação excessiva com os filhos e o marido, que perdeu o emprego recentemente. Na consulta, chora ao falar de suas dificuldades, mas mantém funcionalidade parcial e rede de apoio familiar. O médico decide construir com ela um geno- grama e um ecomapa, a fim de compreender melhor suas relações, papéis familiares e recursos sociais, e discute o uso de um antidepressivo. Com base nos princípios da Medicina de Família e Comunidade e na abordagem da saúde mental na APS, assinale a alternativa que apresenta, corretamente, a conduta mais adequada.","o":["Encaminhar a paciente para o CAPS, uma vez que o uso de psicofármacos e intervenções psicossociais extra- polam a competência da APS.","Evitar o uso de medicamentos, priorizando práticas integrativas e complementares, bem como intervenções comunitárias.","Focar inicialmente o tratamento farmacológico para estabilização do quadro e postergar a abordagem relacional até o controle sintomático.","Realizar o diagnóstico, segundo critérios do DSM-5, antes de qualquer intervenção, evitando rotular o quadro como sindrômico.","Valorizar a compreensão da dinâmica familiar e dos fatores psicossociais que influenciam o sofrimento, utili- zando genograma e ecomapa como recursos terapêuticos complementares ao manejo medicamentoso. Co ATA"]},{"a":2026,"n":44,"e":"Medicina Preventiva","t":"Viés de disponibilidade","g":"D","x":false,"q":"Durante o atendimento em uma Unidade de Saúde da Família, o médico residente recebe o Sr. Joaquim, 58 anos de idade, com história de tosse há 3 semanas. O residente lembra de um caso recente de tuber- culose na comunidade e, diante da semelhança dos sintomas, conclui rapidamente que o paciente tem a mesma doença, solicitando baciloscopia sem investigar outras possibilidades. No dia seguinte, o precep- tor revisa o caso e identifica sinais de rinossinusite e refluxo gastroesofágico, orientando uma abordagem mais ampla. Considerando o processo de raciocínio clínico na APS e os vieses cognitivos que podem interferir nesse processo, assinale a alternativa correta.","o":["A presença de viés cognitivo demonstra falta de competência técnica e deve ser evitada por meio de decisões intuitivas.","O erro diagnóstico decorreu da ausência de uso do método hipotético-dedutivo, que não se aplica à prática da APS.","O raciocínio clínico na APS deve basear-se apenas em protocolos e fluxogramas para reduzir a influência da subjetividade.","O residente apresentou um viés de disponibilidade, ao basear sua hipótese diagnóstica principal em uma experiência recente e marcante.","O viés apresentado é do tipo ancoragem, que ocorre quando o profissional demora a formular uma hipótese inicial, recorrendo a um caso recente."]},{"a":2026,"n":45,"e":"Medicina Preventiva","t":"Prevenção quaternária / NNT e NNH","g":"A","x":false,"q":"Durante uma reunião de equipe, o médico da Unidade de Saúde da Família discute a prescrição de um novo medicamento para prevenção de eventos cardiovasculares em pacientes com risco cardiovascular moderado. Ele apresenta os dados de um ensaio clínico a seguir. * NNT (Número Necessário para Tratar) = 120 para prevenir um evento em 5 anos. * NNH (Número Necessário para Causar Dano) = 40 para provocar um evento adverso grave no mesmo período. A partir desses dados e considerando os princípios da prevenção quaternária na Atenção Primária à Saúde, assinale a alternativa que apresenta, corretamente, a conduta mais adequada.","o":["Avaliar criticamente a relação benefício-dano, discutir os resultados com o paciente e considerar não prescre- ver, uma vez que o risco de dano é maior que o benefício potencial.","Aplicar o conceito de NNT sobreposto ao conceito de NNH, pois os eventos adversos não devem limitar o potencial benefício do tratamento na decisão clínica.","Indicar o uso do medicamento para os pacientes com fatores de risco cardiovascular, entendendo que a tomada de decisão clínica não pode ser baseada em NNT e NNH.","Priorizar a prescrição do medicamento, pois o NNT elevado demonstra eficácia em longo prazo.","Suspender o uso de todos os medicamentos com NNT maior que 50, pois indicam ineficácia."]},{"a":2026,"n":48,"e":"Medicina Preventiva","t":"PNCP / Cuidados paliativos","g":"E","x":false,"q":"Durante uma roda de educação permanente, a equipe da Atenção Primária à Saúde discute a recém- -publicada Política Nacional de Cuidados Paliativos (PNCP), instituída pela Portaria GM/MS nº 1.315, de 30 de maio de 2024. Uma das médicas residentes pergunta quais são os princípios e diretrizes centrais dessa política e como ela se articula com o trabalho cotidiano da APS. Com base na PNCP e nos princípios do SUS, assinale a alternativa correta.","o":["I-C,II-A, I-F, IV-G, V-H, VI-E, VII-B, VII-D. d) 1-G, HI-B, III-F, IV-A, V-H, VI-C, VII-E, VIII-D.","I-C, II-B, III-D, IV-H, V-E, VI-F, VILA, VII-G. e) |-G, II-F, III-D, IV-H, V-B, VI-E, VII-A, VII-C.","I-D, II-F, III-G, IV-A, V-B, VI-C, VII-E, VII-H.","A inclusão da humanização como princípio do SUS expressa o compromisso com o cuidado centrado na pes- soa, fortalecendo atributos como acesso de primeiro contato, longitudinalidade, integralidade e coordenação do cuidado.","A inclusão da humanização na Lei nº 8.080/1990 substitui o princípio da integralidade, que passa a ser consi- derado um valor derivado da atenção à saúde. EI O modelo de financiamento da Atenção Primária à Saúde (APS) no SUS foi reformulado pelo Programa Previne Brasil, instituído pela Portaria GM/MS nº 2.979/2019, com atualizações posteriores. O programa busca alinhar o repasse financeiro federal ao desempenho, à capitação ponderada e às ações estratégicas das equipes de Saúde da Família e Atenção Primária. Com base nesse modelo, considere as afirmativas a seguir. I. O financiamento por capitação ponderada considera o número de pessoas cadastradas pelas equi- pes, com ponderação por critérios de vulnerabilidade, faixa etária e perfil socioeconômico. Il. O componente de pagamento por desempenho está relacionado ao cumprimento de indicadores de saúde prioritários, como pré-natal, saúde da criança, controle de hipertensão e diabetes e rastrea- mento de cânceres. Il. O componente de incentivo a ações estratégicas contempla programas e políticas nacionais prioritá- rias, como Saúde Bucal, Consultório na Rua e Saúde Prisional. IV. O Previne Brasil extinguiu o financiamento fixo e variável anterior do Piso da Atenção Básica (PAB), substituindo-os integralmente pelo modelo de produtividade individual dos profissionais. Assinale a alternativa correta."]},{"a":2026,"n":53,"e":"Pediatria","t":"TEA / TDAH","g":"E","x":false,"q":"Criança, 19 meses de idade, comparece à UBS para consulta de puericultura. A mãe relata que em casa a criança alterna entre ficar isolada “no seu mundo”, sempre com os mesmos objetos e, às vezes, nem responde quando é chamada, ou não para quieta e grita andando pela casa, principalmente se chega visita em casa, e, se for criança, não divide os brinquedos. A irmã mais velha teve diagnóstico de Transtorno de Déficit de Atenção e Hiperatividade (TDAH) após entrar na escola. Ambos se dão bem, mas, mesmo quando a irmã tenta conversar com ele ou ajudar com as palavras, ele só repete algumas coisas que ela fala, não havendo um diálogo interativo. A mãe pergunta se o filho é Autista. Diante do histórico pessoal e familiar da criança, sobre suspeita e diagnóstico de Transtorno do Espectro Autista (TEA) e TDAH, considere as afirmativas a seguir. I. A investigação de distúrbios auditivos e visuais são dispensáveis na investigação e diagnóstico dife- rencial de TEA e TDAH. Il. A avaliação do desenvolvimento neuropsicomotor da criança de maneira contínua e longitudinal é fundamental para suspeição e diagnóstico precoce de TEA. HI. A intersetorialidade entre saúde e educação são fundamentais para identificação, intervenção pre- coce, adaptações e tratamentos adequados para crianças com TEA e TDAH. IV. Aos 18 meses de idade, toda criança deve ser triada para TEA, e a ferramenta mais indicada para essa faixa etária é a escala M-CHAT-R. Assinale a alternativa correta.","o":["Aguardar o resultado da urocultura antes de iniciar qualquer tratamento antimicrobiano, mantendo apenas medidas de suporte e controle da febre.","Hospitalizar para antibioticoterapia endovenosa com ceftriaxona por 10 a 14 dias, considerando tratar-se de pielonefrite aguda em lactente febril.","Iniciar antibioticoterapia oral com sulfametoxazol-trimetoprima por 7 dias e aguardar o resultado da urocultura para eventual ajuste terapêutico.","Iniciar cefalexina oral por 5 dias e solicitar ultrassonografia de vias urinárias de urgência para investigação de malformações congênitas.","Prescrever nitrofurantoína oral por 3 dias, uma vez que o exame de urina sugere cistite não complicada em criança previamente hígida."]},{"a":2026,"n":65,"e":"Pediatria","t":"Déficit de estatura / Crescimento","g":"A","x":false,"q":"Criança, 5 anos de idade, sexo masculino, comparece com os pais para consulta de rotina. Atualmente, está sem queixas. A avaliação antropométrica atual encontra: Índice de Massa Corpórea (IMC) para idade e sexo está igual a Z score +1 e a estatura para i // ── ESTADO ──
let selectedEsp = new Set();
let selectedAno = new Set();
let mode = 'adaptive';
let queue = [];
let current = 0;
let sessionCorrect = 0;
let sessionWrong = 0;
let answered = false;

// ── MEMÓRIA (localStorage) ──
function loadMemory() {
  try { return JSON.parse(localStorage.getItem('uel_memory') || '{}'); } catch { return {}; }
}
function saveMemory(mem) {
  try { localStorage.setItem('uel_memory', JSON.stringify(mem)); } catch {}
}
// Estrutura por questão: {correct, total, ease, interval, nextReview}
function getCard(mem, key) {
  return mem[key] || { correct: 0, total: 0, ease: 2.5, interval: 0, nextReview: 0 };
}

// ── SM-2 ──
function sm2Update(card, correct) {
  card.total++;
  const q = correct ? 5 : 1;
  if (q >= 3) {
    card.correct++;
    if (card.interval === 0) card.interval = 1;
    else if (card.interval === 1) card.interval = 6;
    else card.interval = Math.round(card.interval * card.ease);
    card.ease = Math.max(1.3, card.ease + 0.1 - (5 - q) * (0.08 + (5 - q) * 0.02));
  } else {
    card.interval = 1;
    card.ease = Math.max(1.3, card.ease - 0.2);
  }
  card.nextReview = Date.now() + card.interval * 86400000;
  return card;
}

// ── INIT ──
const ESPECIALIDADES = [...new Set(BANCO.map(q => q.e))].sort();
const ANOS = [...new Set(BANCO.map(q => q.a))].sort();

function init() {
  const espContainer = document.getElementById('chips-esp');
  const anoContainer = document.getElementById('chips-ano');

  // Chip "Todas"
  const allChip = document.createElement('button');
  allChip.className = 'chip all active';
  allChip.textContent = 'Todas';
  allChip.onclick = () => { selectedEsp.clear(); updateChips('esp'); updateStats(); };
  espContainer.appendChild(allChip);

  ESPECIALIDADES.forEach(e => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = e;
    chip.dataset.value = e;
    chip.onclick = () => {
      if (selectedEsp.has(e)) selectedEsp.delete(e); else selectedEsp.add(e);
      updateChips('esp');
      updateStats();
    };
    espContainer.appendChild(chip);
  });

  const allAnoChip = document.createElement('button');
  allAnoChip.className = 'chip all active';
  allAnoChip.textContent = 'Todos';
  allAnoChip.onclick = () => { selectedAno.clear(); updateChips('ano'); updateStats(); };
  anoContainer.appendChild(allAnoChip);

  ANOS.forEach(a => {
    const chip = document.createElement('button');
    chip.className = 'chip';
    chip.textContent = a;
    chip.dataset.value = a;
    chip.onclick = () => {
      if (selectedAno.has(a)) selectedAno.delete(a); else selectedAno.add(a);
      updateChips('ano');
      updateStats();
    };
    anoContainer.appendChild(chip);
  });

  updateStats();
}

function updateChips(type) {
  const isEsp = type === 'esp';
  const selected = isEsp ? selectedEsp : selectedAno;
  const container = document.getElementById(isEsp ? 'chips-esp' : 'chips-ano');
  const chips = container.querySelectorAll('.chip:not(.all)');
  const allChip = container.querySelector('.all');
  chips.forEach(c => {
    const v = isEsp ? c.dataset.value : Number(c.dataset.value);
    c.classList.toggle('active', selected.has(v));
  });
  allChip.classList.toggle('active', selected.size === 0);
}

function getFiltered() {
  return BANCO.filter(q => {
    if (selectedEsp.size > 0 && !selectedEsp.has(q.e)) return false;
    if (selectedAno.size > 0 && !selectedAno.has(q.a)) return false;
    return true;
  });
}

function updateStats() {
  const filtered = getFiltered();
  const mem = loadMemory();
  let totalR = 0, totalC = 0;
  filtered.forEach(q => {
    const key = `${q.a}_${q.n}`;
    const card = getCard(mem, key);
    totalR += card.total;
    totalC += card.correct;
  });
  document.getElementById('stat-total').textContent = filtered.length;
  document.getElementById('stat-feitas').textContent = totalR;
  document.getElementById('stat-acerto').textContent = totalR > 0 ? Math.round(totalC/totalR*100) + '%' : '—';
  document.getElementById('btn-start').disabled = filtered.length === 0;
}

function setMode(btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  mode = btn.dataset.mode;
}

// ── INICIAR QUIZ ──
function startQuiz() {
  const filtered = getFiltered();
  const mem = loadMemory();
  const now = Date.now();

  let pool = filtered;

  if (mode === 'weak') {
    pool = filtered.filter(q => {
      const card = getCard(mem, `${q.a}_${q.n}`);
      if (card.total === 0) return true;
      return card.correct / card.total < 0.6;
    });
    if (pool.length === 0) pool = filtered;
  }

  if (mode === 'adaptive') {
    // Prioriza: vencidas (nextReview <= now) > novas > revisão futura
    const due    = pool.filter(q => { const c = getCard(mem,`${q.a}_${q.n}`); return c.total > 0 && c.nextReview <= now; });
    const newq   = pool.filter(q => getCard(mem,`${q.a}_${q.n}`).total === 0);
    const future = pool.filter(q => { const c = getCard(mem,`${q.a}_${q.n}`); return c.total > 0 && c.nextReview > now; });
    pool = [...shuffle(due), ...shuffle(newq), ...shuffle(future)];
  } else if (mode === 'random') {
    pool = shuffle([...pool]);
  } else if (mode === 'sequential') {
    pool = [...pool].sort((a,b) => a.a - b.a || a.n - b.n);
  } else {
    pool = shuffle([...pool]);
  }

  queue = pool;
  current = 0;
  sessionCorrect = 0;
  sessionWrong = 0;

  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'flex';

  renderQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── RENDERIZAR QUESTÃO ──
function renderQuestion() {
  if (current >= queue.length) { showResult(); return; }

  answered = false;
  const q = queue[current];
  const mem = loadMemory();
  const card = getCard(mem, `${q.a}_${q.n}`);
  const letters = ['a','b','c','d','e'];

  // Meta
  document.getElementById('q-meta').innerHTML = `
    <span class="badge badge-esp">${q.e}</span>
    <span class="badge badge-ano">UEL ${q.a}</span>
    ${q.t ? `<span class="badge badge-tema">${q.t}</span>` : ''}
  `;

  // Enunciado
  document.getElementById('q-text').textContent = q.q;

  // Opções
  const opts = document.getElementById('q-options');
  opts.innerHTML = '';
  letters.forEach((l, i) => {
    const text = q.o[i];
    if (!text || !text.trim()) return;
    const div = document.createElement('div');
    div.className = 'option';
    div.dataset.letter = l;
    div.innerHTML = `<div class="option-letter">${l.toUpperCase()}</div><div class="option-text">${text}</div>`;
    div.onclick = () => selectAnswer(l, q);
    opts.appendChild(div);
  });

  // Feedback
  const fb = document.getElementById('q-feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  // Next button
  document.getElementById('btn-next').className = 'btn-next';

  // SR indicator
  const sri = document.getElementById('sr-indicator');
  if (card.total === 0) {
    sri.innerHTML = '<span class="sr-new">● Nova questão</span>';
  } else {
    const pct = Math.round(card.correct / card.total * 100);
    const cls = pct >= 70 ? 'sr-known' : pct >= 40 ? 'sr-review' : 'sr-bad';
    sri.innerHTML = `<span class="${cls}">Respondida ${card.total}x · ${pct}% de acerto</span>`;
  }

  // Progresso
  const pct = Math.round(current / queue.length * 100);
  document.getElementById('prog-text').textContent = `${current + 1} / ${queue.length}`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('hdr-correct').textContent = `✓ ${sessionCorrect}`;
  document.getElementById('hdr-wrong').textContent = `✗ ${sessionWrong}`;
}

function selectAnswer(letter, q) {
  if (answered) return;
  answered = true;

  const correct = letter === q.g.toLowerCase();
  const opts = document.querySelectorAll('.option');

  opts.forEach(opt => {
    opt.classList.add('locked');
    if (opt.dataset.letter === q.g.toLowerCase()) opt.classList.add('correct');
    else if (opt.dataset.letter === letter && !correct) opt.classList.add('wrong');
  });

  // Feedback
  const fb = document.getElementById('q-feedback');
  if (correct) {
    fb.className = 'feedback correct show';
    fb.textContent = `✓ Correto! A resposta é ${q.g.toUpperCase()}.`;
    sessionCorrect++;
  } else {
    fb.className = 'feedback wrong show';
    fb.textContent = `✗ Incorreto. A resposta correta é ${q.g.toUpperCase()}.`;
    sessionWrong++;
  }

  // Atualiza memória SM-2
  const mem = loadMemory();
  const key = `${q.a}_${q.n}`;
  mem[key] = sm2Update(getCard(mem, key), correct);
  saveMemory(mem);

  // Mostrar botão próxima
  document.getElementById('btn-next').className = 'btn-next show';

  // Update header
  document.getElementById('hdr-correct').textContent = `✓ ${sessionCorrect}`;
  document.getElementById('hdr-wrong').textContent = `✗ ${sessionWrong}`;
}

function nextQuestion() {
  current++;
  renderQuestion();
}

// ── RESULTADO ──
function showResult() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-result').style.display = 'flex';

  const total = sessionCorrect + sessionWrong;
  const pct = total > 0 ? Math.round(sessionCorrect / total * 100) : 0;
  document.getElementById('res-score').textContent = pct + '%';
  document.getElementById('res-correct').textContent = sessionCorrect;
  document.getElementById('res-wrong').textContent = sessionWrong;
  document.getElementById('res-total').textContent = total;

  // Breakdown por especialidade
  const breakdown = {};
  queue.slice(0, current).forEach(q => {
    if (!breakdown[q.e]) breakdown[q.e] = { c: 0, t: 0 };
  });
  // Não temos acesso individual às respostas aqui, então usa a memória
  const mem = loadMemory();
  const sessionKeys = queue.slice(0, current).map(q => `${q.a}_${q.n}`);
  // Mostra breakdown geral da memória por especialidade
  const espBreak = {};
  getFiltered().forEach(q => {
    const card = getCard(mem, `${q.a}_${q.n}`);
    if (card.total === 0) return;
    if (!espBreak[q.e]) espBreak[q.e] = { c: 0, t: 0 };
    espBreak[q.e].c += card.correct;
    espBreak[q.e].t += card.total;
  });

  const bd = document.getElementById('res-breakdown');
  bd.innerHTML = '';
  Object.entries(espBreak)
    .sort((a,b) => (a[1].c/a[1].t) - (b[1].c/b[1].t))
    .forEach(([esp, { c, t }]) => {
      const p = Math.round(c/t*100);
      const cls = p >= 70 ? 'pct-good' : p >= 50 ? 'pct-mid' : 'pct-bad';
      const row = document.createElement('div');
      row.className = 'breakdown-row';
      row.innerHTML = `<span>${esp}</span><span class="breakdown-pct ${cls}">${p}% (${t} resp.)</span>`;
      bd.appendChild(row);
    });
}

function goHome() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-home').style.display = 'flex';
  updateStats();
}

init();
</script>
